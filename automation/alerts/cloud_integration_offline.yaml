# Notify both phones if HA Cloud goes offline for 5+ minutes.
- id: cloud_integration_offline
  alias: "Alert - Cloud Integration Offline"
  description: "Notify if Home Assistant Cloud goes offline for 5 minutes."
  mode: single
  triggers:
    - platform: state
      entity_id: binary_sensor.remote_ui
      to: "off"
      for:
        minutes: 5
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "⚠️ HA Cloud Offline"
        message: "Home Assistant Cloud has been offline for 5 minutes. Remote access may be unavailable."
# Daily Energy Summary
- id: daily_energy_summary
  alias: "Daily Energy Summary"
  trigger:
    - platform: time
      at: "21:00:00"
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "📊 Daily Energy Report"
        message: >
          Today's usage: {{ states('sensor.daily_home_energy') | round(1) }} kWh
          Estimated cost: £{{ (states('sensor.daily_home_energy') | float * 0.30) | round(2) }}
  mode: single

# Daily energy usage notification at 9pm to both phones.
- id: daily_energy_summary
  alias: "Alert - Daily Energy Summary"
  description: "Daily energy usage notification at 9pm."
  mode: single
  triggers:
    - platform: time
      at: "21:00:00"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "⚡ Daily Energy Summary"
        message: >
          Today's usage: {{ states('sensor.daily_home_energy') | float | round(2) }} kWh
          (£{{ (states('sensor.daily_home_energy') | float * 0.27) | round(2) }}).
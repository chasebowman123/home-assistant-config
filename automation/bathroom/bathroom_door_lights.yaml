- id: bathroom_door_lights
  alias: "Bathroom - Door Lights"
  description: "Main bathroom door opens: lights on. Off 5 min after close."
  trigger:
    - platform: state
      entity_id: binary_sensor.bathroom_sensor_contact
      to: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.bathroom_spots
    - wait_for_trigger:
        - platform: state
          entity_id: binary_sensor.bathroom_sensor_contact
          to: "off"
          for:
            minutes: 5
    - service: light.turn_off
      target:
        entity_id: light.bathroom_spots
  mode: restart

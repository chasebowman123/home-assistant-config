- id: bedroom_bedtime
  alias: "Bedroom - Bedtime"
  description: "All lights off, pause TV."
  trigger:
    - platform: state
      entity_id: input_select.bedroom
      to: "Bedtime"
  action:
    - service: light.turn_off
      target:
        entity_id:
          - light.bedroom_spots
          - light.bedroom_signe
          - light.bedroom_tv_strip
    - service: media_player.media_pause
      target:
        entity_id: media_player.bedroom_tv

# Bedroom → Off
- id: bedroom_state_off
  alias: "Bedroom - State Off"
  trigger:
    - platform: state
      entity_id: input_select.bedroom
      to: "Off"
  action:
    - service: light.turn_off
      target:
        entity_id:
          - light.bedroom_spot_lights
          - light.bedroom_signe_light
          - light.bedroom_tv_strip_light
          - light.bedroom_colour_lamp

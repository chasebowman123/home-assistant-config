# Bedroom Off mode: all bedroom lights off.
- id: bedroom_off
  alias: "Bedroom - Off"
  description: "All bedroom lights off."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.bedroom
      to: "Off"
  actions:
    - action: light.turn_off
      target:
        entity_id:
          - light.bedroom_spot_lights
          - light.bedroom_signe_light
          - light.bedroom_tv_strip_light

# Bedroom Relaxing mode: spots off, Signe + TV strip warm dim.
- id: bedroom_relaxing
  alias: "Bedroom - Relaxing"
  description: "Spots off, Signe + TV strip warm dim."
  mode: single
  trigger:
    - platform: state
      entity_id: input_select.bedroom
      to: "Relaxing"
  action:
    - service: light.turn_off
      target:
        entity_id: light.bedroom_spot_lights
    - service: light.turn_on
      target:
        entity_id: light.bedroom_signe_light
      data:
        brightness_pct: 30
        color_temp_kelvin: 2200
    - service: light.turn_on
      target:
        entity_id: light.bedroom_tv_strip_light
      data:
        brightness_pct: 20
        color_temp_kelvin: 2200

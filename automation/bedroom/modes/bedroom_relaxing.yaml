- id: bedroom_relaxing
  alias: "Bedroom - Relaxing"
  description: "Spots off, Signe + TV strip warm dim."
  trigger:
    - platform: state
      entity_id: input_select.bedroom
      to: "Relaxing"
  action:
    - service: light.turn_off
      target:
        entity_id: light.bedroom_spots
    - service: light.turn_on
      target:
        entity_id: light.bedroom_signe
      data:
        brightness_pct: 30
        color_temp_kelvin: 2200
    - service: light.turn_on
      target:
        entity_id: light.bedroom_tv_strip
      data:
        brightness_pct: 20
        color_temp_kelvin: 2200

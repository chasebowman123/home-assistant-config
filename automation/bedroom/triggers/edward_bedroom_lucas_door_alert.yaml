- id: edward_bedroom_lucas_door_alert
  alias: Edward Bedroom Lucas Door Alert
  description: "When edward_bedroom toggle is on and Lucas door changes state → flash bedroom + lounge lights red/blue then restore."
  mode: single
  triggers:
    - platform: state
      entity_id: binary_sensor.lucas_room_door_contact
  conditions:
    - condition: state
      entity_id: input_boolean.edward_bedroom
      state: "on"
  actions:
    - action: scene.create
      data:
        scene_id: edward_bedroom_alert_snapshot
        snapshot_entities:
          - light.bedroom_signe_light
          - light.bedroom_tv_strip_light
          - light.bedroom_spot_lights
          - light.lounge_signe_light
          - light.lounge_iris
          - light.lounge_strip_light
          - light.lounge_tv
    - repeat:
        count: 4
        sequence:
          - action: light.turn_on
            target:
              entity_id:
                - light.bedroom_signe_light
                - light.bedroom_spot_lights
                - light.lounge_signe_light
                - light.lounge_tv
            data:
              rgb_color:
                - 255
                - 0
                - 0
              brightness: 255
              transition: 0.3
          - action: light.turn_on
            target:
              entity_id:
                - light.bedroom_tv_strip_light
                - light.lounge_iris
                - light.lounge_strip_light
            data:
              rgb_color:
                - 0
                - 0
                - 255
              brightness: 255
              transition: 0.3
          - delay:
              milliseconds: 500
          - action: light.turn_off
            target:
              entity_id:
                - light.bedroom_signe_light
                - light.bedroom_tv_strip_light
                - light.bedroom_spot_lights
                - light.lounge_signe_light
                - light.lounge_iris
                - light.lounge_strip_light
                - light.lounge_tv
            data:
              transition: 0.3
          - delay:
              milliseconds: 500
    - delay:
        seconds: 1
    - action: scene.turn_on
      target:
        entity_id: scene.edward_bedroom_alert_snapshot
      data:
        transition: 2

# Disco Disco on: colour cycling lights, party playlist, Alexa announcement.
- id: disco_disco_activate
  alias: "Disco Disco - Activate"
  description: "Disco lights on, colour cycling, party playlist, Alexa announcement."
  mode: single
  triggers:
    - platform: state
      entity_id: input_boolean.disco_disco
      to: "on"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.lounge_iris
      data:
        brightness_pct: 100
        color_name: purple
    - action: light.turn_on
      target:
        entity_id: light.lounge_signe_light
      data:
        brightness_pct: 100
        color_name: blue
    - action: light.turn_on
      target:
        entity_id: light.lounge_strip_light
      data:
        brightness_pct: 100
        color_name: red
    - action: light.turn_off
      target:
        entity_id: light.lounge_spotlights
    - action: media_player.volume_set
      target:
        entity_id: media_player.lounge
      data:
        volume_level: 0.5
    - action: media_player.play_media
      target:
        entity_id: media_player.lounge
      data:
        media_content_id: "Party Playlist"
        media_content_type: playlist
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.edward_s_echo_show_21
          - media_player.lounge_echo_hub
        message: "Disco Disco! Party mode activated!"
        data:
          type: announce

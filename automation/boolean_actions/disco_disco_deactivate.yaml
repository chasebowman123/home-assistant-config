- id: disco_disco_deactivate
  alias: "Disco Disco - Deactivate"
  description: "Restore normal lighting and stop party music."
  trigger:
    - platform: state
      entity_id: input_boolean.disco_disco
      to: "off"
  action:
    - service: light.turn_on
      target:
        entity_id: light.lounge_spots
      data:
        brightness_pct: 80
        color_temp_kelvin: 3000
    - service: light.turn_on
      target:
        entity_id:
          - light.lounge_iris
          - light.lounge_play_light_bar
          - light.lounge_light_strip
      data:
        brightness_pct: 50
        color_temp_kelvin: 3000
    - service: media_player.media_stop
      target:
        entity_id: media_player.lounge_sonos

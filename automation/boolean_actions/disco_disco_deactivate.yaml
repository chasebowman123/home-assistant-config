# Disco Disco off: restore normal lighting, stop party music.
- id: disco_disco_deactivate
  alias: "Disco Disco - Deactivate"
  description: "Restore normal lighting and stop party music."
  mode: single
  triggers:
    - platform: state
      entity_id: input_boolean.disco_disco
      to: "off"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.lounge_spotlights
      data:
        brightness_pct: 80
        color_temp_kelvin: 3000
    - action: light.turn_on
      target:
        entity_id:
          - light.lounge_iris
          - light.lounge_signe_light
          - light.lounge_strip_light
      data:
        brightness_pct: 50
        color_temp_kelvin: 3000
    - action: media_player.media_stop
      target:
        entity_id: media_player.lounge

- id: do_not_disturb_off
  alias: Do Not Disturb Off
  description: "When do_not_disturb turns off, disable DND on all Echo devices and restore the doorbell unified automation."
  mode: single
  triggers:
    - platform: state
      entity_id: input_boolean.do_not_disturb
      to: "off"
  condition: []
  actions:
    - action: switch.turn_off
      target:
        entity_id:
          - switch.bedroom_do_not_disturb_switch
          - switch.bedroom_fire_cube_do_not_disturb_switch
          - switch.echo_show_15_do_not_disturb_switch
          - switch.edward_s_echo_show_21_do_not_disturb_switch
          - switch.edward_s_fire_do_not_disturb_switch
          - switch.edward_s_wiim_mini_do_not_disturb_switch
          - switch.loretta_s_echo_show_do_not_disturb_switch
          - switch.lounge_echo_hub_do_not_disturb_switch
          - switch.lounge_fire_cube_do_not_disturb_switch
          - switch.lucas_s_echo_show_do_not_disturb_switch
          - switch.office_do_not_disturb_switch
    - action: automation.turn_on
      target:
        entity_id:
          - automation.doorbell_unified

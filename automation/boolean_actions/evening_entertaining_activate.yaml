# Evening Entertaining on: mood lighting for guests + Alexa announcement.
- id: evening_entertaining_activate
  alias: "Evening Entertaining - Activate"
  description: "Mood lighting for guests, music-friendly ambiance, Alexa announcement."
  mode: single
  triggers:
    - platform: state
      entity_id: input_boolean.evening_entertaining
      to: "on"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.lounge_spotlights
      data:
        brightness_pct: 40
        color_temp_kelvin: 2500
    - action: light.turn_on
      target:
        entity_id: light.lounge_piano_lamp
      data:
        brightness_pct: 50
    - action: light.turn_on
      target:
        entity_id: light.lounge_strip_light
      data:
        brightness_pct: 40
        color_temp_kelvin: 2500
    - action: light.turn_on
      target:
        entity_id: light.lounge_iris
      data:
        brightness_pct: 40
        color_temp_kelvin: 2500
    - action: light.turn_on
      target:
        entity_id: light.hallway_spot_lights
      data:
        brightness_pct: 50
        color_temp_kelvin: 2700
    - action: light.turn_on
      target:
        entity_id: light.kitchen_spotlights
      data:
        brightness_pct: 60
        color_temp_kelvin: 2700
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: "Evening entertaining mode activated. Enjoy your evening!"
        data:
          type: announce

- id: evening_entertaining_activate
  alias: "Evening Entertaining - Activate"
  description: "Mood lighting for guests, music-friendly ambiance."
  trigger:
    - platform: state
      entity_id: input_boolean.evening_entertaining
      to: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.lounge_spots
      data:
        brightness_pct: 40
        color_temp_kelvin: 2500
    - service: light.turn_on
      target:
        entity_id: light.lounge_piano_lamp
      data:
        brightness_pct: 50
    - service: light.turn_on
      target:
        entity_id: light.lounge_light_strip
      data:
        brightness_pct: 40
        color_temp_kelvin: 2500
    - service: light.turn_on
      target:
        entity_id: light.lounge_iris
      data:
        brightness_pct: 40
        color_temp_kelvin: 2500
    - service: light.turn_on
      target:
        entity_id: light.hallway_spots
      data:
        brightness_pct: 50
        color_temp_kelvin: 2700
    - service: light.turn_on
      target:
        entity_id: light.kitchen_spotlights
      data:
        brightness_pct: 60
        color_temp_kelvin: 2700

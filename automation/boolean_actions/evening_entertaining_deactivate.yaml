- id: evening_entertaining_deactivate
  alias: "Evening Entertaining - Deactivate"
  description: "Restore normal lighting after guests leave."
  trigger:
    - platform: state
      entity_id: input_boolean.evening_entertaining
      to: "off"
  action:
    - service: light.turn_on
      target:
        entity_id: light.lounge_spots
      data:
        brightness_pct: 80
        color_temp_kelvin: 3000
    - service: light.turn_on
      target:
        entity_id:
          - light.lounge_play_light_bar
          - light.lounge_light_strip
      data:
        brightness_pct: 50
        color_temp_kelvin: 3000
    - service: light.turn_off
      target:
        entity_id: light.lounge_iris

# Evening Entertaining off: restore normal lighting after guests leave.
- id: evening_entertaining_deactivate
  alias: "Evening Entertaining - Deactivate"
  description: "Restore normal lighting after guests leave."
  mode: single
  triggers:
    - platform: state
      entity_id: input_boolean.evening_entertaining
      to: "off"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.lounge_spotlights
      data:
        brightness_pct: 80
        color_temp_kelvin: 3000
    - action: light.turn_on
      target:
        entity_id:
          - light.lounge_signe_light
          - light.lounge_strip_light
      data:
        brightness_pct: 50
        color_temp_kelvin: 3000
    - action: light.turn_off
      target:
        entity_id: light.lounge_iris

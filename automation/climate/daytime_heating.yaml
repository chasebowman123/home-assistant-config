- id: daytime_heating
  alias: Daytime Heating
  description: Set heating to daytime temperatures at 07:00.
  mode: single
  trigger:
    - platform: time
      at: "07:00:00"
  condition: []
  action:
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.hallway
          - climate.lounge
          - climate.kitchen
      data:
        temperature: 24
    - service: climate.set_temperature
      target:
        entity_id: climate.lucas_s_room
      data:
        temperature: 22

- id: night_setback
  alias: Night Setback
  description: Reduce heating to night setback temperatures at 22:00.
  mode: single
  triggers:
    - platform: time
      at: "22:00:00"
  conditions: []
  actions:
    - action: climate.set_temperature
      target:
        entity_id:
          - climate.hallway
          - climate.lounge
          - climate.kitchen
      data:
        temperature: 20
    - action: climate.set_temperature
      target:
        entity_id: climate.lucas_s_room
      data:
        temperature: 22

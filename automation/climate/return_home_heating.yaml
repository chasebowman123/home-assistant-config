- id: return_home_heating
  alias: Return Home Heating
  description: Restore daytime heating temperatures when Edward or Loretta arrives home.
  mode: single
  trigger:
    - platform: state
      entity_id:
        - person.edward_eidam
        - person.loretta_eidam
      to: home
  condition: []
  action:
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.hallway
          - climate.lounge
          - climate.kitchen
      data:
        temperature: 24
    - service: climate.set_temperature
      target:
        entity_id: climate.lucas_s_room
      data:
        temperature: 22

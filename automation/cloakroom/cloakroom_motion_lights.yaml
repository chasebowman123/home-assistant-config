- id: cloakroom_motion_lights
  alias: "Cloakroom - Motion Lights"
  description: "Motion activates cloakroom light if off, auto-off after 5 min no motion. Skips if lights already on."
  triggers:
    - platform: state
      entity_id: binary_sensor.cloakroom_sensor_contact
      to: "on"
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.house
          state: "Away"
        - condition: state
          entity_id: input_select.house
          state: "All Out"
    - condition: state
      entity_id: light.cloakroom_spotlights
      state: "off"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.cloakroom_spotlights
    - wait_for_trigger:
        - platform: state
          entity_id: binary_sensor.cloakroom_sensor_contact
          to: "off"
          for:
            minutes: 5
    - action: light.turn_off
      target:
        entity_id: light.cloakroom_spotlights
  mode: restart

- id: cloakroom_motion_lights
  alias: "Cloakroom - Motion Lights"
  description: "Motion activates cloakroom light, off after 5 minutes of no motion."
  trigger:
    - platform: state
      entity_id: binary_sensor.cloakroom_motion
      to: "on"
  condition:
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.house
          state: "Away"
        - condition: state
          entity_id: input_select.house
          state: "All Out"
  action:
    - service: light.turn_on
      target:
        entity_id: light.cloakroom_light
    - wait_for_trigger:
        - platform: state
          entity_id: binary_sensor.cloakroom_motion
          to: "off"
          for:
            minutes: 5
    - service: light.turn_off
      target:
        entity_id: light.cloakroom_light
  mode: restart

# Re-enable doorbell physical ring when returning to Day Time mode.
- id: doorbell_silent_mode_off
  alias: "Doorbell - Silent Mode Off"
  description: "Re-enable doorbell ring when returning to normal modes."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.house
      to: "Day Time"
  conditions:
    - condition: state
      entity_id: input_boolean.lucas_sleeping
      state: "off"
    - condition: state
      entity_id: input_boolean.important_meeting
      state: "off"
  actions:
    - action: siren.turn_on
      target:
        entity_id:
          - siren.basement_door_siren
          - siren.upstairs_siren
          - siren.lobby_siren

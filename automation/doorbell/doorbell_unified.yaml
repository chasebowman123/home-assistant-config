- id: doorbell_unified
  alias: Doorbell Unified
  description: "All doorbells → phone notification (Edward + Loretta), Echo Show 15+21 announce + camera, Fire Cubes camera PiP."
  mode: single
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.basement_door_ding
        - binary_sensor.upstairs_ding
        - binary_sensor.lobby_ding
      to: "on"
  condition: []
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: Doorbell
        message: Someone is at the door
        data:
          image: /api/camera_proxy/camera.upstairs_live_view
          push:
            sound:
              name: default
              critical: 1
              volume: 1
    - service: notify.mobile_app_lorettas_phone
      data:
        title: Doorbell
        message: Someone is at the door
        data:
          image: /api/camera_proxy/camera.upstairs_live_view
    - service: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.edward_s_echo_show_21
        message: Someone is at the door
        data:
          type: push
    - service: media_player.play_media
      target:
        entity_id:
          - media_player.echo_show_15
          - media_player.edward_s_echo_show_21
      data:
        media_content_type: custom
        media_content_id: show front door camera
    - service: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: Someone is at the door
        data:
          type: announce
    - if:
        - condition: not
          conditions:
            - condition: state
              entity_id: media_player.lounge_fire_cube
              state: "off"
      then:
        - service: media_player.play_media
          target:
            entity_id: media_player.lounge_fire_cube
          data:
            media_content_type: custom
            media_content_id: show front door camera
    - if:
        - condition: not
          conditions:
            - condition: state
              entity_id: media_player.bedroom_fire_cube
              state: "off"
      then:
        - service: media_player.play_media
          target:
            entity_id: media_player.bedroom_fire_cube
          data:
            media_content_type: custom
            media_content_id: show front door camera

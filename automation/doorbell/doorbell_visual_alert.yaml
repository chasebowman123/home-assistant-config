- id: doorbell_visual_alert
  mode: single
  alias: "Doorbell - Visual Alert"
  description: "Flash lights and notify when doorbell rings."
  triggers:
    - platform: state
      entity_id:
        - binary_sensor.basement_door_ding
        - binary_sensor.upstairs_ding
        - binary_sensor.lobby_ding
      to: "on"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🔔 Doorbell"
        message: "Someone is at the {{ trigger.to_state.name | replace('_ding','') | replace('_',' ') }}."
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
    - action: light.turn_on
      target:
        entity_id: light.lounge_iris
      data:
        color_name: blue
        brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id: light.hallway_signe_light
      data:
        color_name: blue
        brightness_pct: 100
    - delay:
        seconds: 2
    - action: light.turn_on
      target:
        entity_id:
          - light.lounge_iris
          - light.hallway_signe_light
      data:
        color_name: red
        brightness_pct: 100
    - delay:
        seconds: 2
    - action: light.turn_on
      target:
        entity_id:
          - light.lounge_iris
          - light.hallway_signe_light
      data:
        color_name: blue
        brightness_pct: 100
    - delay:
        seconds: 2
    - action: light.turn_off
      target:
        entity_id:
          - light.lounge_iris
          - light.hallway_signe_light

# Door sensors activate relevant room lights when Edward Alone mode is on.
# NOTE: binary_sensor.outside_door_contact needs Zigbee sensor reinstalled.
# This trigger will be inactive until the sensor is paired — no errors caused.
- id: edward_alone_door_lights
  alias: "Edward Alone - All Door Sensor Lights"
  description: "Door sensors activate relevant room lights when Edward is alone."
  mode: single
  triggers:
    - platform: state
      entity_id: binary_sensor.outside_door_contact
      to: "on"
      id: front_door
    - platform: state
      entity_id: binary_sensor.lucas_room_door_contact
      to: "on"
      id: lucas_door
    - platform: state
      entity_id: binary_sensor.bathroom_sensor_contact
      to: "on"
      id: bathroom_door
  conditions:
    - condition: state
      entity_id: input_boolean.edward_alone
      state: "on"
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: front_door
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.hallway_spot_lights
              data:
                brightness_pct: 70
        - conditions:
            - condition: trigger
              id: lucas_door
          sequence:
            - action: light.turn_on
              target:
                entity_id:
                  - light.hallway_spot_lights
                  - light.lucass_room_spot_lights
              data:
                brightness_pct: 50
        - conditions:
            - condition: trigger
              id: bathroom_door
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.bathroom_spotlights
              data:
                brightness_pct: 100

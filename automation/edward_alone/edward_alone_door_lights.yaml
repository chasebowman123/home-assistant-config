- id: edward_alone_door_lights
  alias: "Edward Alone - All Door Sensor Lights"
  description: "Door sensors activate relevant room lights when Edward is alone."
  trigger:
    - platform: state
      entity_id: binary_sensor.front_door_sensor
      to: "on"
      id: front_door
    - platform: state
      entity_id: binary_sensor.lucas_room_door
      to: "on"
      id: lucas_door
    - platform: state
      entity_id: binary_sensor.bathroom_sensor_contact
      to: "on"
      id: bathroom_door
  condition:
    - condition: state
      entity_id: input_boolean.edward_alone
      state: "on"
  action:
    - choose:
        - conditions:
            - condition: trigger
              id: front_door
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.hallway_spots
              data:
                brightness_pct: 70
        - conditions:
            - condition: trigger
              id: lucas_door
          sequence:
            - service: light.turn_on
              target:
                entity_id:
                  - light.hallway_spots
                  - light.lucas_room_spots
              data:
                brightness_pct: 50
        - conditions:
            - condition: trigger
              id: bathroom_door
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.bathroom_spots

- id: edward_alone_hallway_motion
  alias: "Edward Alone - Hallway Motion Lights"
  description: "Motion activates hallway lights when Edward is alone. Dim at night."
  triggers:
    - platform: state
      entity_id: binary_sensor.kitchen_motion_sensor_occupancy
      to: "on"
  conditions:
    - condition: state
      entity_id: input_boolean.edward_alone
      state: "on"
  actions:
    - choose:
        - conditions:
            - condition: time
              after: "22:00:00"
              before: "07:00:00"
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.hallway_spot_lights
              data:
                brightness_pct: 20
                color_temp_kelvin: 2200
      default:
        - action: light.turn_on
          target:
            entity_id: light.hallway_spot_lights
          data:
            brightness_pct: 70
            color_temp_kelvin: 3000
    - wait_for_trigger:
        - platform: state
          entity_id: binary_sensor.kitchen_motion_sensor_occupancy
          to: "off"
          for:
            minutes: 10
    - action: light.turn_off
      target:
        entity_id: light.hallway_spot_lights
      data:
        transition: 5
  mode: restart

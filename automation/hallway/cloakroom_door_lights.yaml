- id: cloakroom_door_lights
  alias: Cloakroom Door Lights
  description: "Door open or close turns on cloakroom spotlight for 10 minutes, then slow 30s fade to off."
  mode: restart
  triggers:
    - platform: state
      entity_id: binary_sensor.cloakroom_sensor_contact
      from: "off"
      to: "on"
    - platform: state
      entity_id: binary_sensor.cloakroom_sensor_contact
      from: "on"
      to: "off"
  conditions: []
  actions:
    - action: light.turn_on
      target:
        entity_id: light.cloakroom_spotlights
      data:
        brightness: 255
        transition: 1
    - delay:
        minutes: 10
    - action: light.turn_off
      target:
        entity_id: light.cloakroom_spotlights
      data:
        transition: 30

# Night Time mode: turn off all hallway lights with gentle transition.
- id: hallway_lights_off_night
  alias: "Hallway - Lights Off Night Time"
  description: "Turn off hallway spots when Night Time mode activates."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.house
      to: "Night Time"
  actions:
    - action: light.turn_off
      target:
        entity_id:
          - light.hallway_spot_lights
          - light.hallway_lamp_post
          - light.hallway_signe_light
      data:
        transition: 5

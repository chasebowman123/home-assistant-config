- id: hallway_signe_always_on
  alias: Hallway Signe Always On
  description: Turn Signe back on if anything switches it off.
  mode: single
  triggers:
    - platform: state
      entity_id: light.hallway_signe_light
      to: "off"
      for:
        seconds: 5
  condition: []
  actions:
    - action: light.turn_on
      target:
        entity_id: light.hallway_signe_light
      data:
        color_temp_kelvin: 3000
        brightness: 200
        transition: 2

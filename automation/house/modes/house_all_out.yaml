- id: house_mode_all_out
  alias: "House - All Out Mode"
  description: "Everyone including dogs is out. No alarm, heating lowered, all off."
  trigger:
    - platform: state
      entity_id: input_select.house
      to: "All Out"
  action:
    - service: light.turn_off
      target:
        entity_id: all
    - service: media_player.media_stop
      target:
        entity_id:
          - media_player.lounge
          - media_player.kitchen
          - media_player.lucass_room
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.hallway
          - climate.lounge
          - climate.kitchen
          - climate.bedroom_2
          - climate.lucas_s_room
          - climate.office
      data:
        temperature: 18
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🏠 All Out Mode"
        message: "House empty. Heating lowered, everything off."

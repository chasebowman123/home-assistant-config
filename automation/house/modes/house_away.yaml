- id: house_mode_away
  mode: single
  alias: "House - Away Mode"
  description: "Holiday/extended absence. Alarm armed, frost protect heating, presence simulation."
  triggers:
    - platform: state
      entity_id: input_select.house
      to: "Away"
  actions:
    - action: light.turn_off
      target:
        entity_id: all
    - action: media_player.media_stop
      target:
        entity_id:
          - media_player.lounge
          - media_player.kitchen
          - media_player.lucass_room
    - action: climate.set_temperature
      target:
        entity_id:
          - climate.hallway
          - climate.lounge
          - climate.kitchen
          - climate.bedroom_2
          - climate.lucas_s_room
          - climate.office
      data:
        temperature: 14
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🏠 Away Mode Activated"
        message: "House locked down. Heating at frost protection, all systems off."

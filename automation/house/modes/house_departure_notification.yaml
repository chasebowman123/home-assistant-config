- id: house_departure_notification
  alias: "House - Departure Notification"
  mode: single
  description: "Both phones left home. Actionable notification to select mode."
  triggers:
    - platform: state
      entity_id: person.edward_eidam
      from: "home"
      to: "not_home"
    - platform: state
      entity_id: person.loretta_eidam
      from: "home"
      to: "not_home"
  conditions:
    - condition: state
      entity_id: person.edward_eidam
      state: "not_home"
    - condition: state
      entity_id: person.loretta_eidam
      state: "not_home"
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.house
          state: "Away"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🏠 Everyone's Out"
        message: "Both phones have left. Select a mode:"
        data:
          actions:
            - action: "SET_ALL_OUT"
              title: "All Out"
            - action: "SET_DOGS_ALONE"
              title: "Dogs Alone"
            - action: "SET_AWAY"
              title: "Away"

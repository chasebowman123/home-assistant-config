# Dogs Alone mode: comfortable heat, calming music, doorbell silenced, both phones notified.
- id: house_mode_dogs_alone
  alias: "House - Dogs Alone Mode"
  description: "People out, dogs home. Comfortable heat, calming music, doorbell silent."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.house
      to: "Dogs Alone"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.hallway_lamp_post
      data:
        brightness_pct: 40
    - action: light.turn_on
      target:
        entity_id: light.lounge_signe_light
      data:
        brightness_pct: 30
        color_temp_kelvin: 2700
    - action: media_player.volume_set
      target:
        entity_id: media_player.lounge
      data:
        volume_level: 0.15
    - action: media_player.play_media
      target:
        entity_id: media_player.lounge
      data:
        media_content_id: "Calm Dog Music"
        media_content_type: playlist
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🐕 Dogs Alone Mode"
        message: "Calming music on, doorbell silenced, comfortable heating."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "🐕 Dogs Alone Mode"
        message: "Calming music on, doorbell silenced, comfortable heating."

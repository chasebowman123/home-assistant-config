# House Mode → Auto
# Triggered when someone arrives home. Resumes normal operation.
- id: house_mode_auto
  alias: "House - Mode Auto"
  trigger:
    - platform: state
      entity_id: input_boolean.house_occupied
      to: "on"
  condition:
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.house
          state: "Auto"
  action:
    - service: input_select.select_option
      target:
        entity_id: input_select.house
      data:
        option: "Auto"

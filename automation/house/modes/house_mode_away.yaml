# House Mode → Away
# Triggered when house becomes unoccupied. Turns off non-essential systems.
- id: house_mode_away
  alias: "House - Mode Away"
  trigger:
    - platform: state
      entity_id: input_boolean.house_occupied
      to: "off"
      for:
        minutes: 5
  action:
    - service: input_select.select_option
      target:
        entity_id: input_select.house
      data:
        option: "Away"

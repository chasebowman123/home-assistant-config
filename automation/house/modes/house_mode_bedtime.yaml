# House Mode → Bedtime
# Triggered by the goodnight routine. Dims everything, arms security.
- id: house_mode_bedtime
  alias: "House - Mode Bedtime"
  trigger:
    - platform: state
      entity_id: input_boolean.goodnight_active
      to: "on"
  action:
    - service: input_select.select_option
      target:
        entity_id: input_select.house
      data:
        option: "Bedtime"

# House Mode → Quiet Off
# Returns to Auto when Lucas wakes up.
- id: house_mode_quiet_off
  alias: "House - Quiet Mode Off"
  trigger:
    - platform: state
      entity_id: input_boolean.lucas_napping
      to: "off"
  condition:
    - condition: state
      entity_id: input_select.house
      state: "Quiet"
  action:
    - service: input_select.select_option
      target:
        entity_id: input_select.house
      data:
        option: "Auto"

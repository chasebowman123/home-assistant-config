# Night Time mode: all off, sleep heating, Lucas monitoring, Alexa goodnight.
- id: house_mode_night_time
  alias: "House - Night Time Mode"
  description: "Adults to bed. All off, sleep heating, Lucas monitoring active."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.house
      to: "Night Time"
  actions:
    - action: light.turn_off
      target:
        entity_id: all
    - action: media_player.media_stop
      target:
        entity_id:
          - media_player.lounge
          - media_player.kitchen
          - media_player.lucass_room
          - media_player.bedroom
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.lucas_sleeping
    - action: climate.set_preset_mode
      target:
        entity_id:
          - climate.hallway
          - climate.lounge
          - climate.kitchen
          - climate.bedroom_2
          - climate.lucas_s_room
          - climate.office
      data:
        preset_mode: "sleep"
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🌑 Night Time"
        message: "Goodnight. All off, Lucas monitoring active."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "🌑 Night Time"
        message: "Goodnight. All off, Lucas monitoring active."
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.edward_s_echo_show_21
        message: "Goodnight! All lights are off. Sleep well."
        data:
          type: announce

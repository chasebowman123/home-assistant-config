- id: house_mode_night_time
  alias: "House - Night Time Mode"
  description: "Adults to bed. Arm home, nightlights only, doorbell silent, motion lights dim."
  trigger:
    - platform: state
      entity_id: input_select.house
      to: "Night Time"
  action:
    - service: light.turn_off
      target:
        entity_id: all
    - service: media_player.media_stop
      target:
        entity_id:
          - media_player.lounge
          - media_player.kitchen
          - media_player.lucass_room
          - media_player.bedroom
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.lucas_sleeping
    - service: climate.set_preset_mode
      target:
        entity_id:
          - climate.hallway
          - climate.lounge
          - climate.kitchen
          - climate.bedroom_2
          - climate.lucas_s_room
          - climate.office
      data:
        preset_mode: "sleep"
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🌑 Night Time"
        message: "Goodnight. All off, Lucas monitoring active."

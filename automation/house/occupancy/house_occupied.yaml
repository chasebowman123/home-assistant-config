# House Occupied
# Sets house_occupied boolean based on person tracking.
- id: house_occupied_on
  alias: "House - Occupied"
  trigger:
    - platform: state
      entity_id:
        - person.edward_eidam
        - person.loretta_eidam
      to: "home"
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.house_occupied

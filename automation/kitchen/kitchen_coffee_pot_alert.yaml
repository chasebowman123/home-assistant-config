# Coffee Pot Left On
- id: alert_coffee_pot_left_on
  alias: "Alert - Coffee Pot Left On"
  trigger:
    - platform: numeric_state
      entity_id: sensor.unnamed_p304m_coffee_pot_current_consumption
      above: 5
      for:
        hours: 2
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "☕ Coffee Pot Still On"
        message: "The coffee pot has been on for over 2 hours. Tap to turn off."
        data:
          actions:
            - action: TURN_OFF_COFFEE
              title: Turn Off
  mode: single

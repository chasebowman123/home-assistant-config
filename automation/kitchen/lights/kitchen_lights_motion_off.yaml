# Kitchen Motion Lights Off
- id: kitchen_lights_motion_off
  alias: "Kitchen - Motion Lights Off"
  trigger:
    - platform: state
      entity_id: binary_sensor.hallway_kitchen_motion_sensor_occupancy
      to: "off"
      for:
        minutes: 10
  action:
    - service: light.turn_off
      target:
        entity_id: light.kitchen_spotlights
  mode: single

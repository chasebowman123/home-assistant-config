# Kitchen → Cooking
- id: kitchen_state_cooking
  alias: "Kitchen - State Cooking"
  trigger:
    - platform: state
      entity_id: input_select.kitchen
      to: "Cooking"
  action:
    - service: light.turn_on
      target:
        entity_id: light.kitchen_spotlights
      data:
        brightness_pct: 100
        color_temp_kelvin: 4000

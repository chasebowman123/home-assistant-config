# Auto Movie Detection Off
# When TV stops playing for 5 min, return to Auto.
- id: lounge_auto_movie_off
  alias: "Lounge - Auto Movie Detection Off"
  trigger:
    - platform: state
      entity_id: media_player.55_oled
      from: "playing"
      for:
        minutes: 5
  condition:
    - condition: state
      entity_id: input_select.lounge
      state: "Movie"
  action:
    - service: input_select.select_option
      target:
        entity_id: input_select.lounge
      data:
        option: Auto

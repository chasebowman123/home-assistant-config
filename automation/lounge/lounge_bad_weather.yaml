# Bad Weather Ambient
# Turns on piano lamp when weather is poor.
- id: lounge_bad_weather
  alias: "Lounge - Bad Weather Ambient"
  trigger:
    - platform: state
      entity_id: input_boolean.bad_weather
      to: "on"
  condition:
    - condition: state
      entity_id: input_select.lounge
      state: "Auto"
    - condition: state
      entity_id: input_boolean.house_occupied
      state: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.lounge_piano_lamp
      data:
        brightness_pct: 50
        color_temp_kelvin: 2700

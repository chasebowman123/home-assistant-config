# Lounge → Music
- id: lounge_state_music
  alias: "Lounge - State Music"
  trigger:
    - platform: state
      entity_id: input_select.lounge
      to: "Music"
  action:
    - service: light.turn_on
      target:
        entity_id:
          - light.lounge_piano_lamp
          - light.lounge_strip_light
      data:
        brightness_pct: 60

# Lounge Movie with Sync: spots off, dim ambiance, Hue Sync Box on.
- id: lounge_movie_with_sync
  alias: "Lounge - Movie with Sync"
  description: "Spots off, strip/signe dim ambiance, Hue Sync Box ON."
  mode: single
  trigger:
    - platform: state
      entity_id: input_select.lounge
      to: "Movie with Sync"
  action:
    - service: light.turn_off
      target:
        entity_id: light.lounge_spotlights
    - service: light.turn_on
      target:
        entity_id: light.lounge_strip_light
      data:
        brightness_pct: 15
        color_temp_kelvin: 2200
    - service: light.turn_on
      target:
        entity_id: light.lounge_signe_light
      data:
        brightness_pct: 15
        color_temp_kelvin: 2200
    - service: switch.turn_on
      target:
        entity_id: switch.lounge_hue_sync_box

# Lounge Movie without Sync: spots off, dim ambiance, Sync Box off.
- id: lounge_movie_without_sync
  alias: "Lounge - Movie without Sync"
  description: "Spots off, strip/signe dim ambiance, Sync Box OFF."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.lounge
      to: "Movie without Sync"
  actions:
    - action: light.turn_off
      target:
        entity_id: light.lounge_spotlights
    - action: switch.turn_off
      target:
        entity_id: switch.unnamed_p304m_hue_sync_box
    - action: light.turn_on
      target:
        entity_id: light.lounge_strip_light
      data:
        brightness_pct: 15
        color_temp_kelvin: 2200
    - action: light.turn_on
      target:
        entity_id: light.lounge_signe_light
      data:
        brightness_pct: 15
        color_temp_kelvin: 2200

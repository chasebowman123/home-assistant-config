- id: lounge_music
  alias: "Lounge - Music"
  description: "Piano lamp + strip at 60%."
  trigger:
    - platform: state
      entity_id: input_select.lounge
      to: "Music"
  action:
    - service: light.turn_off
      target:
        entity_id: light.lounge_spots
    - service: switch.turn_off
      target:
        entity_id: switch.lounge_hue_sync_box
    - service: light.turn_on
      target:
        entity_id: light.lounge_piano_lamp
      data:
        brightness_pct: 60
    - service: light.turn_on
      target:
        entity_id: light.lounge_light_strip
      data:
        brightness_pct: 60
        color_temp_kelvin: 2700

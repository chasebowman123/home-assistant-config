# Lounge Music mode: piano lamp + strip at 60%, Sync Box off.
- id: lounge_music
  alias: "Lounge - Music"
  description: "Piano lamp + strip at 60%, Sync Box off."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.lounge
      to: "Music"
  actions:
    - action: light.turn_off
      target:
        entity_id: light.lounge_spotlights
    - action: switch.turn_off
      target:
        entity_id: switch.unnamed_p304m_hue_sync_box
    - action: light.turn_on
      target:
        entity_id: light.lounge_piano_lamp
      data:
        brightness_pct: 60
    - action: light.turn_on
      target:
        entity_id: light.lounge_strip_light
      data:
        brightness_pct: 60
        color_temp_kelvin: 2700

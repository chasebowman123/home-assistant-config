# Lounge Standard mode: normal lighting, Sync Box off.
- id: lounge_standard
  alias: "Lounge - Standard"
  description: "Normal lighting, Sync Box off."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.lounge
      to: "Standard"
  actions:
    - action: switch.turn_off
      target:
        entity_id: switch.unnamed_p304m_hue_sync_box
    - action: light.turn_on
      target:
        entity_id: light.lounge_spotlights
      data:
        brightness_pct: 80
        color_temp_kelvin: 3000
    - action: light.turn_on
      target:
        entity_id: light.lounge_signe_light
      data:
        brightness_pct: 50
        color_temp_kelvin: 3000
    - action: light.turn_on
      target:
        entity_id: light.lounge_strip_light
      data:
        brightness_pct: 50
        color_temp_kelvin: 3000
    - action: light.turn_on
      target:
        entity_id: light.lounge_piano_lamp
      data:
        brightness_pct: 60
        color_temp_kelvin: 3000

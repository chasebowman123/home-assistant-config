- id: lounge_standard
  alias: "Lounge - Standard"
  description: "Normal lighting, Sync Box off."
  trigger:
    - platform: state
      entity_id: input_select.lounge
      to: "Standard"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.lounge_hue_sync_box
    - service: light.turn_on
      target:
        entity_id: light.lounge_spotlights
      data:
        brightness_pct: 80
        color_temp_kelvin: 3000
    - service: light.turn_on
      target:
        entity_id: light.lounge_wall_lights
      data:
        brightness_pct: 50
        color_temp_kelvin: 3000
    - service: light.turn_on
      target:
        entity_id: light.lounge_strip_light
      data:
        brightness_pct: 50
        color_temp_kelvin: 3000

# Bad Weather boolean on: cosy lounge scene + Alexa announcement.
- id: lounge_bad_weather
  alias: "Lounge - Bad Weather Scene"
  description: "Bad weather mode: cosy lighting, piano lamp on, Alexa announcement."
  mode: single
  triggers:
    - platform: state
      entity_id: input_boolean.bad_weather
      to: "on"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.lounge_piano_lamp
      data:
        brightness_pct: 60
        color_temp_kelvin: 2200
    - action: light.turn_on
      target:
        entity_id: light.lounge_spotlights
      data:
        brightness_pct: 40
        color_temp_kelvin: 2700
    - action: light.turn_on
      target:
        entity_id: light.hallway_spot_lights
      data:
        brightness_pct: 30
        color_temp_kelvin: 2200
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: "Cosy mode activated for the bad weather outside."
        data:
          type: announce

- id: lucas_bathroom_door_lights
  alias: Lucas Bathroom Door Lights
  description: "Door open turns on spotlights at medium brightness with smooth transition. No auto-off."
  mode: single
  triggers:
    - platform: state
      entity_id: binary_sensor.lucas_bathroom_sensor_contact
      to: "off"
  conditions: []
  actions:
    - action: light.turn_on
      target:
        entity_id: light.lucass_bathroom_spotlights
      data:
        brightness: 200
        transition: 3

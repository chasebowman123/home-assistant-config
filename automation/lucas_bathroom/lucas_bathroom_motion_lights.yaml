# Motion in Lucas bathroom: lights on if off, auto-off 5 min after motion clears.
- id: lucas_bathroom_motion_lights
  alias: "Lucas Bathroom - Motion Lights"
  description: "Motion activates bathroom lights if off, off 5 min after motion clears. Skips if lights already on."
  mode: restart
  triggers:
    - platform: state
      entity_id: binary_sensor.lucas_bathroom_sensor_contact
      to: "on"
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.house
          state: "Away"
        - condition: state
          entity_id: input_select.house
          state: "All Out"
    - condition: state
      entity_id: light.lucass_bathroom_spotlights
      state: "off"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.lucass_bathroom_spotlights
      data:
        brightness_pct: 100
        transition: 1
    - wait_for_trigger:
        - platform: state
          entity_id: binary_sensor.lucas_bathroom_sensor_contact
          to: "off"
          for:
            minutes: 5
    - action: light.turn_off
      target:
        entity_id: light.lucass_bathroom_spotlights
      data:
        transition: 5

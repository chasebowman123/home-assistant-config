# Poor air quality in Lucas room: notify both phones + Alexa announcement.
- id: lucas_air_quality_poor
  alias: "Lucas Room - Air Quality Poor"
  description: "Notify both phones and Alexa when Lucas room air quality is poor."
  mode: single
  triggers:
    - platform: numeric_state
      entity_id: sensor.lucas_room_air_quality_index
      above: 100
      for:
        minutes: 10
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🌬️ Lucas Room Air Quality"
        message: "Air quality in Lucas's room is poor (AQI: {{ states('sensor.lucas_room_air_quality_index') }}). Consider ventilating."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "🌬️ Lucas Room Air Quality"
        message: "Air quality in Lucas's room is poor (AQI: {{ states('sensor.lucas_room_air_quality_index') }}). Consider ventilating."
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.lounge_echo_hub
        message: "Attention: air quality in Lucas's room is poor. Please ventilate."
        data:
          type: announce

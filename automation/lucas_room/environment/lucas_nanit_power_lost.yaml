- id: lucas_nanit_power_lost
  alias: "Lucas - Nanit Lost Power"
  description: "Nanit power drops for 2 minutes: critical alert + Alexa."
  trigger:
    - platform: state
      entity_id: binary_sensor.nanit_power
      to: "off"
      for:
        minutes: 2
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🚨 Nanit Power Lost"
        message: "Nanit baby monitor has lost power for 2 minutes!"
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
    - service: notify.alexa_media
      data:
        target:
          - media_player.kitchen
        message: "Warning: Nanit baby monitor has lost power."
        data:
          type: announce

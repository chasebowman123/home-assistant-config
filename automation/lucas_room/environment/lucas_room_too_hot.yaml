# Lucas room too hot (>24°C): notify both phones + Alexa.
- id: lucas_room_too_hot
  alias: "Lucas Room - Too Hot"
  description: "Alert if Lucas room temperature rises above 24°C."
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: sensor.lucas_room_temp_temperature
      above: 24
      for:
        minutes: 10
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🥵 Lucas Room Hot"
        message: "Lucas's room is {{ states('sensor.lucas_room_temp_temperature') }}°C — above 24°C. Ventilate if needed."
    - service: notify.mobile_app_lorettas_phone
      data:
        title: "🥵 Lucas Room Hot"
        message: "Lucas's room is {{ states('sensor.lucas_room_temp_temperature') }}°C — above 24°C. Ventilate if needed."
    - service: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.lounge_echo_hub
        message: "Lucas's room is too hot. Please ventilate."
        data:
          type: announce

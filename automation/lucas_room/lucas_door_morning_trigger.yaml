# Lucas Door Morning
# First time Lucas opens his door after 7am, trigger morning routine.
- id: lucas_door_morning_trigger
  alias: "Lucas Door Morning - Trigger Morning Routine"
  trigger:
    - platform: state
      entity_id: binary_sensor.lucas_room_door_contact
  condition:
    - condition: time
      after: "07:00:00"
      before: "11:00:00"
    - condition: template
      value_template: >
        {{ as_timestamp(now()) - as_timestamp(states.automation.lucas_door_morning_trigger_morning_routine.attributes.last_triggered | default(0)) > 43200 }}
  action:
    - service: script.morning_routine
  mode: single

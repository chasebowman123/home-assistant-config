# Lucas Door Night Alert
# Flash lounge lights red when Lucas's door opens between 10pm and 7am.
- id: lucas_door_night_alert
  alias: "Lucas Door Night Alert - Lounge Red Flash"
  trigger:
    - platform: state
      entity_id: binary_sensor.lucas_room_door_contact
  condition:
    - condition: time
      after: "22:00:00"
      before: "07:00:00"
  action:
    - service: scene.create
      data:
        scene_id: iris_snapshot
        snapshot_entities:
          - light.lounge_iris
          - light.lounge_signe_light
    - service: light.turn_on
      target:
        entity_id:
          - light.lounge_iris
          - light.lounge_signe_light
      data:
        rgb_color: [255, 0, 0]
        brightness: 255
    - delay:
        seconds: 1
    - service: scene.turn_on
      target:
        entity_id: scene.iris_snapshot
  mode: single

# Nanit Lost Power Alert
# Critical alert when baby monitor power consumption drops to 0.
- id: alert_nanit_lost_power
  alias: "Alert - Nanit Lost Power"
  trigger:
    - platform: numeric_state
      entity_id: sensor.unnamed_p304m_nanit_current_consumption
      below: 1
      for:
        minutes: 2
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🚨 CRITICAL: Nanit Offline"
        message: "Baby monitor has lost power! Check Lucas's room immediately."
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1
    - service: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
          - media_player.bedroom_2
        message: "Warning! The baby monitor in Lucas's room has lost power!"
        data:
          type: announce
  mode: single

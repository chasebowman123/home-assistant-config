- id: lucas_room_bedtime
  alias: "Lucas - Bedtime"
  description: "All off except Go nightlight at 3%, lullaby with volume fade."
  trigger:
    - platform: state
      entity_id: input_select.lucas_room
      to: "Bedtime"
  action:
    - service: light.turn_off
      target:
        entity_id:
          - light.lucas_room_spots
          - light.lucas_room_iris
          - light.lucas_cloud_lamp
    - service: light.turn_on
      target:
        entity_id: light.lucas_go_nightlight
      data:
        brightness_pct: 3
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.lucas_sleeping
    - service: media_player.volume_set
      target:
        entity_id: media_player.lucas_room_sonos
      data:
        volume_level: 0.12
    - service: media_player.play_media
      target:
        entity_id: media_player.lucas_room_sonos
      data:
        media_content_id: "Lullabies"
        media_content_type: playlist
    - delay:
        minutes: 20
    - service: media_player.volume_set
      target:
        entity_id: media_player.lucas_room_sonos
      data:
        volume_level: 0.05
    - delay:
        minutes: 10
    - service: media_player.media_stop
      target:
        entity_id: media_player.lucas_room_sonos

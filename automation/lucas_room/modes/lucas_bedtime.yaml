- id: lucas_room_bedtime
  mode: restart
  alias: "Lucas - Bedtime"
  description: "All off except Go nightlight at 3%, lullaby with volume fade."
  trigger:
    - platform: state
      entity_id: input_select.lucas_room
      to: "Bedtime"
  action:
    - service: light.turn_off
      target:
        entity_id:
          - light.lucass_room_spot_lights
          - light.lucass_room_iris
          - switch.cloud_lamp
    - service: light.turn_on
      target:
        entity_id: light.hue_color_lamp_1
      data:
        brightness_pct: 3
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.lucas_sleeping
    - service: media_player.volume_set
      target:
        entity_id: media_player.lucass_room
      data:
        volume_level: 0.12
    - service: media_player.play_media
      target:
        entity_id: media_player.lucass_room
      data:
        media_content_id: "Lullabies"
        media_content_type: playlist
    - delay:
        minutes: 20
    - service: media_player.volume_set
      target:
        entity_id: media_player.lucass_room
      data:
        volume_level: 0.05
    - delay:
        minutes: 10
    - service: media_player.media_stop
      target:
        entity_id: media_player.lucass_room

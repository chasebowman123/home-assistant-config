- id: lucas_room_night_time
  alias: "Lucas - Night Time"
  description: "Everything off, door monitoring, Nanit monitoring."
  trigger:
    - platform: state
      entity_id: input_select.lucas_room
      to: "Night Time"
  action:
    - service: light.turn_off
      target:
        entity_id:
          - light.lucas_room_spots
          - light.lucas_room_iris
          - light.lucas_cloud_lamp
          - light.lucas_go_nightlight
    - service: media_player.media_stop
      target:
        entity_id: media_player.lucas_room_sonos
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.lucas_sleeping

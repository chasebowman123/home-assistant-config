- id: lucas_room_night_time
  alias: "Lucas - Night Time"
  description: "Everything off, door monitoring, Nanit monitoring."
  trigger:
    - platform: state
      entity_id: input_select.lucas_room
      to: "Night Time"
  action:
    - service: light.turn_off
      target:
        entity_id:
          - light.lucass_room_spot_lights
          - light.lucass_room_iris
          - switch.cloud_lamp
          - light.hue_color_lamp_1
    - service: media_player.media_stop
      target:
        entity_id: media_player.lucass_room
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.lucas_sleeping

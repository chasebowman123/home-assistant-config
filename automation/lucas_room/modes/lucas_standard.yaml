- id: lucas_room_standard
  alias: "Lucas - Standard"
  description: "Normal daytime, regular lights."
  trigger:
    - platform: state
      entity_id: input_select.lucas_room
      to: "Standard"
  action:
    - service: light.turn_on
      target:
        entity_id: light.lucass_room_spot_lights
      data:
        brightness_pct: 80
        color_temp_kelvin: 3500
    - service: light.turn_off
      target:
        entity_id:
          - light.lucass_room_iris
          - switch.cloud_lamp
          - light.hue_color_lamp_1

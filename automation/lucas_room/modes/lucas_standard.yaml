- id: lucas_room_standard
  alias: "Lucas - Standard"
  description: "Normal daytime, regular lights."
  trigger:
    - platform: state
      entity_id: input_select.lucas_room
      to: "Standard"
  action:
    - service: light.turn_on
      target:
        entity_id: light.lucas_room_spots
      data:
        brightness_pct: 80
        color_temp_kelvin: 3500
    - service: light.turn_off
      target:
        entity_id:
          - light.lucas_room_iris
          - light.lucas_cloud_lamp
          - light.lucas_go_nightlight

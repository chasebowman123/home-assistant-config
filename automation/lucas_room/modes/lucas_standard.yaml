# Lucas Room Standard mode: normal daytime lighting.
- id: lucas_room_standard
  alias: "Lucas Room - Standard"
  description: "Normal daytime lighting in Lucas's room."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.lucas_room
      to: "Standard"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.lucass_room_spot_lights
      data:
        brightness_pct: 80
        color_temp_kelvin: 4000
        transition: 3
    - action: light.turn_on
      target:
        entity_id: light.lucass_room_pendant_light
      data:
        brightness_pct: 70
        color_temp_kelvin: 3500
    - action: light.turn_off
      target:
        entity_id: light.lucass_room

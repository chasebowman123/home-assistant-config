# Lucas Wind Down mode: dim warm lights, Alexa wind-down message.
- id: lucas_room_wind_down
  alias: "Lucas Room - Wind Down"
  description: "Begin Lucas wind-down: dim warm lights, Alexa soothing message."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.lucas_room
      to: "Wind Down"
  actions:
    - action: light.turn_off
      target:
        entity_id: light.lucass_room_spotlights
    - action: light.turn_on
      target:
        entity_id: light.lucass_room_pendant_light
      data:
        brightness_pct: 20
        color_temp_kelvin: 2200
        transition: 5
    - action: light.turn_on
      target:
        entity_id: light.lucas_s_room_go
      data:
        brightness_pct: 10
        color_temp_kelvin: 2000
    - action: notify.alexa_media
      data:
        target:
          - media_player.lucas_s_echo_show
        message: "Time to wind down, Lucas. Lights are getting cosy for bedtime."
        data:
          type: announce

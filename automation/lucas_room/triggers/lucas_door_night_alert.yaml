- id: lucas_door_night_alert
  alias: Lucas Door Night Alert
  description: "Lucas door opens after Goodnight Lucas script runs (1 min grace) while lucas_sleeping on → red/blue flash in lounge then restore."
  mode: single
  triggers:
    - platform: state
      entity_id: binary_sensor.lucas_room_door_contact
  conditions:
    - condition: state
      entity_id: input_boolean.lucas_sleeping
      state: "on"
      for:
        minutes: 1
  actions:
    - action: scene.create
      data:
        scene_id: lucas_alert_snapshot
        snapshot_entities:
          - light.lounge_signe_light
          - light.lounge_iris
          - light.lounge_strip_light
          - light.lounge_tv
    - repeat:
        count: 4
        sequence:
          - action: light.turn_on
            target:
              entity_id:
                - light.lounge_signe_light
                - light.lounge_tv
            data:
              rgb_color:
                - 255
                - 0
                - 0
              brightness: 255
              transition: 0.3
          - action: light.turn_on
            target:
              entity_id:
                - light.lounge_iris
                - light.lounge_strip_light
            data:
              rgb_color:
                - 0
                - 0
                - 255
              brightness: 255
              transition: 0.3
          - delay:
              milliseconds: 500
          - action: light.turn_off
            target:
              entity_id:
                - light.lounge_signe_light
                - light.lounge_iris
                - light.lounge_strip_light
                - light.lounge_tv
            data:
              transition: 0.3
          - delay:
              milliseconds: 500
    - delay:
        seconds: 1
    - action: scene.turn_on
      target:
        entity_id: scene.lucas_alert_snapshot
      data:
        transition: 2

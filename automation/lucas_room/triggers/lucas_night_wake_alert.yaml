- id: lucas_night_wake_alert
  mode: single
  alias: "Lucas - Night Wake Alert"
  description: "Lucas door opens at night: notify + flash lounge lights."
  trigger:
    - platform: state
      entity_id: binary_sensor.lucas_room_door_contact
      to: "on"
  condition:
    - condition: time
      after: "22:00:00"
      before: "07:00:00"
    - condition: state
      entity_id: input_boolean.lucas_sleeping
      state: "on"
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "👶 Lucas Awake"
        message: "Lucas's door opened at {{ now().strftime('%H:%M') }}."
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 0.8
    - service: light.turn_on
      target:
        entity_id: light.lounge_io
      data:
        color_name: yellow
        brightness_pct: 100
    - delay:
        seconds: 3
    - service: light.turn_off
      target:
        entity_id: light.lounge_io
    - delay:
        seconds: 2
    - service: light.turn_on
      target:
        entity_id: light.lounge_io
      data:
        color_name: yellow
        brightness_pct: 100
    - delay:
        seconds: 3
    - service: light.turn_off
      target:
        entity_id: light.lounge_io

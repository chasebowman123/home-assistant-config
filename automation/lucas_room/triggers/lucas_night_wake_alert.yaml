# Lucas wakes at night (after 10pm, before 5am): notify both phones + Echo Show.
- id: lucas_night_wake_alert
  alias: "Lucas - Night Wake Alert"
  description: "Alert when Lucas wakes during the night. Notify both phones."
  mode: single
  triggers:
    - platform: state
      entity_id: binary_sensor.lucass_room_motion
      to: "on"
  conditions:
    - condition: time
      after: "22:00:00"
      before: "05:00:00"
    - condition: state
      entity_id: input_boolean.lucas_sleeping
      state: "on"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🌙 Lucas Night Wake"
        message: "Lucas has woken up at {{ now().strftime('%H:%M') }}."
        data:
          push:
            sound:
              name: default
              critical: 0
              volume: 0.8
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "🌙 Lucas Night Wake"
        message: "Lucas has woken up at {{ now().strftime('%H:%M') }}."
        data:
          push:
            sound:
              name: default
              critical: 0
              volume: 0.8
    - action: media_player.play_media
      target:
        entity_id:
          - media_player.echo_show_15
          - media_player.edward_s_echo_show_21
      data:
        media_content_type: custom
        media_content_id: show lucas camera

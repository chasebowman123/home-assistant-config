- id: lucas_sleeping_toggle_on
  alias: Lucas Sleeping Toggle On
  description: "When lucas_sleeping turns on, turn off hallway Flo table lamp and wall lights with slow fade."
  mode: single
  triggers:
    - platform: state
      entity_id: input_boolean.lucas_sleeping
      to: "on"
  condition: []
  actions:
    - action: light.turn_off
      target:
        entity_id:
          - light.hue_color_lamp_1
          - light.hue_white_light_2
      data:
        transition: 10

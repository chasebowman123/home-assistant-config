# Annual boiler service reminder on 1st September.
- id: boiler_service_reminder
  alias: "Maintenance - Boiler Service Reminder"
  description: "Annual reminder on 1st September to book the boiler service."
  mode: single
  triggers:
    - platform: time
      at: "09:00:00"
  conditions:
    - condition: template
      value_template: "{{ now().month == 9 and now().day == 1 }}"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🔧 Boiler Service Due"
        message: "Annual reminder: book the boiler service for this year."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "🔧 Boiler Service Due"
        message: "Annual reminder: book the boiler service for this year."

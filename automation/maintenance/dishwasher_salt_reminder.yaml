# Dishwasher salt nearly empty: notify both phones + Alexa.
- id: dishwasher_salt_reminder
  alias: "Maintenance - Dishwasher Salt Low"
  description: "Notify when dishwasher salt indicator triggers."
  mode: single
  triggers:
    - platform: state
      entity_id: sensor.dishwasher_salt_nearly_empty
      to: "present"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🧂 Dishwasher Salt Low"
        message: "Dishwasher salt is nearly empty. Please refill."
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: "Reminder: the dishwasher needs more salt."
        data:
          type: announce

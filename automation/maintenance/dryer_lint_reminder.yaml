# Monthly reminder to clean the dryer lint filter.
- id: dryer_lint_reminder
  alias: "Maintenance - Dryer Lint Reminder"
  description: "Monthly reminder to clean the tumble dryer lint filter."
  mode: single
  triggers:
    - platform: time
      at: "09:00:00"
  conditions:
    - condition: template
      value_template: "{{ now().day == 15 }}"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🧺 Dryer Lint Filter"
        message: "Monthly reminder: clean the tumble dryer lint filter."
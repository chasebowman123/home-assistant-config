# Twice-yearly reminder to clean the gutters (April + October).
- id: gutter_clean
  alias: "Maintenance - Gutter Clean Reminder"
  description: "Twice-yearly reminder to clean gutters (April and October)."
  mode: single
  triggers:
    - platform: time
      at: "09:00:00"
  conditions:
    - condition: template
      value_template: "{{ now().day == 1 and now().month in [4, 10] }}"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🏠 Gutter Clean Reminder"
        message: "Time to arrange a gutter clean."
- id: hvac_filter_reminder
  alias: "Maintenance - HVAC Filter"
  description: "Quarterly reminder to check/replace HVAC filters."
  trigger:
    - platform: time
      at: "10:00:00"
  condition:
    - condition: template
      value_template: "{{ now().day == 1 and now().month in [1, 4, 7, 10] }}"
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🔧 HVAC Filter Reminder"
        message: "Time to check/replace the HVAC filters. Last reminded 3 months ago."

# Quarterly reminder to check/replace HVAC filters.
- id: hvac_filter_reminder
  alias: "Maintenance - HVAC Filter Reminder"
  description: "Quarterly reminder to check and replace HVAC filters."
  mode: single
  triggers:
    - platform: time
      at: "09:00:00"
  conditions:
    - condition: template
      value_template: "{{ now().day == 1 and now().month in [1, 4, 7, 10] }}"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "💨 HVAC Filter Check"
        message: "Quarterly reminder: check and replace HVAC filters if needed."
# Monthly reminder to run a drum-clean cycle on the washing machine.
- id: washing_machine_clean
  alias: "Maintenance - Washing Machine Drum Clean"
  description: "Monthly reminder to run a drum-clean cycle on the washing machine."
  mode: single
  triggers:
    - platform: time
      at: "09:00:00"
  conditions:
    - condition: template
      value_template: "{{ now().day == 1 }}"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🫧 Washing Machine Clean"
        message: "Monthly reminder: run a drum-clean cycle on the washing machine."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "🫧 Washing Machine Clean"
        message: "Monthly reminder: run a drum-clean cycle on the washing machine."

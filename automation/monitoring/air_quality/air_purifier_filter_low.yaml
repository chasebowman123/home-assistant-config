# Air purifier filter low: notify both phones + Alexa.
- id: air_purifier_filter_low
  alias: "Monitoring - Air Purifier Filter Low"
  description: "Notify when air purifier filter needs replacing."
  mode: single
  triggers:
    - platform: numeric_state
      entity_id: sensor.core_400s_filter_lifetime
      below: 20
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🌀 Air Purifier Filter"
        message: "Air purifier filter is at {{ states('sensor.core_400s_filter_lifetime') }}% — order a replacement."
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: "Reminder: the air purifier filter needs replacing soon."
        data:
          type: announce

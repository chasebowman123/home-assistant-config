# Poor house air quality: notify both phones + Alexa recommendation to ventilate.
- id: air_quality_poor_house
  alias: "Monitoring - House Air Quality Poor"
  description: "Notify both phones when house-wide air quality is poor."
  mode: single
  triggers:
    - platform: numeric_state
      entity_id: sensor.lounge_air_quality_index
      above: 100
      for:
        minutes: 10
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🌬️ Poor Air Quality"
        message: "House air quality is poor (AQI: {{ states('sensor.lounge_air_quality_index') }}). Open windows or run purifier."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "🌬️ Poor Air Quality"
        message: "House air quality is poor (AQI: {{ states('sensor.lounge_air_quality_index') }}). Open windows or run purifier."
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.lounge_echo_hub
        message: "Air quality in the house is poor. Consider opening windows or running the air purifier."
        data:
          type: announce

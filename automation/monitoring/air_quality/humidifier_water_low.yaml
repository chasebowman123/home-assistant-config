# Alert when living room humidifier water is low.
- id: humidifier_water_low
  alias: "Monitoring - Humidifier Water Low"
  description: "Alert when the living room humidifier has a water shortage."
  mode: single
  triggers:
    - trigger: state
      entity_id: binary_sensor.living_room_humidifier_water_shortage
      to: "on"
  conditions: []
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "💧 Humidifier Water Low"
        message: "The living room humidifier needs a refill."
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.lounge_echo_hub
        message: "The living room humidifier needs water. Please refill."
        data:
          type: announce

# Humidifier water tank low: notify both phones + Alexa.
- id: humidifier_water_low
  alias: "Monitoring - Humidifier Water Low"
  description: "Notify when humidifier water tank needs refilling."
  mode: single
  triggers:
    - platform: state
      entity_id: sensor.humidifier_water_level
      to: "low"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "💧 Humidifier Water Low"
        message: "The humidifier water tank is low. Please refill it."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "💧 Humidifier Water Low"
        message: "The humidifier water tank is low. Please refill it."
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: "Reminder: the humidifier needs refilling."
        data:
          type: announce

# Alert if key appliances are still on at midnight.
- id: appliance_left_on_overnight
  alias: "Monitoring - Appliance Left On Overnight"
  description: "Alert at midnight if key appliances are still on."
  mode: single
  triggers:
    - trigger: time
      at: "00:00:00"
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: sensor.oven
          state: "on"
        - condition: numeric_state
          entity_id: sensor.washing_machine_power
          above: 5
        - condition: state
          entity_id: sensor.dishwasher_operation_state
          state: "running"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "⚠️ Appliance Left On"
        message: >
          Appliance still on at midnight:
          Oven: {{ states('sensor.oven') }},
          Washing Machine: {{ states('sensor.washing_machine_power') }}W,
          Dishwasher: {{ states('sensor.dishwasher_operation_state') }}
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.lounge_echo_hub
        message: "Warning: an appliance has been left on overnight. Please check the oven or washing machine."
        data:
          type: announce

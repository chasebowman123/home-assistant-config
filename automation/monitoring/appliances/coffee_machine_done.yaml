# Coffee machine cycle finished: Alexa announcement + phone notification.
- id: coffee_machine_done
  alias: "Monitoring - Coffee Machine Done"
  description: "Notify when coffee machine finishes its cycle."
  mode: single
  triggers:
    - platform: numeric_state
      entity_id: sensor.unnamed_p304m_coffee_pot_current_consumption
      below: 10
      for:
        minutes: 2
  conditions:
    - condition: numeric_state
      entity_id: sensor.unnamed_p304m_coffee_pot_current_consumption
      above: 0
      for:
        minutes: 0
  actions:
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
          - media_player.echo_show_15
        message: "Your coffee is ready!"
        data:
          type: announce
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "☕ Coffee Ready"
        message: "Coffee machine has finished."
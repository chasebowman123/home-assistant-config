# Dishwasher done: notify both phones + Alexa announcement.
- id: dishwasher_done
  alias: "Monitoring - Dishwasher Done"
  description: "Notify both phones and Alexa when dishwasher finishes."
  mode: single
  triggers:
    - platform: state
      entity_id: sensor.dishwasher_operation_state
      to:
        - "Ready"
        - "Finished"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🍽️ Dishwasher Done"
        message: "Dishwasher is done! Time to unload."
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.edward_s_echo_show_21
        message: "Dishwasher is done"
        data:
          type: push
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: "The dishwasher is done. Ready to unload."
        data:
          type: announce

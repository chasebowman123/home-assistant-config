- id: dishwasher_salt_low
  alias: Dishwasher Salt Low
  description: Notify when dishwasher salt sensor reports nearly empty.
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.dishwasher_salt_nearly_empty
      to: present
  condition: []
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: Dishwasher Salt
        message: Dishwasher salt is nearly empty. Please refill.
    - service: notify.mobile_app_lorettas_phone
      data:
        title: Dishwasher Salt
        message: Dishwasher salt is nearly empty. Please refill.

- id: dryer_done
  alias: Tumble Dryer Done
  description: Notify Edward and Loretta and announce via Alexa when tumble dryer cycle completes.
  mode: single
  triggers:
    - platform: state
      entity_id: sensor.tumble_dryer_machine_state
      to: stop
  condition: []
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: Tumble Dryer
        message: Tumble dryer is done!
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.edward_s_echo_show_21
        message: Tumble dryer is done
        data:
          type: push
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: Tumble dryer is done
        data:
          type: announce

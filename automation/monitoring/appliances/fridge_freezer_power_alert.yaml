# Alert if fridge/freezer temperature rises abnormally (suggests power failure).
- id: fridge_freezer_power_alert
  alias: "Monitoring - Fridge/Freezer Power Alert"
  description: "Alert if freezer temperature rises above -10°C, suggesting power loss."
  mode: single
  triggers:
    - trigger: numeric_state
      entity_id: number.refrigerator_freezer_temperature
      above: -10
      for:
        minutes: 15
  conditions: []
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🧊 Freezer Temperature Alert"
        message: "Freezer temperature is {{ states('number.refrigerator_freezer_temperature') }}°C — possible power issue."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "🧊 Freezer Temperature Alert"
        message: "Freezer temperature is {{ states('number.refrigerator_freezer_temperature') }}°C — possible power issue."
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.lounge_echo_hub
        message: "Warning: the freezer temperature is unusually high. Please check."
        data:
          type: announce

# Fridge/freezer power anomaly: unusual power draw triggers alert.
- id: fridge_freezer_power_alert
  alias: "Monitoring - Fridge/Freezer Power Alert"
  description: "Alert if fridge/freezer power draw is unusually high."
  mode: single
  triggers:
    - platform: numeric_state
      entity_id: sensor.fridge_freezer_power
      above: 200
      for:
        minutes: 30
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🧊 Fridge/Freezer Alert"
        message: "Fridge/freezer power is unusually high at {{ states('sensor.fridge_freezer_power') }}W. Check for issues."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "🧊 Fridge/Freezer Alert"
        message: "Fridge/freezer power is unusually high at {{ states('sensor.fridge_freezer_power') }}W. Check for issues."
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.lounge_echo_hub
        message: "Alert: the fridge freezer is drawing unusually high power. Please check."
        data:
          type: announce

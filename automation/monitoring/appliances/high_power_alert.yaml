# House-wide power draw exceeds threshold: notify both phones + Alexa.
- id: high_power_alert
  alias: "Monitoring - High Power Alert"
  description: "Alert when total house power exceeds 5kW for 10+ minutes."
  mode: single
  triggers:
    - platform: numeric_state
      entity_id: sensor.total_home_power
      above: 5000
      for:
        minutes: 10
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "⚡ High Power Alert"
        message: "Total home power is {{ states('sensor.total_home_power') }}W — unusually high."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "⚡ High Power Alert"
        message: "Total home power is {{ states('sensor.total_home_power') }}W — unusually high."
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: "Alert: the house is drawing unusually high power."
        data:
          type: announce

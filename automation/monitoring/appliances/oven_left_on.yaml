# Oven left on for more than 3 hours: alert both phones + Alexa.
- id: oven_left_on
  alias: "Monitoring - Oven Left On"
  description: "Alert if oven has been on for more than 3 hours."
  mode: single
  triggers:
    - trigger: state
      entity_id: sensor.oven
      to: "on"
      for:
        hours: 3
  conditions: []
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🔥 Oven Left On"
        message: "The oven has been on for over 3 hours. Was that intentional?"
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "🔥 Oven Left On"
        message: "The oven has been on for over 3 hours. Was that intentional?"
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.edward_s_echo_show_21
          - media_player.lounge_echo_hub
        message: "Warning: the oven has been on for over 3 hours. Please check."
        data:
          type: announce

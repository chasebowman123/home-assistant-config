# Washing machine done: dual trigger (Samsung state sensor + Tapo power fallback). Notify both phones + Alexa.
- id: washing_machine_done
  alias: "Monitoring - Washing Machine Done"
  description: "Notify when washing machine finishes. Dual trigger: Samsung state sensor (primary) + Tapo power fallback."
  mode: single
  triggers:
    - platform: state
      entity_id: sensor.washing_machine_machine_state
      to: "stop"
      id: samsung_state
    - platform: numeric_state
      entity_id: sensor.washing_machine_power
      below: 5
      for:
        minutes: 3
      id: tapo_power
  conditions:
    - condition: or
      conditions:
        - condition: trigger
          id: samsung_state
        - condition: and
          conditions:
            - condition: trigger
              id: tapo_power
            - condition: template
              value_template: "{{ states('sensor.washing_machine_machine_state') not in ['ready', 'stop', 'unknown', 'unavailable'] }}"
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🫧 Washing Machine Done"
        message: "Washing machine is done! Time to hang the laundry."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "🫧 Washing Machine Done"
        message: "Washing machine is done! Time to hang the laundry."
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.edward_s_echo_show_21
        message: "Washing machine is done"
        data:
          type: push
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: "The washing machine has finished. Time to hang the laundry."
        data:
          type: announce

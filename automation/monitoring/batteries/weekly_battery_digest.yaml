- id: weekly_battery_digest
  alias: Weekly Battery Digest
  description: Send a battery status summary to both phones every Sunday at 21:00.
  mode: single
  trigger:
    - platform: time
      at: "21:00:00"
  condition:
    - condition: time
      weekday:
        - sun
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: Weekly Battery Status
        message: "Hallway: {{ states('sensor.hallway_temp_battery') }}% | Lounge: {{ states('sensor.lounge_temperature_and_humidity_sensor_battery') }}% | Bedroom: {{ states('sensor.edward_bedside_sensor_battery') }}% | Office: {{ states('sensor.office_temp_battery') }}%"
    - service: notify.mobile_app_lorettas_phone
      data:
        title: Weekly Battery Status
        message: "Hallway: {{ states('sensor.hallway_temp_battery') }}% | Lounge: {{ states('sensor.lounge_temperature_and_humidity_sensor_battery') }}% | Bedroom: {{ states('sensor.edward_bedside_sensor_battery') }}% | Office: {{ states('sensor.office_temp_battery') }}%"

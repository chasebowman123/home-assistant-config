# Alert if daily energy usage exceeds threshold at any time during the day.
- id: high_daily_usage_alert
  alias: "Monitoring - High Daily Energy Usage"
  description: "Alert both phones if daily energy exceeds 30 kWh."
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: sensor.energy_daily
      above: 30
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "⚡ High Energy Day"
        message: "Daily energy usage has exceeded 30 kWh (currently {{ states('sensor.energy_daily') | float | round(2) }} kWh)."
    - service: notify.mobile_app_lorettas_phone
      data:
        title: "⚡ High Energy Day"
        message: "Daily energy usage has exceeded 30 kWh (currently {{ states('sensor.energy_daily') | float | round(2) }} kWh)."

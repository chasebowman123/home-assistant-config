# Alert if daily energy usage exceeds threshold at any time during the day.
- id: high_daily_usage_alert
  alias: "Monitoring - High Daily Energy Usage"
  description: "Alert both phones if daily energy exceeds 30 kWh."
  mode: single
  triggers:
    - platform: numeric_state
      entity_id: sensor.daily_home_energy
      above: 30
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "⚡ High Energy Day"
        message: "Daily energy usage has exceeded 30 kWh (currently {{ states('sensor.daily_home_energy') | float | round(2) }} kWh)."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "⚡ High Energy Day"
        message: "Daily energy usage has exceeded 30 kWh (currently {{ states('sensor.daily_home_energy') | float | round(2) }} kWh)."

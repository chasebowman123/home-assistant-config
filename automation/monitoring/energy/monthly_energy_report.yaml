- id: monthly_energy_report
  alias: "Energy - Monthly Report"
  description: "Monthly energy summary on the 1st at 9am."
  trigger:
    - platform: time
      at: "09:00:00"
  condition:
    - condition: template
      value_template: "{{ now().day == 1 }}"
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "⚡ Monthly Energy Report"
        message: >
          Last month's total: {{ states('sensor.energy_monthly') | float | round(1) }} kWh
          (£{{ (states('sensor.energy_monthly') | float * 0.27) | round(2) }}).

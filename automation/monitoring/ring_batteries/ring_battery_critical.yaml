# Alert when Ring doorbell batteries drop below 10%.
- id: ring_battery_critical
  alias: "Monitoring - Ring Battery Critical"
  description: "Alert when any Ring doorbell battery drops below 10%."
  mode: single
  triggers:
    - trigger: numeric_state
      entity_id: sensor.lobby_battery
      below: 10
    - trigger: numeric_state
      entity_id: sensor.upstairs_battery
      below: 10
  conditions: []
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🔋 Ring Battery Critical"
        message: >
          Ring doorbell battery critical:
          Lobby: {{ states('sensor.lobby_battery') }}%,
          Upstairs: {{ states('sensor.upstairs_battery') }}%
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
        message: "A Ring doorbell battery is critically low. Please charge it soon."
        data:
          type: announce

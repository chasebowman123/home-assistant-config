- id: ring_battery_low
  alias: "Ring - Battery Low Alert"
  description: "Alert when any Ring device battery drops below 20%."
  trigger:
    - platform: numeric_state
      entity_id:
        - sensor.basement_door_battery
        - sensor.basement_stairs_battery
        - sensor.garden_battery
        - sensor.upstairs_battery
      below: 20
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🔋 Ring Battery Low"
        message: "{{ trigger.to_state.name }} is at {{ trigger.to_state.state }}%. Time to charge."

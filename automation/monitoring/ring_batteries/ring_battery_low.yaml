# Alert when Ring doorbell batteries drop below 20%.
- id: ring_battery_low
  alias: "Monitoring - Ring Battery Low"
  description: "Alert when any Ring doorbell battery drops below 20%."
  mode: single
  triggers:
    - trigger: numeric_state
      entity_id: sensor.lobby_battery
      below: 20
    - trigger: numeric_state
      entity_id: sensor.upstairs_battery
      below: 20
  conditions: []
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "🔋 Ring Battery Low"
        message: >
          Ring doorbell battery low:
          Lobby: {{ states('sensor.lobby_battery') }}%,
          Upstairs: {{ states('sensor.upstairs_battery') }}%

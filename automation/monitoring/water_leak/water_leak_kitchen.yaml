- id: water_leak_kitchen
  alias: Water Leak Kitchen
  description: "CRITICAL: Notify both phones and announce via Alexa when water leak detected in kitchen. Turn kitchen spotlights red."
  mode: single
  triggers:
    - platform: state
      entity_id: binary_sensor.kitchen_water_sensor_water_leak
      to: "on"
  conditions: []
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "CRITICAL: Water Leak Detected"
        message: Water leak detected in kitchen!
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "CRITICAL: Water Leak Detected"
        message: Water leak detected in kitchen!
    - action: notify.alexa_media
      data:
        target:
          - media_player.echo_show_15
          - media_player.edward_s_echo_show_21
        message: Water leak detected in kitchen. Please investigate immediately.
        data:
          type: push
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: Water leak detected in kitchen. Please investigate immediately.
        data:
          type: announce
    - action: light.turn_on
      target:
        entity_id: light.kitchen_spotlights
      data:
        rgb_color:
          - 255
          - 0
          - 0

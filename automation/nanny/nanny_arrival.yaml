# Ankii arrives: log time, notify both phones, Alexa greeting.
# Nanny Arrival
# Logs Ankii's arrival time and sends notifications.
# Triggers when her phone connects to the Eero network.
# Only fires Mon-Fri during morning hours to avoid false triggers.
- id: nanny_arrival
  alias: "Nanny - Arrival"
  description: "Log Ankii's arrival time when her phone connects to Wi-Fi."
  mode: single
  triggers:
    - platform: state
      entity_id: device_tracker.ankiis_phone
      to: "home"
  conditions:
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
    - condition: time
      after: "06:00:00"
      before: "12:00:00"
    - condition: state
      entity_id: input_boolean.nanny_present
      state: "off"
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.nanny_present
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.nanny_arrival_time
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "👩‍👦 Ankii Arrived"
        message: "Ankii connected to Wi-Fi at {{ now().strftime('%H:%M') }}."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "👩‍👦 Ankii Arrived"
        message: "Ankii connected to Wi-Fi at {{ now().strftime('%H:%M') }}."
    - action: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: "Ankii has arrived. Good morning!"
        data:
          type: announce

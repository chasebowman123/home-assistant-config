# Ankii departs: calculate hours, create calendar event, notify both phones.
# Uses a 10-minute buffer to avoid false departures from Wi-Fi drops.
- id: nanny_departure
  alias: "Nanny - Departure"
  description: "Log Ankii's departure and create calendar event with hours worked."
  mode: single
  triggers:
    - platform: state
      entity_id: device_tracker.ankiis_phone
      to: "not_home"
      for:
        minutes: 10
  conditions:
    - condition: state
      entity_id: input_boolean.nanny_present
      state: "on"
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.nanny_present
    - variables:
        arrival: "{{ states('input_datetime.nanny_arrival_time') }}"
        departure: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        hours: "{{ ((as_timestamp(now()) - as_timestamp(states('input_datetime.nanny_arrival_time'))) / 3600) | round(2) }}"
    - action: calendar.create_event
      target:
        entity_id: calendar.nanny_hours
      data:
        summary: "Ankii — {{ hours }}h"
        description: "Arrived: {{ as_timestamp(arrival) | timestamp_custom('%H:%M') }}, Left: {{ now().strftime('%H:%M') }}, Hours: {{ hours }}"
        start_date_time: "{{ arrival }}"
        end_date_time: "{{ departure }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.nanny_weekly_hours
      data:
        value: "{{ (states('input_number.nanny_weekly_hours') | float + hours | float) | round(2) }}"
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "👩‍👦 Ankii Departed"
        message: "Ankii left at {{ now().strftime('%H:%M') }}. Session: {{ hours }}h."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "👩‍👦 Ankii Departed"
        message: "Ankii left at {{ now().strftime('%H:%M') }}. Session: {{ hours }}h."

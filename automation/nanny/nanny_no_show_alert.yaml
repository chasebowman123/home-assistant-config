# Nanny No-Show Alert
# If Ankii hasn't arrived by 9:30am on a weekday, send a reminder.
# Can be suppressed by turning off the automation on days she's not expected.
- id: nanny_no_show_alert
  alias: "Nanny - No Show Alert"
  description: "Alert if Ankii hasn't arrived by 9:30am on a weekday."
  trigger:
    - platform: time
      at: "09:30:00"
  condition:
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
    - condition: state
      entity_id: input_boolean.nanny_present
      state: "off"
    - condition: state
      entity_id: input_boolean.nanny_expected_today
      state: "on"
  action:
    - service: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "👩‍👦 Ankii Not Yet Arrived"
        message: "It's 9:30am and Ankii hasn't connected to Wi-Fi yet."
  mode: single

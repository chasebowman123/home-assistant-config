# Weekly nanny summary every Sunday evening to both phones.
# Reports total hours tracked this week via input_number.nanny_weekly_hours.
# Resets hours for the new week.
- id: nanny_weekly_summary
  alias: "Nanny - Weekly Summary"
  description: "Send weekly nanny hours summary on Sunday and reset hours."
  mode: single
  triggers:
    - platform: time
      at: "19:00:00"
  conditions:
    - condition: time
      weekday:
        - sun
  actions:
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: "📋 Nanny Weekly Summary"
        message: "This week: {{ states('input_number.nanny_weekly_hours') | float | round(2) }}h with Ankii."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: "📋 Nanny Weekly Summary"
        message: "This week: {{ states('input_number.nanny_weekly_hours') | float | round(2) }}h with Ankii."
    - action: input_number.set_value
      target:
        entity_id: input_number.nanny_weekly_hours
      data:
        value: 0

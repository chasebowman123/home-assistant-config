# Office Motion Lights On
- id: office_lights_motion_on
  alias: "Office - Motion Lights On"
  trigger:
    - platform: state
      entity_id: binary_sensor.office_motion_sensor_occupancy
      to: "on"
  condition:
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.office
          state: "Off"
    - condition: state
      entity_id: input_boolean.lighting_automations
      state: "on"
    - condition: numeric_state
      entity_id: sun.sun
      attribute: elevation
      below: 10
  action:
    - service: light.turn_on
      target:
        entity_id: light.office_spotlights
      data:
        brightness_pct: >
          {% if states('input_select.office') == 'DnD' %}
            40
          {% else %}
            100
          {% endif %}

# Office Arriving Guests mode: lights on full, Alexa welcome.
- id: office_arriving_guests
  alias: "Office - Arriving Guests"
  description: "Office guest mode: lights on full, Alexa welcome message."
  mode: single
  trigger:
    - platform: state
      entity_id: input_select.office
      to: "Arriving Guests"
  action:
    - service: light.turn_on
      target:
        entity_id: light.office_spotlights
      data:
        brightness_pct: 100
        color_temp_kelvin: 4000
        transition: 2
    - service: notify.alexa_media
      data:
        target:
          - media_player.lounge_echo_hub
        message: "Guests are arriving at the office. Lights are on."
        data:
          type: announce

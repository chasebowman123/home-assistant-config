# Office → Available
- id: office_state_available
  alias: "Office - State Available"
  trigger:
    - platform: state
      entity_id: input_select.office
      to: "Available"
  action:
    - service: light.turn_on
      target:
        entity_id: light.office_spotlights
      data:
        brightness_pct: 100
        color_temp_kelvin: 4000

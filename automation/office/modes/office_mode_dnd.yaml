# Office → DnD
- id: office_state_dnd
  alias: "Office - State DnD"
  trigger:
    - platform: state
      entity_id: input_select.office
      to: "DnD"
  action:
    - service: light.turn_on
      target:
        entity_id: light.office_spotlights
      data:
        brightness_pct: 40
        color_temp_kelvin: 2700

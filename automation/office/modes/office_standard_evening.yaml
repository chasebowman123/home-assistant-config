- id: office_standard_evening
  alias: "Office - Standard Evening"
  description: "Evening mode: spots 40% at 2700K warm."
  trigger:
    - platform: state
      entity_id: input_select.office
      to: "Standard Evening"
  action:
    - service: light.turn_on
      target:
        entity_id: light.office_spots
      data:
        brightness_pct: 40
        color_temp_kelvin: 2700

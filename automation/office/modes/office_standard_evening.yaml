# Office Standard Evening mode: warm dim lighting.
- id: office_standard_evening
  alias: "Office - Standard Evening"
  description: "Office evening mode: warm dim lighting."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.office
      to: "Standard Evening"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.office_spotlights
      data:
        brightness_pct: 40
        color_temp_kelvin: 2700
        transition: 3

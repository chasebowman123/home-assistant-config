# Office Standard Work mode: bright daylight colour temperature.
- id: office_standard_work
  alias: "Office - Standard Work"
  description: "Office work mode: bright, cool-white lighting for focus."
  mode: single
  triggers:
    - platform: state
      entity_id: input_select.office
      to: "Standard Work"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.office_spotlights
      data:
        brightness_pct: 90
        color_temp_kelvin: 4000
        transition: 2

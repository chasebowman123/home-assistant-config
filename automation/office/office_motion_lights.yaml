- id: office_motion_lights
  alias: Office Motion Lights
  description: "Office motion or door open → spotlights on at 50% if off, auto-off after 5 min no motion. Skips if lights already on."
  mode: restart
  triggers:
    - platform: state
      entity_id: binary_sensor.office_motion_sensor_occupancy
      to: "on"
    - platform: state
      entity_id: binary_sensor.office_hallway_door_sensor_contact
      to: "on"
  conditions:
    - condition: state
      entity_id: light.office_spotlights
      state: "off"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.office_spotlights
      data:
        brightness_pct: 50
        transition: 1
    - wait_for_trigger:
        - platform: state
          entity_id: binary_sensor.office_motion_sensor_occupancy
          to: "off"
          for:
            minutes: 5
    - action: light.turn_off
      target:
        entity_id: light.office_spotlights
      data:
        transition: 5

- id: outside_garden_lights_motion
  alias: Outside - Garden Lights Motion
  description: "Ring camera motion: garden lights on at 50% with smooth transition, auto-off after 5 minutes."
  mode: restart
  triggers:
    - platform: state
      entity_id: binary_sensor.garden_motion
      to: "on"
  condition: []
  actions:
    - action: light.turn_on
      target:
        entity_id: light.garden_lights
      data:
        brightness_pct: 50
        transition: 1
    - delay:
        minutes: 5
    - action: light.turn_off
      target:
        entity_id: light.garden_lights
      data:
        transition: 10

- id: welcome_home_lights
  alias: Welcome Home Lights
  description: Turn on hallway lights when Edward or Loretta arrives home after sunset.
  mode: single
  triggers:
    - platform: state
      entity_id:
        - person.edward_eidam
        - person.loretta_eidam
      to: home
  conditions:
    - condition: sun
      after: sunset
  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.hallway_lamp_post
          - light.hallway_signe_light
      data:
        brightness: 255

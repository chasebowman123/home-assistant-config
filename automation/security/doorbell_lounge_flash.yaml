# Doorbell Flash
# Flash lounge Iris and Signe red for 5 seconds when doorbell rings.
- id: doorbell_lounge_flash
  alias: "Doorbell Flash - Lounge Iris Red"
  trigger:
    - platform: state
      entity_id: binary_sensor.basement_door_ding
      to: "on"
    - platform: state
      entity_id: binary_sensor.upstairs_ding
      to: "on"
    - platform: state
      entity_id: binary_sensor.lobby_ding
      to: "on"
  action:
    - service: scene.create
      data:
        scene_id: iris_snapshot
        snapshot_entities:
          - light.lounge_iris
          - light.lounge_signe_light
    - service: light.turn_on
      target:
        entity_id:
          - light.lounge_iris
          - light.lounge_signe_light
      data:
        rgb_color: [255, 0, 0]
        brightness: 255
    - delay:
        seconds: 5
    - service: scene.turn_on
      target:
        entity_id: scene.iris_snapshot
  mode: single

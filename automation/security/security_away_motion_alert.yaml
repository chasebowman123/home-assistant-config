- id: security_away_motion_alert
  alias: Security Away Motion Alert
  description: "When vacation mode or all away: garden/basement motion → bedroom + kitchen spotlights on, Echo 15+21 play alarm, then everything off after 30 min."
  mode: restart
  triggers:
    - platform: state
      entity_id: binary_sensor.garden_motion
      to: "on"
    - platform: state
      entity_id: binary_sensor.office_basement_entrance_motion_sensor_occupancy
      to: "on"
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_boolean.vacation_mode
          state: "on"
        - condition: state
          entity_id: input_select.house
          state:
            - Away
            - All Out
  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.bedroom_spot_lights
          - light.kitchen_spotlights
      data:
        brightness: 255
        transition: 2
    - action: notify.mobile_app_ee_iphone_16_pro_max
      data:
        title: Security Alert
        message: "Motion detected at {{ trigger.entity_id | replace('binary_sensor.', '') | replace('_', ' ') }} while house is in {{ states('input_select.house') }} mode. Lights activated."
    - action: notify.mobile_app_lorettas_phone
      data:
        title: Security Alert
        message: "Motion detected at {{ trigger.entity_id | replace('binary_sensor.', '') | replace('_', ' ') }} while house is in {{ states('input_select.house') }} mode. Lights activated."
    - delay:
        minutes: 30
    - action: light.turn_off
      target:
        entity_id:
          - light.bedroom_spot_lights
          - light.kitchen_spotlights
      data:
        transition: 10

- id: stairs_motion_camera
  alias: Stairs Motion Camera Alert
  description: "Motion at upstairs or basement stairs → silently show camera on Echo Show 15 + Echo Show 21."
  mode: single
  triggers:
    - platform: state
      entity_id:
        - binary_sensor.upstairs_motion
        - binary_sensor.basement_stairs_motion
      to: "on"
  conditions: []
  actions:
    - action: media_player.play_media
      target:
        entity_id: media_player.echo_show_15
      data:
        media_content_type: custom
        media_content_id: "{% if trigger.entity_id == 'binary_sensor.upstairs_motion' %}show upstairs camera{% else %}show basement stairs camera{% endif %}"
    - action: media_player.play_media
      target:
        entity_id: media_player.edward_s_echo_show_21
      data:
        media_content_type: custom
        media_content_id: "{% if trigger.entity_id == 'binary_sensor.upstairs_motion' %}show upstairs camera{% else %}show basement stairs camera{% endif %}"

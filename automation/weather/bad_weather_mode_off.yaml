# Bad Weather Mode Off
- id: bad_weather_off
  alias: "Weather - Bad Weather Mode Off"
  trigger:
    - platform: state
      entity_id: weather.forecast_home
      to:
        - "sunny"
        - "clear-night"
        - "partlycloudy"
        - "cloudy"
  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.bad_weather

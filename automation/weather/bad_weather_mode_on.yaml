# Bad Weather Mode On
- id: bad_weather_on
  alias: "Weather - Bad Weather Mode On"
  trigger:
    - platform: state
      entity_id: weather.forecast_home
      to:
        - "pouring"
        - "lightning-rainy"
        - "lightning"
        - "hail"
        - "snowy"
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.bad_weather

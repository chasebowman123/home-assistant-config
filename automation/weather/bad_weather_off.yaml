- id: bad_weather_off
  mode: single
  alias: "Weather - Bad Weather Off"
  description: "Weather clears: deactivate bad weather mode."
  triggers:
    - platform: state
      entity_id: weather.forecast_home
      to:
        - "sunny"
        - "clear-night"
        - "cloudy"
        - "partlycloudy"
        - "windy"
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.bad_weather

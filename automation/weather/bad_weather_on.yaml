- id: bad_weather_on
  mode: single
  alias: "Weather - Bad Weather On"
  description: "Auto-detect rain/storm conditions and activate bad weather mode."
  triggers:
    - platform: state
      entity_id: weather.forecast_home
      to:
        - "rainy"
        - "pouring"
        - "lightning"
        - "lightning-rainy"
        - "hail"
        - "snowy"
        - "snowy-rainy"
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.bad_weather

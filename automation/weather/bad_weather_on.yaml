- id: bad_weather_on
  alias: "Weather - Bad Weather On"
  description: "Auto-detect rain/storm conditions and activate bad weather mode."
  trigger:
    - platform: state
      entity_id: weather.home
      to:
        - "rainy"
        - "pouring"
        - "lightning"
        - "lightning-rainy"
        - "hail"
        - "snowy"
        - "snowy-rainy"
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.bad_weather

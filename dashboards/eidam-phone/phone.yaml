kiosk_mode:
  hide_header: true

views:
  ##############################################################################
  # TAB 1 — HOME
  ##############################################################################
  - title: Home
    path: home
    icon: mdi:home
    theme: kohbo
    cards:

      # ── Chips row ──────────────────────────────────────────────────────────
      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: input_select.house
            icon: mdi:home-variant
          - type: weather
            entity: weather.home
            show_temperature: true
            show_conditions: true
          - type: entity
            entity: person.edward_eidam
            use_entity_picture: true
          - type: entity
            entity: person.loretta_eidam
            use_entity_picture: true
        card_mod:
          style: |
            ha-card {
              --ha-card-background: transparent;
              --ha-card-border-width: 0;
              padding: 4px 0;
            }

      # ── Security overview ─────────────────────────────────────────────────
      - type: custom:mushroom-alarm-control-panel-card
        entity: alarm_control_panel.home_alarm
        show_keypad: false
        card_mod:
          style: |
            ha-card {
              --ha-card-background: #252529;
              --ha-card-border-width: 0;
              --ha-card-border-radius: 16px;
            }

      # ── Climate overview — 2-column grid ──────────────────────────────────
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-climate-card
            entity: climate.lounge
            show_temperature_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-climate-card
            entity: climate.hallway
            show_temperature_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-climate-card
            entity: climate.kitchen
            show_temperature_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-climate-card
            entity: climate.bedroom_2
            show_temperature_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-climate-card
            entity: climate.lucas_s_room
            show_temperature_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-climate-card
            entity: climate.office
            show_temperature_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }

      # ── Quick Actions ─────────────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Morning
            secondary: Routine
            icon: mdi:weather-sunny
            icon_color: amber
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              data:
                entity_id: script.morning_routine
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: Goodnight
            secondary: Routine
            icon: mdi:power-sleep
            icon_color: blue
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              data:
                entity_id: script.goodnight_routine
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: All Off
            secondary: Lights
            icon: mdi:power-off
            icon_color: red
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              data:
                entity_id: script.all_lights_off
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }

      # ── House Modes — 3-column grid ────────────────────────────────────────
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Day Time
            icon: mdi:white-balance-sunny
            icon_color: "{{ 'amber' if is_state('input_select.house', 'Day Time') else 'disabled' }}"
            badge_icon: "{{ 'mdi:check-circle' if is_state('input_select.house', 'Day Time') else '' }}"
            badge_color: amber
            tap_action:
              action: perform-action
              perform_action: input_select.select_option
              data:
                entity_id: input_select.house
                option: Day Time
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: {{ '#2d2d32' if is_state('input_select.house', 'Day Time') else '#252529' }};
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: Evening
            icon: mdi:weather-night
            icon_color: "{{ 'purple' if is_state('input_select.house', 'Evening Time') else 'disabled' }}"
            badge_icon: "{{ 'mdi:check-circle' if is_state('input_select.house', 'Evening Time') else '' }}"
            badge_color: purple
            tap_action:
              action: perform-action
              perform_action: input_select.select_option
              data:
                entity_id: input_select.house
                option: Evening Time
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: {{ '#2d2d32' if is_state('input_select.house', 'Evening Time') else '#252529' }};
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: Night
            icon: mdi:moon-waning-crescent
            icon_color: "{{ 'blue' if is_state('input_select.house', 'Night Time') else 'disabled' }}"
            badge_icon: "{{ 'mdi:check-circle' if is_state('input_select.house', 'Night Time') else '' }}"
            badge_color: blue
            tap_action:
              action: perform-action
              perform_action: input_select.select_option
              data:
                entity_id: input_select.house
                option: Night Time
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: {{ '#2d2d32' if is_state('input_select.house', 'Night Time') else '#252529' }};
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: Away
            icon: mdi:airplane
            icon_color: "{{ 'red' if is_state('input_select.house', 'Away') else 'disabled' }}"
            badge_icon: "{{ 'mdi:check-circle' if is_state('input_select.house', 'Away') else '' }}"
            badge_color: red
            tap_action:
              action: perform-action
              perform_action: input_select.select_option
              data:
                entity_id: input_select.house
                option: Away
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: {{ '#2d2d32' if is_state('input_select.house', 'Away') else '#252529' }};
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: All Out
            icon: mdi:home-export-outline
            icon_color: "{{ 'orange' if is_state('input_select.house', 'All Out') else 'disabled' }}"
            badge_icon: "{{ 'mdi:check-circle' if is_state('input_select.house', 'All Out') else '' }}"
            badge_color: orange
            tap_action:
              action: perform-action
              perform_action: input_select.select_option
              data:
                entity_id: input_select.house
                option: All Out
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: {{ '#2d2d32' if is_state('input_select.house', 'All Out') else '#252529' }};
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: Dogs Alone
            icon: mdi:dog
            icon_color: "{{ 'teal' if is_state('input_select.house', 'Dogs Alone') else 'disabled' }}"
            badge_icon: "{{ 'mdi:check-circle' if is_state('input_select.house', 'Dogs Alone') else '' }}"
            badge_color: teal
            tap_action:
              action: perform-action
              perform_action: input_select.select_option
              data:
                entity_id: input_select.house
                option: Dogs Alone
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: {{ '#2d2d32' if is_state('input_select.house', 'Dogs Alone') else '#252529' }};
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }

      # ── Boolean Toggles ───────────────────────────────────────────────────
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: input_boolean.lucas_sleeping
            name: Lucas Sleeping
            icon: mdi:sleep
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-entity-card
            entity: input_boolean.important_meeting
            name: Important Meeting
            icon: mdi:briefcase
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-entity-card
            entity: input_boolean.evening_entertaining
            name: Entertaining
            icon: mdi:party-popper
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-entity-card
            entity: input_boolean.disco_disco
            name: Disco Mode
            icon: mdi:music-note
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-entity-card
            entity: input_boolean.bad_weather
            name: Bad Weather
            icon: mdi:weather-pouring
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-entity-card
            entity: input_boolean.edward_alone
            name: Edward Alone
            icon: mdi:account
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }

  ##############################################################################
  # TAB 2 — ROOMS (navigation)
  ##############################################################################
  - title: Rooms
    path: rooms
    icon: mdi:floor-plan
    theme: kohbo
    cards:

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Lounge
            secondary: "{{ state_attr('climate.lounge', 'current_temperature') | default('--') }}°C · {{ expand('light.lounge') | selectattr('state','eq','on') | list | count }} lights on"
            icon: mdi:sofa
            icon_color: amber
            tap_action:
              action: navigate
              navigation_path: /eidam-phone/lounge
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: Bedroom
            secondary: "{{ state_attr('climate.bedroom_2', 'current_temperature') | default('--') }}°C · {{ expand('light.bedroom') | selectattr('state','eq','on') | list | count }} lights on"
            icon: mdi:bed
            icon_color: blue
            tap_action:
              action: navigate
              navigation_path: /eidam-phone/bedroom
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: Lucas Room
            secondary: "{{ states('sensor.lucas_room_temp_temperature') | default('--') }}°C · {{ expand('light.lucass_room') | selectattr('state','eq','on') | list | count }} lights on"
            icon: mdi:teddy-bear
            icon_color: green
            tap_action:
              action: navigate
              navigation_path: /eidam-phone/lucas-room
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: Kitchen
            secondary: "{{ state_attr('climate.kitchen', 'current_temperature') | default('--') }}°C"
            icon: mdi:chef-hat
            icon_color: orange
            tap_action:
              action: navigate
              navigation_path: /eidam-phone/kitchen
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: Office
            secondary: "{{ state_attr('climate.office', 'current_temperature') | default('--') }}°C"
            icon: mdi:desk
            icon_color: violet
            tap_action:
              action: navigate

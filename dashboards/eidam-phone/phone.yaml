                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-template-card
            primary: Hallway
            secondary: "{{ state_attr('climate.hallway', 'current_temperature') | default('--') }}°C"
            icon: mdi:door
            icon_color: teal
            tap_action:
              action: navigate
              navigation_path: /eidam-phone/hallway
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }

  ##############################################################################
  # TAB 3 — LOUNGE (subview)
  ##############################################################################
  - title: Lounge
    path: lounge
    subview: true
    theme: kohbo
    cards:

      # Back button
      - type: custom:mushroom-template-card
        primary: Back to Rooms
        icon: mdi:arrow-left
        icon_color: blue
        tap_action:
          action: navigate
          navigation_path: /eidam-phone/rooms
        card_mod:
          style: |
            ha-card {
              --ha-card-background: #252529;
              --ha-card-border-width: 0;
              --ha-card-border-radius: 16px;
            }

      # Room mode selector
      - type: custom:mushroom-select-card
        entity: input_select.lounge
        name: Lounge Mode
        icon: mdi:sofa
        card_mod:
          style: |
            ha-card {
              --ha-card-background: #252529;
              --ha-card-border-width: 0;
              --ha-card-border-radius: 16px;
            }

      # Lights — main group toggle
      - type: custom:mushroom-light-card
        entity: light.lounge
        name: Lounge Lights (All)
        show_brightness_control: true
        show_color_control: true
        collapsible_controls: true
        card_mod:
          style: |
            ha-card {
              --ha-card-background: #252529;
              --ha-card-border-width: 0;
              --ha-card-border-radius: 16px;
            }

      # Individual lights grid
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-light-card
            entity: light.lounge_spotlights
            name: Spotlights
            show_brightness_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-light-card
            entity: light.lounge_wall_lights
            name: Wall Lights
            show_brightness_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-light-card
            entity: light.lounge_strip_light
            name: Strip Light
            show_brightness_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-light-card
            entity: light.lounge_piano_lamp
            name: Piano Lamp
            show_brightness_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-light-card
            entity: light.lounge_io
            name: Iris
            show_brightness_control: true
            show_color_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-light-card
            entity: light.lounge_signe_light
            name: Signe Light
            show_brightness_control: true
            show_color_control: true
            collapsible_controls: true
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }

      # Accent switches
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: switch.bubble_light
            name: Bubble Light
            icon: mdi:lightbulb-on
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-entity-card
            entity: switch.banana_light
            name: Banana Light
            icon: mdi:lightbulb-on
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-entity-card
            entity: switch.disco_lights
            name: Disco Lights
            icon: mdi:party-popper
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }
          - type: custom:mushroom-entity-card
            entity: switch.bar_light
            name: Bar Light
            icon: mdi:glass-cocktail
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: #252529;
                  --ha-card-border-width: 0;
                  --ha-card-border-radius: 16px;
                }

      # Hue Sync Box
      - type: custom:mushroom-entity-card
        entity: switch.lounge_hue_sync_box
        name: Hue Sync Box
        icon: mdi:sync
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              --ha-card-background: #252529;
              --ha-card-border-width: 0;
              --ha-card-border-radius: 16px;
            }

      # Media player
      - type: custom:mushroom-media-player-card
        entity: media_player.lounge
        name: Lounge Speaker
        show_volume_level: true
        volume_controls:
          - volume_mute
          - volume_set
          - volume_buttons
        media_controls:
          - on_off
          - play_pause_stop
          - previous
          - next
        collapsible_controls: false
        card_mod:
          style: |
            ha-card {
              --ha-card-background: #252529;
              --ha-card-border-width: 0;
              --ha-card-border-radius: 16px;
            }

      # Lounge TV
      - type: custom:mushroom-media-player-card
        entity: media_player.lounge_tv_2
        name: Lounge TV (Samsung)
        show_volume_level: true
        volume_controls:
          - volume_mute
          - volume_set
          - volume_buttons
        media_controls:
          - on_off
          - play_pause_stop
        collapsible_controls: true
        card_mod:
          style: |
            ha-card {
              --ha-card-background: #252529;
              --ha-card-border-width: 0;
              --ha-card-border-radius: 16px;
            }

      # Climate
      - type: custom:mushroom-climate-card
        entity: climate.lounge
        name: Lounge Climate
        show_temperature_control: true
        collapsible_controls: false
        card_mod:
          style: |
            ha-card {
              --ha-card-background: #252529;
              --ha-card-border-width: 0;
              --ha-card-border-radius: 16px;
            }

  ##############################################################################
  # TAB 4 — BEDROOM (subview)

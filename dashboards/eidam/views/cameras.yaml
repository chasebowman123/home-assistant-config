type: custom:vertical-layout
title: Cameras
path: cameras
theme: kohbo
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:
        - type: custom:button-card
          template: empty_column
        - type: custom:button-card
          template: kohbo_header_page_title
          name: Cameras
        - type: custom:button-card
          template: empty_column

  - type: custom:button-card
    template: section_title
    name: Ring Cameras
  - type: picture-entity
    entity: camera.lucas_ring
    name: Lucas's Room
    show_state: false
    show_name: true
    camera_view: live

  - type: custom:button-card
    template: section_title
    name: Doorbells
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        entity: binary_sensor.basement_door_ding
        name: Basement
        template: kohbo_device_entity
        icon: mdi:doorbell
        state:
          - value: 'on'
            icon: mdi:doorbell-video
            color: var(--warning-color)
          - value: 'off'
            color: var(--success-color)
      - type: custom:button-card
        entity: binary_sensor.upstairs_ding
        name: Upstairs
        template: kohbo_device_entity
        icon: mdi:doorbell
        state:
          - value: 'on'
            icon: mdi:doorbell-video
            color: var(--warning-color)
          - value: 'off'
            color: var(--success-color)
      - type: custom:button-card
        entity: binary_sensor.lobby_ding
        name: Lobby
        template: kohbo_device_entity
        icon: mdi:doorbell
        state:
          - value: 'on'
            icon: mdi:doorbell-video
            color: var(--warning-color)
          - value: 'off'
            color: var(--success-color)

  - type: custom:button-card
    template: section_title
    name: Baby Monitor
  - type: markdown
    content: >
      Nanit streams are available on Echo Show devices via Alexa.
      The Nanit camera does not integrate natively with Home Assistant.

  - type: custom:button-card
    template: section_title
    name: Quick Actions
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: button.lobby_open_door
        name: Lobby Buzzer
        icon: mdi:door-open
        template: kohbo_device_entity
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.lobby_open_door
          haptic: heavy
        styles:
          icon:
            - color: var(--warning-color)

  - !include /config/dashboards/eidam/includes/navbar.yaml

type: custom:vertical-layout
title: Environment
path: environment
theme: eidam-pastel
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  #
  # Page Header
  #
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:
        - type: custom:button-card
          template: empty_column
        - type: custom:button-card
          template: kohbo_header_page_title
          name: Environment
        - type: custom:button-card
          template: empty_column

  #
  # Heating Overview
  #
  - type: custom:button-card
    template: section_title
    name: Heating (Tado)

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: climate.lounge
        name: Lounge
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

      - type: custom:button-card
        entity: climate.bedroom
        name: Bedroom
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

      - type: custom:button-card
        entity: climate.lucas_room
        name: Lucas's Room
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

      - type: custom:button-card
        entity: climate.office
        name: Office
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

      - type: custom:button-card
        entity: climate.kitchen
        name: Kitchen
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

      - type: custom:button-card
        entity: climate.hallway
        name: Hallway
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

  #
  # Air Conditioning
  #
  - type: custom:button-card
    template: section_title
    name: Air Conditioning

  - type: tile
    entity: climate.lounge_ac
    name: Lounge AC (Sensibo)
    features:
      - type: climate-hvac-modes
      - type: target-temperature

  #
  # Air Quality
  #
  - type: custom:button-card
    template: section_title
    name: Air Quality

  - type: grid
    columns: 2
    square: false
    cards:
      # Lucas Room AQ
      - type: custom:button-card
        entity: sensor.lucass_room_air_quality_monitor_indoor_air_quality
        name: Lucas's Room
        template: kohbo_device_entity
        icon: mdi:air-filter
        tap_action:
          action: more-info
          haptic: light

      # Air Purifier
      - type: custom:button-card
        entity: fan.core_400s
        name: Air Purifier
        template: kohbo_device_entity
        icon: mdi:air-purifier
        tap_action:
          action: more-info
          haptic: light

      # PM2.5
      - type: custom:button-card
        entity: sensor.core_400s_pm2_5
        name: PM2.5
        template: kohbo_device_entity
        icon: mdi:weather-dust
        tap_action:
          action: more-info
          haptic: light

  #
  # Temperature Graphs
  #
  - type: custom:button-card
    template: section_title
    name: Temperature History

  - type: custom:mini-graph-card
    name: All Zones (24h)
    entities:
      - entity: sensor.lucas_room_temperature
        name: Lucas
        color: "#74B9FF"
      - entity: climate.lounge
        attribute: current_temperature
        name: Lounge
        color: "#00B894"
      - entity: climate.bedroom
        attribute: current_temperature
        name: Bedroom
        color: "#A29BFE"
      - entity: climate.office
        attribute: current_temperature
        name: Office
        color: "#FDCB6E"
    hours_to_show: 24
    points_per_hour: 4
    line_width: 2
    show:
      labels: true
      points: false
      legend: true

  #
  # Humidity
  #
  - type: custom:button-card
    template: section_title
    name: Humidity

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: switch.lucas_strip_humidifier
        name: Lucas Humidifier
        template: kohbo_device_entity
        icon: mdi:air-humidifier
        tap_action:
          action: toggle
          haptic: light

  #
  # Navbar
  #
  - !include /config/dashboards/eidam/includes/navbar.yaml

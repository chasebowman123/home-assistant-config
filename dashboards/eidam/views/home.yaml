type: custom:vertical-layout
title: Home
path: home
theme: kohbo
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:
        - type: custom:button-card
          template: empty_column
        - type: custom:button-card
          template: kohbo_header_page_title
          name: Eidam
        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:bell
          icon_color: var(--secondary-text-color)
          tap_action:
            action: navigate
            navigation_path: '#notifications'

  # Status chips + People
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_layout_card_mod.yaml
    card:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 50% 50%
        margin: 0px
        padding: 0px
        card_margin: 0px
        gap: 5px
      cards:
        - type: custom:mod-card
          card_mod:
            style:
              hui-horizontal-stack-card$: |
                #root { gap: 5px !important; }
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                template: kohbo_chip_card
                entity: input_select.house
                state:
                  - value: "Home"
                    icon: mdi:home
                    color: var(--success-color)
                  - value: "Away"
                    icon: mdi:home-export-outline
                    color: var(--warning-color)
                  - value: "All Out"
                    icon: mdi:home-off-outline
                    color: var(--error-color)
                  - value: "Day Time"
                    icon: mdi:weather-sunny
                    color: var(--primary-color)
                  - value: "Evening Time"
                    icon: mdi:weather-sunset
                    color: var(--success-color)
                  - value: "Night Time"
                    icon: mdi:weather-night
                    color: var(--secondary-text-color)
                  - value: "Dogs Alone"
                    icon: mdi:dog
                    color: var(--warning-color)
                tap_action:
                  action: navigate
                  navigation_path: '#house_mode'
                  haptic: light
              - type: custom:button-card
                template: kohbo_chip_card
                name: Energy
                icon: mdi:lightning-bolt
                entity: sensor.energy_daily
                show_state: true
                styles:
                  state:
                    - margin-left: 3px
        - type: custom:mod-card
          card_mod:
            style:
              hui-horizontal-stack-card$: |
                #root { display: flex; justify-content: flex-end; align-items: start; gap: 5px !important; }
              .: |
                ha-card { height: 100% !important; align-self: center !important; }
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: person.edward
                template: kohbo_person_entity
                tap_action:
                  action: more-info
                  haptic: light

  # People overview
  - type: custom:button-card
    template: section_title
    name: People
  - type: grid
    columns: 4
    square: false
    cards:
      - type: custom:button-card
        entity: person.edward
        name: Edward
        template: kohbo_person_card
        tap_action:
          action: more-info
          haptic: light
      - type: custom:button-card
        entity: person.lucas
        name: Lucas
        template: kohbo_person_card
        icon: mdi:baby-face-outline
        tap_action:
          action: more-info
          haptic: light
      # Nanny — placeholder until device_tracker is set up
      - type: custom:button-card
        entity: input_boolean.nanny_present
        name: Nanny
        icon: mdi:account-child
        template: kohbo_device_entity
        state_display: |
          [[[
            return entity.state == "on" ? "Present" : "Away";
          ]]]
        state:
          - value: 'on'
            styles:
              icon:
                - color: var(--success-color)
          - value: 'off'
            styles:
              icon:
                - color: var(--secondary-text-color)
      # Mother — placeholder until device_tracker is set up
      - type: custom:button-card
        name: Mother
        icon: mdi:account-heart
        template: kohbo_device_entity
        show_state: false
        styles:
          icon:
            - color: var(--secondary-text-color)
          name:
            - color: var(--secondary-text-color)

  # Security
  - type: custom:stack-in-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_stack_styles.yaml
    cards:
      - type: custom:button-card
        template: kohbo_card_small_header
        name: Security
      - type: custom:stack-in-card
        mode: vertical
        card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: binary_sensor.basement_door_ding
                name: Basement
                template: kohbo_security_item
                icon: mdi:doorbell
                state:
                  - value: 'on'
                    icon: mdi:doorbell
                    color: var(--warning-color)
                    state_display: Ringing
                  - value: 'off'
                    icon: mdi:doorbell
                    color: var(--success-color)
                    state_display: Clear
              - type: custom:button-card
                entity: binary_sensor.upstairs_ding
                name: Upstairs
                template: kohbo_security_item
                icon: mdi:doorbell
                state:
                  - value: 'on'
                    color: var(--warning-color)
                    state_display: Ringing
                  - value: 'off'
                    color: var(--success-color)
                    state_display: Clear
              - type: custom:button-card
                entity: binary_sensor.lobby_ding
                name: Lobby
                template: kohbo_security_item
                icon: mdi:doorbell
                state:
                  - value: 'on'
                    color: var(--warning-color)
                    state_display: Ringing
                  - value: 'off'
                    color: var(--success-color)
                    state_display: Clear
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                name: Cameras
                icon: mdi:cctv
                template: kohbo_security_item
                tap_action:
                  action: navigate
                  navigation_path: '/dashboard-eidam/cameras'
                  haptic: light
              - type: custom:button-card
                name: Leaks
                icon: mdi:water-alert
                template: kohbo_security_item
                tap_action:
                  action: more-info
              - type: custom:button-card
                entity: input_boolean.lucas_sleeping
                name: Lucas
                icon: mdi:baby-face-outline
                template: kohbo_security_item
                state:
                  - value: 'on'
                    icon: mdi:sleep
                    color: var(--primary-color)
                    state_display: Sleeping
                  - value: 'off'
                    icon: mdi:baby-face-outline
                    color: var(--success-color)
                    state_display: Awake

  # Lights overview
  - type: custom:button-card
    template: section_title
    name: Lights
  - type: custom:button-card
    entity: light.lounge_spots
    name: Lights
    template: kohbo_device_entity
    icon: mdi:lightbulb-group
    state_display: >
      [[[
        const lights = [
          'light.lounge_spots','light.lounge_play_light_bar','light.lounge_light_strip',
          'light.lounge_piano_lamp','light.lounge_iris','light.hallway_spots',
          'light.hallway_lamp_post','light.hallway_signe_light','light.bedroom_spots',
          'light.bedroom_signe','light.bedroom_tv_strip','light.lucas_room_spots',
          'light.lucas_room_iris','light.lucas_cloud_lamp','light.lucas_go_nightlight',
          'light.kitchen_spotlights','light.office_spots','light.office_lamp',
          'light.cloakroom_light','light.bathroom_spots','light.lucas_bathroom_lights',
          'light.garden_lights','light.garden_door_light'
        ];
        const onCount = lights.filter(id => states[id]?.state === 'on').length;
        return onCount > 0 ? `${onCount} On` : 'All Off';
      ]]]
    tap_action:
      action: navigate
      navigation_path: '/dashboard-eidam/rooms'
      haptic: light

  # Climate overview
  - type: custom:button-card
    template: section_title
    name: Climate
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: climate.lounge
        name: Lounge
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light
      - type: custom:button-card
        entity: climate.bedroom
        name: Bedroom
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light
      - type: custom:button-card
        entity: climate.lucas_room
        name: Lucas's Room
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light
      - type: custom:button-card
        entity: climate.office
        name: Office
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light
      - type: custom:button-card
        entity: climate.lounge_ac
        name: Lounge AC
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light
      - type: custom:button-card
        entity: climate.kitchen
        name: Kitchen
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

  # House mode popup
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#house_mode'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 450px)
        margin_top_desktop: calc(100vh - 450px)
      - type: custom:button-card
        template: kohbo_popup_page_title
        name: House Mode
      - type: entities
        entities:
          - entity: input_select.house
            name: House Mode
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml

  - !include /config/dashboards/eidam/includes/navbar.yaml

type: custom:vertical-layout
title: Home
path: home
theme: eidam-pastel
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  #
  # Page Header
  #
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:
        - type: custom:button-card
          template: empty_column
        - type: custom:button-card
          template: kohbo_header_page_title
          name: Eidam
        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:bell
          icon_color: var(--secondary-text-color)
          tap_action:
            action: navigate
            navigation_path: '#notifications'

  #
  # Quick Overview - House mode + People
  #
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_layout_card_mod.yaml
    card:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 60% 40%
        margin: 0px
        padding: 0px
        card_margin: 0px
        gap: 5px
      cards:
        - type: custom:mod-card
          card_mod:
            style:
              hui-horizontal-stack-card$: |
                #root {
                  gap: 5px !important;
                }
          card:
            type: horizontal-stack
            cards:
              # House Mode Chip
              - type: custom:button-card
                template: kohbo_chip_card
                entity: input_select.house
                state:
                  - value: "Away"
                    icon: mdi:home-export-outline
                    color: var(--warning-color)
                  - value: "All Out"
                    icon: mdi:home-off-outline
                    color: var(--error-color)
                  - value: "Day Time"
                    icon: mdi:weather-sunny
                    color: var(--primary-color)
                  - value: "Evening Time"
                    icon: mdi:weather-sunset
                    color: var(--success-color)
                  - value: "Night Time"
                    icon: mdi:weather-night
                    color: var(--secondary-text-color)
                tap_action:
                  action: navigate
                  navigation_path: '#house_mode'
                  haptic: light

              # Energy
              - type: custom:button-card
                template: kohbo_chip_card
                name: Energy
                icon: mdi:lightning-bolt
                entity: sensor.energy_daily
                show_state: true
                styles:
                  state:
                    - margin-left: 3px

        # People
        - type: custom:mod-card
          card_mod:
            style:
              hui-horizontal-stack-card$: |
                #root {
                  display: flex;
                  justify-content: flex-end;
                  align-items: start;
                }
              .: |
                ha-card {
                  height: 100% !important;
                  align-self: center !important;
                }
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: person.edward
                template: kohbo_person_entity
                tap_action:
                  action: more-info
                  haptic: light


  #
  # Security Overview
  #
  - type: custom:stack-in-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_stack_styles.yaml
    cards:
      - type: custom:button-card
        template: kohbo_card_small_header
        name: Security

      - type: custom:stack-in-card
        mode: vertical
        card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
        cards:
          - type: horizontal-stack
            cards:
              # Ring Doorbell - Basement
              - type: custom:button-card
                entity: binary_sensor.basement_door_ding
                name: Basement
                template: kohbo_security_item
                icon: mdi:doorbell
                state:
                  - value: 'on'
                    icon: mdi:doorbell
                    color: var(--warning-color)
                    state_display: Ringing
                  - value: 'off'
                    icon: mdi:doorbell
                    color: var(--success-color)
                    state_display: Clear

              # Ring Doorbell - Upstairs
              - type: custom:button-card
                entity: binary_sensor.upstairs_ding
                name: Upstairs
                template: kohbo_security_item
                icon: mdi:doorbell
                state:
                  - value: 'on'
                    color: var(--warning-color)
                    state_display: Ringing
                  - value: 'off'
                    color: var(--success-color)
                    state_display: Clear

              # Ring Doorbell - Lobby
              - type: custom:button-card
                entity: binary_sensor.lobby_ding
                name: Lobby
                template: kohbo_security_item
                icon: mdi:doorbell
                state:
                  - value: 'on'
                    color: var(--warning-color)
                    state_display: Ringing
                  - value: 'off'
                    color: var(--success-color)
                    state_display: Clear

          - type: horizontal-stack
            cards:
              # Cameras link
              - type: custom:button-card
                name: Cameras
                icon: mdi:cctv
                template: kohbo_security_item
                tap_action:
                  action: navigate
                  navigation_path: '/dashboard-eidam/cameras'
                  haptic: light

              # Water Leak Status
              - type: custom:button-card
                name: Leaks
                icon: mdi:water-alert
                template: kohbo_security_item
                tap_action:
                  action: more-info


  #
  # Climate Overview
  #
  - type: custom:button-card
    template: section_title
    name: Climate

  - type: grid
    columns: 2
    square: false
    cards:
      # Interior Lights count
      - type: custom:button-card
        entity: light.lounge_spots
        name: Lights
        template: kohbo_device_entity
        icon: mdi:lightbulb-group
        state_display: >
          [[[
            const lights = [
              'light.lounge_spots','light.lounge_play_light_bar','light.lounge_light_strip',
              'light.lounge_piano_lamp','light.lounge_iris','light.hallway_spots',
              'light.hallway_lamp_post','light.hallway_signe_light','light.bedroom_spots',
              'light.bedroom_signe','light.bedroom_tv_strip','light.lucas_room_spots',
              'light.lucas_room_iris','light.lucas_cloud_lamp','light.lucas_go_nightlight',
              'light.kitchen_spotlights','light.office_spots','light.cloakroom_light',
              'light.bathroom_spots','light.lucas_bathroom_lights','light.garden_lights'
            ];
            const onCount = lights.filter(id => states[id]?.state === 'on').length;
            return onCount > 0 ? `${onCount} On` : 'All Off';
          ]]]
        tap_action:
          action: navigate
          navigation_path: '/dashboard-eidam/rooms'
          haptic: light

      # Lounge Climate
      - type: custom:button-card
        entity: climate.lounge
        name: Lounge
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

      # Bedroom Climate
      - type: custom:button-card
        entity: climate.bedroom
        name: Bedroom
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

      # Lucas Climate
      - type: custom:button-card
        entity: climate.lucas_room
        name: Lucas's Room
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

      # Office Climate
      - type: custom:button-card
        entity: climate.office
        name: Office
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

      # AC (Sensibo)
      - type: custom:button-card
        entity: climate.lounge_ac
        name: Lounge AC
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light


  #
  # House Mode Popup
  #
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#house_mode'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 450px)
        margin_top_desktop: calc(100vh - 450px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: House Mode

      - type: entities
        entities:
          - entity: input_select.house
            name: House Mode
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml

  #
  # Navbar
  #
  - !include /config/dashboards/eidam/includes/navbar.yaml

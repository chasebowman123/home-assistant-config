type: custom:vertical-layout
title: Lucas
path: lucas
theme: eidam-pastel
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  #
  # Page Header
  #
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:
        - type: custom:button-card
          template: empty_column
        - type: custom:button-card
          template: kohbo_header_page_title
          name: Lucas
        - type: custom:button-card
          template: empty_column

  #
  # Status
  #
  - type: custom:stack-in-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_stack_styles.yaml
    cards:
      - type: custom:button-card
        template: kohbo_card_small_header
        name: Status

      - type: custom:stack-in-card
        mode: horizontal
        card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
        cards:
          - type: custom:button-card
            entity: input_boolean.lucas_sleeping
            name: Sleeping
            icon: mdi:baby-face-outline
            template: kohbo_security_item
            state_display: |
              [[[
                return entity.state == "on" ? "Sleeping" : "Awake";
              ]]]

          - type: custom:button-card
            entity: input_select.lucas_room
            name: Room Mode
            icon: mdi:home
            template: kohbo_security_item
            state_display: |
              [[[
                return entity.state;
              ]]]

  #
  # Environment
  #
  - type: custom:button-card
    template: section_title
    name: Environment

  - type: grid
    columns: 2
    square: false
    cards:
      # Temperature
      - type: custom:button-card
        entity: climate.lucas_room
        name: Temperature
        template: kohbo_thermostat_entity
        tap_action:
          action: more-info
          haptic: light

      # Air Quality
      - type: custom:button-card
        entity: sensor.lucass_room_air_quality_monitor_indoor_air_quality
        name: Air Quality
        template: kohbo_device_entity
        icon: mdi:air-filter
        tap_action:
          action: more-info
          haptic: light

      # Room Temp Sensor
      - type: custom:button-card
        entity: sensor.lucas_room_temperature
        name: Room Temp
        template: kohbo_device_entity
        icon: mdi:thermometer
        tap_action:
          action: more-info
          haptic: light

      # Bath Temp
      - type: custom:button-card
        entity: sensor.lucas_bath_temp_sensor_temperature
        name: Bath Temp
        template: kohbo_device_entity
        icon: mdi:bathtub-outline
        tap_action:
          action: more-info
          haptic: light

      # PM2.5
      - type: custom:button-card
        entity: sensor.core_400s_pm2_5
        name: PM2.5
        template: kohbo_device_entity
        icon: mdi:weather-dust
        tap_action:
          action: more-info
          haptic: light

      # Humidifier
      - type: custom:button-card
        entity: switch.lucas_strip_humidifier
        name: Humidifier
        template: kohbo_device_entity
        icon: mdi:air-humidifier
        tap_action:
          action: toggle
          haptic: light

  #
  # Temperature History
  #
  - type: custom:mini-graph-card
    name: Room Temperature (24h)
    entities:
      - entity: sensor.lucas_room_temperature
        name: Room
        color: "#74B9FF"
    hours_to_show: 24
    points_per_hour: 4
    line_width: 2
    show:
      labels: true
      points: false
      legend: false

  #
  # Lights
  #
  - type: custom:button-card
    template: section_title
    name: Lights

  - type: tile
    entity: light.lucas_room_spots
    name: Spots
    icon: mdi:ceiling-light-multiple
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  - type: tile
    entity: light.lucas_room_iris
    name: Iris
    icon: mdi:lightbulb
    features:
      - type: light-brightness
      - type: light-color-temp
    features_position: inline
    vertical: false

  - type: tile
    entity: light.lucas_cloud_lamp
    name: Cloud Lamp
    icon: mdi:cloud
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  - type: tile
    entity: light.lucas_go_nightlight
    name: Go Nightlight
    icon: mdi:lightbulb-night
    features:
      - type: light-brightness
      - type: light-color-temp
    features_position: inline
    vertical: false

  - type: tile
    entity: light.lucas_bathroom_lights
    name: Lucas Bathroom
    icon: mdi:shower
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  #
  # Climate Control
  #
  - type: custom:button-card
    template: section_title
    name: Climate

  - type: tile
    entity: climate.lucas_room
    name: Lucas's Room
    features:
      - type: climate-hvac-modes
      - type: target-temperature

  - type: tile
    entity: fan.core_400s
    name: Air Purifier
    icon: mdi:air-purifier
    features:
      - type: fan-speed
    features_position: inline
    vertical: false

  #
  # Camera
  #
  - type: custom:button-card
    template: section_title
    name: Camera

  - type: picture-entity
    entity: camera.lucas_ring
    name: Lucas's Room
    show_state: false
    show_name: true
    camera_view: live

  #
  # Media
  #
  - type: custom:button-card
    template: section_title
    name: Media

  - type: custom:decluttering-card
    template: media_player
    variables:
      - media_player: media_player.lucas_room_sonos
      - room_name: Lucas's Room
      - navigation_path: '#lucas_sonos_media_player'

  #
  # Media Player Popup
  #
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.lucas_room_sonos
      - hash: '#lucas_sonos_media_player'

  #
  # Navbar
  #
  - !include /config/dashboards/eidam/includes/navbar.yaml

type: custom:vertical-layout
title: Bedroom
path: rooms-bedroom
theme: eidam-pastel
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Bedroom
      - navigation_path: /dashboard-eidam/rooms
      - settings_path: '#bedroom_settings_popup'

  - type: custom:stack-in-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_stack_styles.yaml
    cards:
      - type: custom:button-card
        template: kohbo_card_small_header
        name: Bedroom Mode
      - type: entities
        card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
        entities:
          - entity: input_select.bedroom
            name: Bedroom Mode
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml

  - type: custom:button-card
    template: section_title
    name: Climate
  - type: tile
    entity: climate.bedroom
    name: Bedroom
    features:
      - type: climate-hvac-modes
      - type: target-temperature

  - type: custom:button-card
    template: section_title
    name: Lights
  - type: tile
    entity: light.bedroom_spots
    name: Spots
    icon: mdi:ceiling-light-multiple
    features:
      - type: light-brightness
    features_position: inline
    vertical: false
  - type: tile
    entity: light.bedroom_signe
    name: Signe
    icon: mdi:floor-lamp
    features:
      - type: light-brightness
      - type: light-color-temp
    features_position: inline
    vertical: false
  - type: tile
    entity: light.bedroom_tv_strip
    name: TV Strip
    icon: mdi:led-strip-variant
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  - type: custom:button-card
    template: section_title
    name: Media
  - type: custom:decluttering-card
    template: media_player
    variables:
      - media_player: media_player.bedroom_sonos
      - room_name: Bedroom
      - navigation_path: '#bedroom_sonos_media_player'

  - type: custom:button-card
    template: section_title
    name: Devices
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: media_player.bedroom_tv
        name: Bedroom TV
        template: kohbo_device_entity
        icon: mdi:television

  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.bedroom_sonos
      - hash: '#bedroom_sonos_media_player'

  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#bedroom_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 450px)
        margin_top_desktop: calc(100vh - 450px)
      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Bedroom Settings
      - type: custom:button-card
        template: section_title
        name: Mode
      - type: entities
        entities:
          - entity: input_select.bedroom
            name: Bedroom Mode
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml

  - !include /config/dashboards/eidam/includes/navbar.yaml

type: custom:vertical-layout
title: Garden
path: rooms-garden
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Garden
      - navigation_path: /dashboard-eidam/rooms
      - settings_path: '#garden_settings_popup'
  - type: custom:button-card
    template: section_title
    name: Lights
  - type: tile
    entity: light.garden_lights
    name: Garden Lights
    icon: mdi:string-lights
    features:
      - type: light-brightness
    features_position: inline
    vertical: false
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#garden_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 300px)
        margin_top_desktop: calc(100vh - 300px)
      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Garden Settings
  - !include /config/dashboards/eidam/includes/navbar.yaml

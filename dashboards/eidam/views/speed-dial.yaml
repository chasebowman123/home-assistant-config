type: custom:vertical-layout
title: Speed Dial
path: speed-dial
theme: eidam-pastel
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  #
  # Page Header
  #
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:
        - type: custom:button-card
          template: empty_column
        - type: custom:button-card
          template: kohbo_header_page_title
          name: Speed Dial
        - type: custom:button-card
          template: empty_column

  #
  # House Mode
  #
  - type: custom:button-card
    template: section_title
    name: House Mode

  - type: entities
    card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_vertical_stack.yaml
    entities:
      - entity: input_select.house
        name: House Mode
        icon: mdi:home
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml

  #
  # Quick Toggles
  #
  - type: custom:button-card
    template: section_title
    name: Quick Toggles

  - type: entities
    card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_vertical_stack.yaml
    entities:
      - entity: input_boolean.lucas_sleeping
        name: Lucas Sleeping
        icon: mdi:baby-face-outline
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.evening_entertaining
        name: Evening Entertaining
        icon: mdi:party-popper
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.edward_alone
        name: Edward Alone
        icon: mdi:account
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.important_meeting
        name: Important Meeting
        icon: mdi:briefcase
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.disco_disco
        name: Disco Disco
        icon: mdi:disco
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.nanny_present
        name: Nanny Present
        icon: mdi:account-child
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.bad_weather
        name: Bad Weather
        icon: mdi:weather-pouring
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

  #
  # Quick Actions
  #
  - type: custom:button-card
    template: section_title
    name: Quick Actions

  - type: grid
    columns: 3
    square: false
    cards:
      # Lobby Buzzer
      - type: custom:button-card
        entity: button.lobby_open_door
        name: Lobby Buzzer
        icon: mdi:door-open
        template: kohbo_device_entity
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.lobby_open_door
          haptic: heavy
        styles:
          icon:
            - color: var(--warning-color)

  #
  # Room Modes
  #
  - type: custom:button-card
    template: section_title
    name: Room Modes

  - type: entities
    card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_vertical_stack.yaml
    entities:
      - entity: input_select.lounge
        name: Lounge Mode
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml
      - entity: input_select.bedroom
        name: Bedroom Mode
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml
      - entity: input_select.lucas_room
        name: Lucas's Room Mode
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml
      - entity: input_select.office
        name: Office Mode
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml

  #
  # Navbar
  #
  - !include /config/dashboards/eidam/includes/navbar.yaml

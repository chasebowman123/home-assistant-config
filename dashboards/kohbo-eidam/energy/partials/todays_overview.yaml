#===========================================================================
# TODAY'S ENERGY OVERVIEW
# Stats row (Real Time | Price | Forecast) + 24h chart
#===========================================================================

type: custom:stack-in-card
mode: vertical
card_mod:
  style: |
    :host {
      --stack-card-gap: 0;
      --vertical-stack-card-gap: 0 !important;
    }
cards:
  #
  # Card Header
  #
  - type: custom:button-card
    template: kohbo_card_header
    name: Today's Overview

  #
  # Stats Row: Real Time | Price | Forecast
  #
  - type: custom:stack-in-card
    mode: horizontal
    # card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
    cards:
      # Real Time Power
      - type: custom:button-card
        template: kohbo_energy_stat_bar
        entity: sensor.energy_current_consumption
        name: Real Time
        state_display: |
          [[[
            const watts = parseFloat(entity?.state || 0);
            if (watts >= 1000) {
              return (watts / 1000).toFixed(1);
            }
            return Math.round(watts);
          ]]]
        variables:
          unit_label: |
            [[[
              const watts = parseFloat(states['sensor.energy_current_consumption']?.state || 0);
              return watts >= 1000 ? 'kW' : 'W';
            ]]]
          show_divider: true
          bar_mode: realtime
      
      # Current Price
      - type: custom:button-card
        template: kohbo_energy_stat_bar
        entity: sensor.comed_current_hour_average_price
        name: Price
        state_display: |
          [[[
            const price = parseFloat(entity?.state || 0);
            return price.toFixed(1);
          ]]]
        variables:
          unit_label: ¢/kWh
          show_divider: true
          bar_mode: price

      # Forecast (EOD prediction)
      - type: custom:button-card
        template: kohbo_energy_stat_bar
        entity: sensor.energy_forecast_end_of_day
        name: Forecast
        state_display: |
          [[[
            return parseFloat(entity?.state || 0).toFixed(1);
          ]]]
        variables:
          unit_label: kWh
          show_divider: false
          bar_mode: forecast

  #
  # 24h CHART: Actual + Forecast + Price
  #
  - type: custom:apexcharts-card
    experimental:
      color_threshold: true
    card_mod:
      style: |
        ha-card {
          background: transparent;
          border-radius: 0;
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
          box-shadow: none;
          border: none;
          padding-bottom: 16px;
        }
        .apexcharts-legend {
          padding: 0 !important;
          margin: 0 !important;
          margin-top: 10px !important;
          display: flex !important;
          flex-direction: row !important;
          flex-wrap: wrap !important;
          justify-content: center !important;
        }
        .apexcharts-legend-group {
          display: contents !important;
        }
        .apexcharts-legend-series {
          display: inline-flex !important;
          margin: 0 8px !important;
        }
    graph_span: 24h
    span:
      start: day
    header:
      show: false
    apex_config:
      chart:
        height: 200
      grid:
        borderColor: 'rgba(255,255,255,0.05)'
      legend:
        show: true
        position: bottom
        horizontalAlign: center
        floating: false
        fontSize: '11px'
        markers:
          width: 8
          height: 8
        itemMargin:
          horizontal: 16
          vertical: 0
      xaxis:
        labels:
          format: 'HH'
        axisBorder:
          show: false
        axisTicks:
          show: false
      yaxis:
        - id: energy
          seriesName: Actual
          min: 0
          forceNiceScale: true
          labels:
            style:
              fontSize: '10px'
            formatter: |
              EVAL: (val) => val ? `${val.toFixed(1)}` : '0'
        - id: energy2
          seriesName: Forecast
          show: false
          min: 0
          forceNiceScale: true
        - id: price
          seriesName: Price
          opposite: true
          min: 0
          max: 12
          tickAmount: 4
          labels:
            style:
              fontSize: '10px'
            formatter: |
              EVAL: (val) => `${Math.round(val)}¢`
      tooltip:
        x:
          format: 'HH:mm'
    series:
      # Actual hourly usage (bars)
      # Using utility meter which handles daily cycles properly
      - entity: sensor.whole_home_energy_daily_usage
        type: column
        name: Actual
        unit: kWh
        group_by:
          func: diff
          duration: 1h
        color_threshold:
          - value: 0
            color: var(--success-color)
          - value: 0.5
            color: var(--accent-color)
          - value: 1.0
            color: var(--orange-color)
          - value: 1.5
            color: var(--error-color)
        yaxis_id: energy
        show:
          extremas: false
          in_header: true
          legend_value: true
      
      # Hourly forecast (dynamic - adjusted for today's pace)
      - entity: sensor.energy_hourly_forecast_json
        type: line
        name: Forecast
        color: var(--accent-color)
        unit: kWh
        stroke_width: 2
        curve: smooth
        yaxis_id: energy2
        extend_to: end
        float_precision: 2
        show:
          extremas: false
          in_header: true
          legend_value: true
        data_generator: |
          let forecasts = entity.attributes.forecasts || [];
          // Parse JSON string if needed
          if (typeof forecasts === 'string') {
            try {
              forecasts = JSON.parse(forecasts);
            } catch (e) {
              forecasts = [];
            }
          }
          const now = new Date();
          const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
          const data = [];
          for (let h = 0; h < 24; h++) {
            const timestamp = new Date(startOfDay.getTime() + h * 3600000);
            const value = parseFloat(forecasts[h]) || 0;
            data.push([timestamp.getTime(), value]);
          }
          return data;
      
      # Energy price (line on secondary axis)
      - entity: sensor.comed_current_hour_average_price
        type: line
        name: Price
        color: var(--light-primary-color)
        unit: ¢
        stroke_width: 2
        curve: stepline
        yaxis_id: price
        group_by:
          func: avg
          duration: 1h
        show:
          extremas: false
          in_header: true
          legend_value: true

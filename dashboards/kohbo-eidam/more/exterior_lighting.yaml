type: custom:vertical-layout
title: Exterior Lighting
path: exterior-lighting
theme: kohbo
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: top_toolbar
    variables:
      - cards:
        # - type: custom:button-card
        #   template: empty_column
        # Back button
        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:arrow-left
          tap_action:
            action: navigate
            navigation_path: /dashboard-kohbo/home

        # Page Title
        - type: custom:button-card
          template: kohbo_header_page_title
          name: Exterior Lighting

        # Settings Button
        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:dots-horizontal
          icon_color: var(--secondary-text-color)
          tap_action:
            action: navigate
            navigation_path: '#exterior_lighting_settings_popup'


  # 
  # Sun & Moon Status
  # 
  - type: custom:stack-in-card
    card_mod:
      style: |
        :host {
          --vertical-stack-card-gap: 8px;
        }
    cards:
      # - type: entities
      #   card_mod:
      #     style: |
      #       ha-card #states {
      #         padding-bottom: 12px !important;
      #       }
      #   entities:
      #     # Exterior House Lights
      #     - entity: switch.exterior_lights
      #       name: Exterior Lights
      #       icon: mdi:wall-sconce
      #       card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
      #       secondary_info: last-changed
      #       state_color: true

      - type: custom:button-card
        # template: kohbo_stacked_card_top
        entity: sun.sun
        label: Sun Status
        layout: icon_name_state
        state_display: >
          [[[
            const sun = states['sun.sun'];
            const lux = states['sensor.tempest_illuminance']
              ? parseFloat(states['sensor.tempest_illuminance'].state)
              : 0;
            const weather = states['weather.pirateweather']
              ? states['weather.pirateweather'].state
              : 'unknown';
            const now = new Date();
            const nextSet = new Date(sun.attributes.next_setting);
            const diffSet = (nextSet - now) / 3600000; // hours until sunset

            // Map bad weather to overcast mood
            const cloudyStates = ['cloudy', 'partlycloudy', 'fog', 'rainy', 'pouring', 'snowy', 'snowy-rainy', 'hail', 'exceptional'];

            // NIGHT
            if (sun.state === 'below_horizon') return "It's dark outside 🌙";

            // DAYTIME WITH WEATHER & ILLUMINANCE
            if (lux > 15000 && !cloudyStates.includes(weather)) return "It's bright and sunny ☀️";
            if (lux > 10000 && cloudyStates.includes(weather)) return "It's bright but overcast ☁️";
            if (lux > 3000 && cloudyStates.includes(weather)) return "It's daylight but gloomy 🌧️";
            if (lux > 1000 && diffSet > 2 && !cloudyStates.includes(weather)) return "It's sunny and clear 🌤️";
            if (lux > 1000 && diffSet <= 2 && diffSet > 0) return "The sun is setting 🌇";
            if (lux < 500 && cloudyStates.includes(weather)) return "It's dim and cloudy — lights may help 💡";
            if (lux < 200) return "It's getting dark — lights will turn on soon 💡";
            
            return "It's moderately bright outside";
          ]]]
        show_icon: true
        show_name: false
        show_label: true
        show_state: true
        styles:
          card:
            - background: transparent
            - backdrop-filter: none
            - -webkit-backdrop-filter: none
            - padding: 20px 20px 12px 20px
            - box-shadow: none
            - display: flex
            - align-items: center
            - justify-content: flex-start
            - gap: 12px
            - border: none
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: min-content 1fr
            - align-items: center
          icon:
            - color: >
                [[[
                  const lux = states['sensor.tempest_illuminance'].state ? parseFloat(states['sensor.tempest_illuminance'].state) : 0;
                  if (lux < 10) return '#90a4ae';       // dim gray-blue (night)
                  if (lux < 100) return '#ff8a65';      // early dawn / dusk orange
                  if (lux < 1000) return '#ffd54f';     // morning yellow
                  if (lux < 10000) return '#ffee58';    // bright yellow
                  return '#fff176';                     // intense daylight
                ]]]
            - width: 38px
            - height: 38px
            - margin-right: 15px
          name:
            - font-size: 20px
            - font-weight: regular
            - color: white
            - justify-self: start
            - margin-bottom: 4px;
          label:
            - font-size: 12px
            - color: "#CED4DA"
            - justify-self: start

      
      - type: custom:stack-in-card
        mode: horizontal
        card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
        cards:
          - type: custom:button-card
            template: kohbo_security_item
            entity: sun.sun
            # name: Sun Status
            name: >
              [[[
                if (states['sun.sun'].state === 'below_horizon') 
                  return 'Moon Phase';
                else
                  return 'Sun Status';
              ]]]
            icon: mdi:weather-sunny
            styles:
              icon:
                - color: >
                    [[[ 
                      const sun = states['sun.sun'];
                      if (sun.state === 'below_horizon') return '#a5b3cc'; // moon color
                      const elevation = sun.attributes.elevation;
                      if (elevation > 20) return '#fdd835'; // bright midday
                      if (elevation > 5) return '#ffb300';  // rising or setting
                      return '#ff7043'; // near horizon
                    ]]]
            state:
              - value: above_horizon
                icon: mdi:white-balance-sunny
                # icon: >
                #   [[[
                #     const sun = states['sun.sun'];
                #     const elevation = sun.attributes.elevation;
                #     const now = new Date();
                #     const nextSetting = new Date(states['sun.sun'].attributes.next_setting);
                #     const nextRising = new Date(states['sun.sun'].attributes.next_rising);
                #     const diffSet = (nextSetting - now) / 3600000; // hours until sunset
                #     const diffRise = (nextRising - now) / 3600000; // hours until sunrise

                #     if (diffSet <= 2 && diffSet > 0) return 'mdi:weather-sunset-down';
                #     if (diffRise <= 2 && diffRise > 0) return 'mdi:weather-sunset-up';
                #     if (elevation > 15) return 'mdi:weather-sunny';
                #     if (elevation > 0) return 'mdi:white-balance-sunny';
                #     return 'mdi:weather-night';
                #   ]]]
                state_display: '[[[ return entity.state]]]'
              - value: below_horizon
                color: var(--orange-color)
                icon: >
                  [[[
                    const moonPhase = states['sensor.moon'].state;
                    if (moonPhase === 'new_moon') return 'mdi:moon-new';
                    if (moonPhase === 'waxing_crescent') return 'mdi:moon-waxing-crescent';
                    if (moonPhase === 'first_quarter') return 'mdi:moon-first-quarter';
                    if (moonPhase === 'waxing_gibbous') return 'mdi:moon-waxing-gibbous';
                    if (moonPhase === 'full_moon') return 'mdi:moon-full';
                    if (moonPhase === 'waning_gibbous') return 'mdi:moon-waning-gibbous';
                    if (moonPhase === 'last_quarter') return 'mdi:moon-last-quarter';
                    if (moonPhase === 'waning_crescent') return 'mdi:moon-waning-crescent';
                  ]]]
                state_display: >
                  [[[ 
                    return states['sensor.moon'].state.split('_')
                    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
                    .join(' ');
                  ]]]
          # Illuminance
          - type: custom:button-card
            entity: sensor.tempest_illuminance
            name: Illuminance
            template: kohbo_security_item
            # icon: mdi:brightness-5
            icon: >
              [[[
                const lux = entity.state ? parseFloat(entity.state) : 0;
                if (lux < 10) return "mdi:weather-night";
                if (lux < 100) return "mdi:weather-sunset";
                if (lux < 1000) return "mdi:weather-partly-cloudy";
                if (lux < 10000) return "mdi:weather-sunny";
                return "mdi:white-balance-sunny";
              ]]]
            styles:
              icon:
                - color: >
                    [[[
                      const lux = entity.state ? parseFloat(entity.state) : 0;
                      if (lux < 10) return '#90a4ae';       // dim gray-blue (night)
                      if (lux < 100) return '#ff8a65';      // early dawn / dusk orange
                      if (lux < 1000) return '#ffd54f';     // morning yellow
                      if (lux < 10000) return '#ffee58';    // bright yellow
                      return '#fff176';                     // intense daylight
                    ]]]

          - type: custom:button-card
            template: kohbo_security_item
            entity: sun.sun
            name: >
              [[[
                const now = new Date();
                const nextRise = new Date(states['sun.sun'].attributes.next_rising);
                const nextSet = new Date(states['sun.sun'].attributes.next_setting);
                if (nextRise < nextSet) return "Next Sunrise";
                else return "Next Sunset";
              ]]]
            icon: >
              [[[
                const now = new Date();
                const nextRise = new Date(states['sun.sun'].attributes.next_rising);
                const nextSet = new Date(states['sun.sun'].attributes.next_setting);
                if (nextRise < nextSet) return "mdi:weather-sunset-up";
                else return "mdi:weather-sunset-down";
              ]]]
            state_display: >
              [[[
                const now = new Date();
                const nextRise = new Date(states['sun.sun'].attributes.next_rising);
                const nextSet = new Date(states['sun.sun'].attributes.next_setting);
                const nextEvent = nextRise < nextSet ? nextRise : nextSet;
                const options = { hour: 'numeric', minute: '2-digit' };
                return nextEvent.toLocaleTimeString([], options);
              ]]]
            styles:
              icon:
                - color: >
                    [[[
                      const now = new Date();
                      const nextRise = new Date(states['sun.sun'].attributes.next_rising);
                      const nextSet = new Date(states['sun.sun'].attributes.next_setting);
                      if (nextRise < nextSet) return '#ffcc80'; // sunrise orange
                      else return '#ff8a65'; // sunset red-orange
                    ]]]


  
  # 
  # Exterior House Lights
  #
  - type: custom:decluttering-card
    template: horizontal_action_card
    variables:
      - entity: switch.exterior_lights
      - name: All Exterior Lights
      - template: kohbo_horizontal_action_card_light_entity

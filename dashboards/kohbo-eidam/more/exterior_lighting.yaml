            secondary_info: last-changed
            state_color: true

      - type: custom:button-card
        name: The interior and exterior garage light switches are right next to each other. People often confuse them and accidentally toggle the wrong light switch. This automation will turn the exterior garage lights back on if the interior garage lights are accidentally turned off. And vice versa.
        template: kohbo_card_section_description




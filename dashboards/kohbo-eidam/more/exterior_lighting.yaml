  # 
  # Exterior Lighting Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#exterior_lighting_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 750px)
        margin_top_desktop: calc(100vh - 750px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Settings

      # 
      # Automations
      # 
      - type: custom:button-card
        template: section_title
        name: Automations
      - type: entities
        entities:
          # Activate Exterior Lighting at Sunset
          - entity: automation.activate_exterior_lighting_at_sunset
            name: Turn on at Sunet
            icon: mdi:weather-sunset-down
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true
          # Deactivate Exterior Lighting at Sunrise
          - entity: automation.deactivate_exterior_lighting_at_sunrise
            name: Turn off at Sunrise
            icon: mdi:weather-sunset-up
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true
          # Activate Exterior Lighting Due to Weather
          - entity: automation.activate_exterior_lighting_due_to_weather
            name: Turn on due to Weather
            icon: mdi:weather-cloudy
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true
          - entity: automation.deactivate_exterior_accent_lighting_at_bedtime
            name: Turn off Accent Lights at Bedtime
            icon: mdi:weather-night
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

      # 
      # Automations
      # 
      - type: custom:button-card
        template: section_title
        name: Utility Automations
      - type: entities
        entities:
          - entity: automation.garage_lights_accidentally_turned_off_fix
            name: Accidental Turn Off
            icon: mdi:auto-fix
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true
          - entity: automation.garage_lights_accidentally_turned_on_fix

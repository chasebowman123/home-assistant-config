type: custom:vertical-layout
title: Active Rooms
path: rooms-active
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout_tabbed_nav.yaml
cards:
  - !include /config/dashboards/templates/includes/rooms/kohbo_room_page_header.yaml

  - type: vertical-stack
    cards:
      # - type: custom:button-card
      #   template: kohbo_page_title
      #   name: Main Floor
      
      # 
      # Overview Area for the main floor
      # 
      - type: custom:mod-card
        style: !include /config/dashboards/templates/includes/card_mod/chips/page_chip_layout.yaml
        card:
          type: horizontal-stack
          cards:
            # First Floor Occupancy
            - type: custom:button-card
              template: kohbo_chip_card
              entity: sensor.first_floor
              icon: mdi:home-floor-1
              state_display: >
                [[[ 
                  if (entity.attributes.occupied_rooms_count > 0)
                    return entity.attributes.occupied_rooms_count + " Occupied"
                  else
                    return "Empty"
                ]]]
              state:
                - value: "on"
                  color: var(--success-color)
                - value: "off"
                  color: var(--light-grey-color)

            # Upper Floor Occupancy
            - type: custom:button-card
              template: kohbo_chip_card
              entity: sensor.upper_floor
              icon: mdi:home-floor-2
              state_display: >
                [[[ 
                  if (entity.attributes.occupied_rooms_count > 0)
                    return entity.attributes.occupied_rooms_count + " Occupied"
                  else
                    return "Empty"
                ]]]
              state:
                - value: "on"
                  color: var(--success-color)
                - value: "off"
                  color: var(--error-color)
            
            # Lights
            - type: custom:button-card
              template: kohbo_chip_card
              entity: light.interior_lights
              state_display: >
                [[[
                  if (states['light.interior_lights'].state == "on")
                    return `${states['sensor.interior_lights_on'].state} On`
                  else
                    return "Off"
                ]]]
              tap_action:
                action: more-info


      # 
      # Office
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.office_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/main_floor/partials/office_card.yaml

      # 
      # Family Room
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.family_room_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/main_floor/partials/family_room_card.yaml

      # 
      # Kitchen
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.kitchen_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/main_floor/partials/kitchen_card.yaml

      # 
      # Playroom
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.playroom_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/main_floor/partials/playroom_card.yaml

      # 
      # Dining Room
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.dining_room_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/main_floor/partials/dining_room_card.yaml

      # 
      # Jr. Suite
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.jr_suite_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/main_floor/partials/jr_suite_card.yaml

      # 
      # Main Bedroom
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.main_bedroom_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/upper_floor/partials/main_bedroom_card.yaml

      # 
      # Nino's Bedroom
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.ninos_bedroom_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/upper_floor/partials/ninos_bedroom_card.yaml

      # 
      # Gianluca's Bedroom
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.gianlucas_room_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/upper_floor/partials/gianlucas_bedroom_card.yaml

      # 
      # Foyer
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.foyer_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/main_floor/partials/foyer_card.yaml
      
      # 
      # Mudroom
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.mudroom_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/main_floor/partials/mudroom_card.yaml

      # 
      # Upstairs Hallway
      # 
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.upstairs_hallway_occupied
            state: 'on'
        card:
          !include /config/dashboards/kohbo-eidam/rooms/upper_floor/partials/upstairs_hallway_card.yaml




  # 
  # Office Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_office
      - hash: '#office_media_player'

  # 
  # Kitchen Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_kitchen
      - hash: '#kitchen_media_player'

  # 
  # Dining Room Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_living_room
      - hash: '#dining_room_media_player'

  # 
  # Family Room Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_family_room
      - hash: '#family_room_media_player'

  # 
  # Playroom Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_playroom
      - hash: '#playroom_media_player'
      
  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml
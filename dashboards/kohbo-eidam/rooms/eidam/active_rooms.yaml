type: custom:vertical-layout
title: Rooms
path: rooms-active
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout_tabbed_nav.yaml
cards:
  # 
  # Page Header
  # 
  - !include /config/dashboards/templates/includes/rooms/kohbo_room_page_header.yaml

  - type: vertical-stack
    cards:
      # 
      # Overview chips
      # 
      - type: custom:mod-card
        style: !include /config/dashboards/templates/includes/card_mod/chips/page_chip_layout.yaml
        card:
          type: horizontal-stack
          cards:
            # House Mode
            - type: custom:button-card
              template: kohbo_chip_card
              entity: input_select.house
              icon: mdi:home
              state:
                - value: "Away"
                  icon: mdi:home-export-outline
                  color: var(--warning-color)
                - value: "All Out"
                  icon: mdi:home-off-outline
                  color: var(--error-color)
                - value: "Dogs Alone"
                  icon: mdi:dog
                  color: var(--orange-color)
                - value: "Day Time"
                  icon: mdi:weather-sunny
                  color: var(--primary-color)
                - value: "Evening Time"
                  icon: mdi:weather-sunset
                  color: var(--success-color)
                - value: "Night Time"
                  icon: mdi:weather-night
                  color: var(--secondary-text-color)
              tap_action:
                action: navigate
                navigation_path: '#house_mode'
                haptic: light

            # People – Edward
            - type: custom:button-card
              entity: person.edward
              template: kohbo_chip_card
              icon: mdi:account
              state_display: >
                [[[
                  return entity.state;
                ]]]

            # People – Loretta
            - type: custom:button-card
              entity: person.loretta
              template: kohbo_chip_card
              icon: mdi:account
              state_display: >
                [[[
                  return entity.state;
                ]]]


      # 
      # Lounge
      # 
      - type: custom:button-card
        entity: input_select.lounge
        name: Lounge
        template: kohbo_device_entity
        icon: mdi:sofa
        show_state: true
        tap_action:
          action: navigate
          navigation_path: /dashboard-kohbo-eidam/rooms-lounge
          haptic: light

      # 
      # Bedroom
      # 
      - type: custom:button-card
        entity: input_select.bedroom
        name: Bedroom
        template: kohbo_device_entity
        icon: mdi:bed-king
        show_state: true
        tap_action:
          action: navigate
          navigation_path: /dashboard-kohbo-eidam/rooms-bedroom
          haptic: light

      # 
      # Lucas's Room
      # 
      - type: custom:button-card
        entity: input_select.lucas_room
        name: "Lucas's Room"
        template: kohbo_device_entity
        icon: mdi:baby-face-outline
        show_state: true
        tap_action:
          action: navigate
          navigation_path: /dashboard-kohbo-eidam/rooms-lucas-room
          haptic: light

      # 
      # Kitchen
      # 
      - type: custom:button-card
        entity: light.kitchen_spotlights
        name: Kitchen
        template: kohbo_device_entity
        icon: mdi:silverware-fork-knife
        show_state: true
        tap_action:
          action: navigate
          navigation_path: /dashboard-kohbo-eidam/rooms-kitchen
          haptic: light

      # 
      # Office
      # 
      - type: custom:button-card
        entity: input_select.office
        name: Office
        template: kohbo_device_entity
        icon: mdi:laptop
        show_state: true
        tap_action:
          action: navigate
          navigation_path: /dashboard-kohbo-eidam/rooms-office
          haptic: light

      # 
      # Hallway
      # 
      - type: custom:button-card
        entity: light.hallway_spots
        name: Hallway
        template: kohbo_device_entity
        icon: mdi:door
        show_state: true
        tap_action:
          action: navigate
          navigation_path: /dashboard-kohbo-eidam/rooms-hallway
          haptic: light


  # 
  # Lounge Media Player Popup
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.lounge_sonos
      - hash: '#lounge_sonos_media_player'

  # 
  # Kitchen Media Player Popup
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.kitchen
      - hash: '#kitchen_media_player'

  # 
  # Bedroom Media Player Popup
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.bedroom_sonos
      - hash: '#bedroom_sonos_media_player'

  # 
  # Lucas's Room Media Player Popup
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.lucas_room_sonos
      - hash: '#lucas_room_sonos_media_player'


  # 
  # House Mode Popup
  # 
  - !include /config/dashboards/kohbo-eidam/home/house_mode_popup.yaml


  # 
  # Navbar
  # 
  - !include /config/dashboards/kohbo-eidam/includes/navbar.yaml

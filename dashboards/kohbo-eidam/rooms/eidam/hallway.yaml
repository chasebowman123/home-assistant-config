type: custom:vertical-layout
title: Hallway
path: rooms-hallway
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Hallway
      - navigation_path: /dashboard-kohbo-eidam/rooms-active
      - settings_path: '#hallway_settings_popup'


  # 
  # Climate
  # 
  - type: custom:button-card
    template: section_title
    name: Climate

  - type: tile
    entity: climate.hallway
    name: Hallway
    features:
      - type: climate-hvac-modes
      - type: target-temperature


  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  - type: tile
    entity: light.hallway_spots
    name: Spots
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  - type: tile
    entity: light.hallway_lamp_post
    name: Lamp Post
    icon: mdi:lamp
    show_entity_picture: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  - type: tile
    entity: light.hallway_signe_light
    name: Signe
    icon: mdi:floor-lamp
    show_entity_picture: false
    features:
      - type: light-brightness
      - type: light-color-temp
    features_position: inline
    vertical: false

  # Cloakroom
  - type: tile
    entity: light.cloakroom_light
    name: Cloakroom
    icon: mdi:coat-rack
    show_entity_picture: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false


  # 
  # Hallway Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#hallway_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 350px)
        margin_top_desktop: calc(100vh - 350px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Hallway Settings


  # 
  # Navbar
  # 
  - !include /config/dashboards/kohbo-eidam/includes/navbar.yaml

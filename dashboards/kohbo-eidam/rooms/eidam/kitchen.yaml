type: custom:vertical-layout
title: Kitchen
path: rooms-kitchen
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Kitchen
      - navigation_path: /dashboard-kohbo-eidam/rooms-active
      - settings_path: '#kitchen_settings_popup'


  # 
  # Climate
  # 
  - type: custom:button-card
    template: section_title
    name: Climate

  - type: tile
    entity: climate.kitchen
    name: Kitchen
    features:
      - type: climate-hvac-modes
      - type: target-temperature


  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  - type: tile
    entity: light.kitchen_spotlights
    name: Spotlights
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false


  # 
  # Media
  # 
  - type: custom:button-card
    template: section_title
    name: Media

  - type: custom:decluttering-card
    template: media_player
    variables:
      - media_player: media_player.kitchen
      - room_name: Kitchen
      - navigation_path: '#kitchen_media_player'


  # 
  # Media Player Popup
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.kitchen
      - hash: '#kitchen_media_player'


  # 
  # Kitchen Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#kitchen_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 350px)
        margin_top_desktop: calc(100vh - 350px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Kitchen Settings


  # 
  # Navbar
  # 
  - !include /config/dashboards/kohbo-eidam/includes/navbar.yaml

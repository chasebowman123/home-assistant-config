type: custom:vertical-layout
title: Office
path: rooms-office
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Office
      - navigation_path: /dashboard-kohbo-eidam/rooms-active
      - settings_path: '#office_settings_popup'

  # 
  # Room Mode Overview
  # 
  - type: custom:stack-in-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_stack_styles.yaml
    cards:
      - type: custom:button-card
        template: kohbo_card_small_header
        name: Office Mode

      - type: entities
        card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
        entities:
          - entity: input_select.office
            name: Office Mode
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml

      - type: custom:stack-in-card
        mode: horizontal
        card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
        cards:
          - type: custom:button-card
            entity: input_boolean.important_meeting
            name: Meeting
            icon: mdi:briefcase
            template: kohbo_security_item
            state_display: |
              [[[
                return entity.state == "on" ? "Active" : "Off";
              ]]]


  # 
  # Climate
  # 
  - type: custom:button-card
    template: section_title
    name: Climate

  - type: tile
    entity: climate.office
    name: Office
    features:
      - type: climate-hvac-modes
      - type: target-temperature


  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  - type: tile
    entity: light.office_spots
    name: Spots
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false


  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_vertical_stack.yaml
    entities:
      - entity: input_boolean.important_meeting
        name: Important Meeting
        icon: mdi:briefcase
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true


  # 
  # Office Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#office_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 400px)
        margin_top_desktop: calc(100vh - 400px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Office Settings

      - type: custom:button-card
        template: section_title
        name: Mode
      - type: entities
        entities:
          - entity: input_select.office
            name: Office Mode
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml


  # 
  # Navbar
  # 
  - !include /config/dashboards/kohbo-eidam/includes/navbar.yaml

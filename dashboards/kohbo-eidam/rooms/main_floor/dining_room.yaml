type: custom:vertical-layout
title: Dining Room
path: rooms-dining-room
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Dining Room
      - navigation_path: /dashboard-kohbo/rooms-main-floor
      - settings_path: '#dining_room_settings_popup'


  # 
  # Room Overview
  # 
  - type: custom:decluttering-card
    template: room_overview
    variables:
      - occupancy: input_boolean.dining_room_occupied
      - mode: input_select.dining_room
      - ble_presence: sensor.dining_room_people_list


  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights
  
  - type: tile
    entity: light.dining_room_main_lights
    name: South Lights
    icon: mdi:desk-lamp
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  - type: tile
    entity: light.living_room_main_lights
    name: North Lights
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false


  # 
  # Media Player
  # 
  - type: custom:button-card
    template: section_title
    name: Music

  - type: custom:decluttering-card
    template: media_player
    variables:
      - media_player: media_player.sonos_living_room
      - room_name: Dining Room
      - navigation_path: '#dining_room_media_player'

  
  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: switch.smart_plug_9_switch
        name: East Wall Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_9_active_power
          confirmation: true

      - type: custom:button-card
        entity: switch.smart_plug_21_switch
        name: Bay Window Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_21_power
          confirmation: true



  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # # Speech Notifications Toggle
      # - entity: input_boolean.family_room_speech_notifications
      #   name: Speech Notifications
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
      #   secondary_info: last-changed
      #   state_color: true

      # Lighting Automations Toggle
      - entity: input_boolean.dining_room_lighting_automations
        name: Lighting Automations
        icon: kohbo:kohbo-light-2
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # # Adaptive Lighting Toggle
      # - entity: switch.adaptive_lighting_family_room
      #   name: Adaptive Lighting
      #   icon: mdi:theme-light-dark
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
      #   secondary_info: last-changed
      #   state_color: true

      # # Adaptive Lighting Toggle
      # - entity: switch.adaptive_lighting_sleep_mode_family_room
      #   name: Adaptive Lighting Sleep Mode
      #   icon: mdi:theme-light-dark
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
      #   secondary_info: last-changed
      #   state_color: true



  # 
  # Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_living_room
      - hash: '#dining_room_media_player'


  # 
  # Dining Room Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#dining_room_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 525px)
        margin_top_desktop: calc(100vh - 525px)
        
      # 
      # Title
      # 
      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Settings

      # 
      # Automations
      # 
      - type: custom:button-card
        template: section_title
        name: Automations
      - type: entities
        entities:
          # Vacuum Clean Dining and Foyer at Night
          - entity: automation.main_level_vacuum_evening_cleaning
            name: Clean at Night (every 2 days)
            icon: mdi:robot-vacuum
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

      # 
      # Sensors
      # 
      - type: custom:button-card
        template: section_title
        name: Sensors
      - type: entities
        entities:
          # Occupancy Sensor
          - entity: binary_sensor.dining_room_north_motion_sensor_occupancy
            icon: kohbo:kohbo-room-occupancy
            name: Occupancy Sensor
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          # Motion Sensor
          - entity: binary_sensor.dining_room_north_motion_sensor_motion
            icon: mdi:motion-sensor
            name: Motion Sensor
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml


  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml
type: custom:vertical-layout
title: Mudroom
path: rooms-mudroom
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Mudroom
      - navigation_path: /dashboard-kohbo/rooms-main-floor
      - settings_path: '#mudroom_settings_popup'

  # 
  # Room Overview
  # 
  - type: custom:decluttering-card
    template: room_overview
    variables:
      - occupancy: input_boolean.mudroom_occupied
      - mode: input_select.mudroom

  # 
  # Climate Overview
  # 
  - type: custom:decluttering-card
    template: climate_temperature_only
    variables:
      - temperature_sensor: sensor.mudroom_motion_sensor_air_temperature
      - room_name: Mudroom

  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  # Ceiling Lights
  - type: tile
    entity: light.mudroom_main_lights
    name:  Lights
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false


  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      # Garage Door Lock
      - type: custom:button-card
        entity: lock.garage_entry_door
        name: Garage Door Lock
        template: kohbo_device_entity
      
      # Interior Garage Door
      - type: custom:button-card
        entity: binary_sensor.interior_garage_door
        name: Interior Garage Door
        template: kohbo_device_door_entity



  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_mudroom_laundry
        name: Adaptive Lighting
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_sleep_mode_mudroom_laundry
        name: Adaptive Lighting Sleep Mode
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

  
        

   
  # Mudroom Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#mudroom_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 675px)
        margin_top_desktop: calc(100vh - 675px)
        
      # 
      # Title
      # 
      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Settings

      # 
      # Automations
      # 
      - type: custom:button-card
        template: section_title
        name: Automations
      - type: entities
        entities:
          # Garage Entry Door - Unlock Upon Arrival
          - entity: automation.garage_entry_door_unlock_upon_arrival
            name: Unlock Upon Arrival
            icon: mdi:door-open
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true
          # Autolock Garage Entry Door
          - entity: automation.garage_entry_door_lock_auto_lock
            name: Autolock Garage Entry Door
            icon: mdi:lock
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true
          - entity: input_boolean.vacuum_mudroom_at_night
            name: Clean at Night
            icon: mdi:robot-vacuum
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

      # 
      # Sensors
      # 
      - type: custom:button-card
        template: section_title
        name: Sensors
      - type: entities
        entities:
          # Motion Sensor
          - entity: binary_sensor.mudroom_motion_sensor_motion_detection
            icon: mdi:motion-sensor
            name: Motion Sensor
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          # Illuminance
          - entity: sensor.mudroom_motion_sensor_illuminance
            name: Illuminance
            entity: sensor.mudroom_motion_sensor_illuminance
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          - entity: sensor.garage_entry_door_battery_level
            name: Lock Battery Level
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          


  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml
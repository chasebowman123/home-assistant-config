  - type: custom:decluttering-card
    template: light_popup
    variables:
      - light_entity: light.office_lights
      - popup_hash: '#office_ceiling_lights'
      - popup_title: 'Ceiling Lights'
      - entity_id: 
        - light.office_1
        - light.office_2
        - light.office_3
        - light.office_4
          

  # 
  # Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_office
      - hash: '#office_media_player'


  # 
  # Office Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#office_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 900px)
        margin_top_desktop: calc(100vh - 900px)
        
      # 
      # Title
      # 
      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Office Settings

      # 
      # Automations
      # 
      - type: custom:button-card
        template: section_title
        name: Automations
      
      - type: entities
        entities:
          # Air Quality Sensor Detections
          - entity: automation.office_air_quality_detections
            name: Air Quality Automations
            icon: mdi:air-filter
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Music Automation
          - entity: automation.office_music_resume
            name: Music Automation
            icon: mdi:music-note
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Deep Work Lighting
          - entity: automation.office_shelf_lights_turn_on_deep_work_lighting
            name: Deep Work Lighting
            icon: mdi:lightbulb-variant
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Treadmill Off
          - entity: automation.office_treadmill_off
            name: Treadmill Off
            icon: mdi:walk
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Clean Office When Rio is at Daycare
          - entity: automation.vacuum_clean_office_when_dog_is_at_daycare
            name: Clean Office When Rio is at Daycare
            icon: mdi:dog
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Clean Office at Night
          - entity: input_boolean.vacuum_office_at_night
            name: Clean at Night
            icon: mdi:robot-vacuum
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

      # 
      # Sensors
      # 
      - type: custom:button-card
        template: section_title
        name: Sensors
      - type: entities
        entities:
          # BLE Base Station
          - entity: binary_sensor.espresense_office
            icon: mdi:bluetooth
            name: BLE Base Station
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          # Occupancy Sensor
          - entity: binary_sensor.office_aqara_occupancy
            icon: kohbo:kohbo-room-occupancy
            name: Occupancy Sensor
            secondary_info: last-changed
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          # Motion Sensor
          - entity: binary_sensor.office_aqara_motion_sensor
            icon: mdi:motion-sensor
            name: Motion Sensor
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          - type: custom:template-entity-row
            icon: mdi:air-filter
            name: Air Purifier Filter Life
            entity: sensor.office_air_purifier_filter_life
            state: "{{ states[config.entity].state }}%"
            secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
            card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
            # color: green
            color: >
              {% set filter_left = states[config.entity].state | int(0) %}
              {% if filter_left < 20 %}
                var(--error-color)
              {% else %}
                var(--success-color)
              {% endif %}

  
  # 
  # Office Climate Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#office_climate_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 750px)
        margin_top_desktop: calc(100vh - 750px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Office Climate


      - type: custom:mini-graph-card
        entities:
          - entity: sensor.office_awair_temperature
          - entity: sensor.tempest_temperature
        name: Temperature
        card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_graph_styles.yaml
        hours_to_show: 24
        points_per_hour: 2
        line_width: 4
        decimals: 0
        smoothing: true
        color_thresholds_transition: smooth
        color_thresholds:
          - color: "#6155F5"
            value: 0
          - color: "#ED4747"
            value: 20
          - color: "#E36001"
            value: 40
          - color: "#FFD166"
            value: 60
          - color: "#06D6A0"
            value: 100



      # 
      # AQI
      # 
      - type: custom:stack-in-card
        cards:
          - type: custom:button-card
            template: security_overview_header
            entity: sensor.office_awair_temperature
            label: Office Temperature
            icon: "[[[ return entity.attributes.icon ]]]"
            show_icon: true
            show_name: false
            show_label: true
            layout: icon_name_state
            state_display: >
              [[[
                const indoor = parseFloat(entity.state);
                const outdoor = states['sensor.tempest_temperature']
                  ? parseFloat(states['sensor.tempest_temperature'].state)
                  : indoor;
                
                // Indoor thresholds
                const indoorVeryCold = indoor < 60;
                const indoorCold = indoor >= 60 && indoor < 67;
                const indoorComfortable = indoor >= 67 && indoor <= 77;
                const indoorWarm = indoor > 77 && indoor <= 85;
                const indoorHot = indoor > 85 && indoor <= 90;
                const indoorSauna = indoor > 90;
                
                // Outdoor thresholds
                const outdoorVeryCold = outdoor < 40;
                const outdoorCold = outdoor >= 40 && outdoor < 55;
                const outdoorCool = outdoor >= 55 && outdoor < 65;
                const outdoorMild = outdoor >= 65 && outdoor < 75;
                const outdoorWarm = outdoor >= 75 && outdoor < 85;
                const outdoorHot = outdoor >= 85 && outdoor < 95;
                const outdoorScorching = outdoor >= 95;
                
                // Contextual messages based on indoor/outdoor comparison
                
                // Sauna mode (very hot inside)
                if (indoorSauna) return "Sauna Mode 🥵";
                
                // Perfect chill zone
                if (indoorComfortable) return "Chill Mode 😎";
                
                // Too warm inside scenarios
                if (indoorWarm) {
                  if (outdoorVeryCold || outdoorCold) return "A bit too cozy 🧦";
                  if (outdoorCool || outdoorMild) return "Getting toasty 🥵";
                  if (outdoorWarm || outdoorHot || outdoorScorching) return "Comfy despite the heat 🏖️";
                  return "A bit warm 🥵";
                }
                
                // Hot inside scenarios
                if (indoorHot) {
                  if (outdoorVeryCold || outdoorCold) return "Definitely too warm 🔥";
                  if (outdoorWarm || outdoorHot || outdoorScorching) return "Surviving the heat 🏝️";
                  return "Pretty hot 🔥";
                }
                
                // Cold inside scenarios
                if (indoorCold) {
                  if (outdoorWarm || outdoorHot || outdoorScorching) return "Bit chilly for this weather 🥶";
                  if (outdoorCool || outdoorMild) return "A bit cool 🧊";
                  if (outdoorCold || outdoorVeryCold) return "Cold inside and out ❄️";
                  return "A bit chilly 🥶";
                }
                
                // Very cold inside
                if (indoorVeryCold) {
                  if (outdoorWarm || outdoorHot || outdoorScorching) return "Freezing when it's warm outside 🧊";
                  return "Freezing ❄️";
                }
                
                // Fallback
                return indoor + "°";
              ]]]
            styles:
              icon:
                - color: >
                    [[[
                      return entity.attributes.color;
                    ]]]
                
          - type: custom:apexcharts-card
            experimental:
              color_threshold: true
            card_mod:
              style: |
                ha-card {
                  padding-bottom: 16px;
                  background: var(--darker-primary-color) !important;
                  border-top-right-radius: 0 !important;
                  border-top-left-radius: 0 !important;
                  backdrop-filter: none !important;
                  -webkit-backdrop-filter: none !important;
                  box-shadow: none !important;
                  border: none !important;
                  box-shadow: inset 0 4px 8px 0 rgba(0, 0, 0, 0.05) !important;
                }
                .apexcharts-legend {
                  padding: 0 !important;
                  margin: 0 !important;
                  margin-top: 10px !important;
                  display: flex !important;
                  flex-direction: row !important;
                  flex-wrap: wrap !important;
                  justify-content: center !important;
                }
                .apexcharts-legend-group {
                  display: contents !important;
                }
                .apexcharts-legend-series {
                  display: inline-flex !important;
                  margin: 0 8px !important;
                }
            graph_span: 24h
            span:
              start: day
            header:
              show: false
            apex_config:
              chart:
                height: 200
              grid:
                borderColor: 'rgba(255,255,255,0.05)'
              legend:
                show: true
                position: bottom
                horizontalAlign: center
                floating: false
                fontSize: '11px'
                markers:
                  width: 8
                  height: 8
                itemMargin:
                  horizontal: 16
                  vertical: 0
              xaxis:
                labels:
                  format: 'HH'
                axisBorder:
                  show: false
                axisTicks:
                  show: false
              yaxis:
                - id: indoor
                  seriesName: Temperature
                  min: 0
                  max: 100
                  tickAmount: 5
                  forceNiceScale: false
                  labels:
                    style:
                      fontSize: '10px'
                    formatter: |
                      EVAL: (val) => val ? `${Math.round(val)}` : '0'
              tooltip:
                x:
                  format: 'HH:mm'
              # fill:
              #   type: gradient
              #   gradient:
              #     type: vertical
              #     shadeIntensity: 0.3
              #     opacityFrom: 0.6
              #     opacityTo: 0.1
              #     stops:
              #       - 0
              #       - 90
              #       - 100
            series:
              # Indoor AQI (office) - Area chart with color thresholds and gradient fill
              # Awair score scale: 0-100
              - entity: sensor.office_awair_temperature
                type: area
                name: Indoor
                unit: °
                color: var(--primary-color)
                yaxis_id: indoor
                stroke_width: 2
                # color_threshold:
                #   - value: 0
                #     color: '#00E400'
                #   - value: 30
                #     color: '#FFFF00'
                #   - value: 60
                #     color: '#FF7E00'
                #   - value: 80
                #     color: '#FF0000'
                #   - value: 95
                #     color: '#8F3F97'
                show:
                  extremas: false
                  in_header: true
                  legend_value: true
              
              # Outdoor AQI (reference line)
              # EPA AQI scale: 0-500
              - entity: sensor.tempest_temperature
                type: line
                name: Outdoor
                color: var(--accent-color)
                unit: °
                # yaxis_id: outdoor
                yaxis_id: indoor
                stroke_width: 1
                # color_threshold:
                #   - value: 0
                #     color: '#00E400'
                #   - value: 30
                #     color: '#FFFF00'
                #   - value: 60
                #     color: '#FF7E00'
                #   - value: 80
                #     color: '#FF0000'
                #   - value: 95
                #     color: '#8F3F97'
                show:
                  extremas: false
                  in_header: true
                  legend_value: true







      
      - type: custom:button-card
        template: kohbo_horizontal_info_card
        entity: sensor.office_air_quality
        label: Office Air Quality Overview
        state:
          - value: "Acceptable"
            icon: mdi:check-decagram
            color: var(--primary-color)
          - value: "Moderate"
            icon: mdi:alert-circle
            color: var(--warning-color)
          - value: "Unhealthy"
            icon: mdi:alert
            color: var(--error-color)
          - value: "Hazardous"
            icon: mdi:alert
            color: var(--error-color)
        state_display: |
          [[[
            return `${entity.state} Air Quality`
          ]]]
      

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.office_awair_temperature
            name: Temperature
            card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_graph_styles.yaml
            hours_to_show: 12
            points_per_hour: 2
            line_width: 4
            decimals: 0
            lower_bound: 0
            smoothing: true
            color_thresholds_transition: smooth
            color_thresholds:
              - color: "#59A5D8"
                value: 14
              - color: "#ADD2EB"
                value: 45
              - color: "#06D6A0"
                value: 67
              - color: "#FFD166"
                value: 78
              - color: "#ED4747"
                value: 90

          - type: custom:mini-graph-card
            entities:
              - entity: sensor.office_awair_score
            name: AQI Score
            card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_graph_styles.yaml
            hours_to_show: 12
            points_per_hour: 4
            line_width: 4
            decimals: 0
            smoothing: true
            color_thresholds_transition: smooth
            color_thresholds:
              - color: "#6155F5"
                value: 0
              - color: "#ED4747"
                value: 20
              - color: "#E36001"
                value: 40
              - color: "#FFD166"
                value: 60
              - color: "#06D6A0"
                value: 100
                
          # Humidity
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: Humidity
              - entity: sensor.office_awair_humidity
              - icon: mdi:water-percent
              - value_1: 14
              - value_2: 25
              - value_3: 40
              - value_4: 65
              - value_5: 90
          
          # Carbon Dioxide
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: Carbon Dioxide
              - entity: sensor.office_awair_carbon_dioxide
              - icon: mdi:molecule-co2
              - value_1: 600 # blue / acceptable
              - value_2: 1000 # light blue / moderate
              - value_3: 5 # green / great
              - value_4: 2000 # yellow / poor
              - value_5: 4500 # red / hazardous

          # VOCs
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: VOCs
              - entity: sensor.office_awair_vocs
              - icon: mdi:molecule
              - value_1: 300 # blue / acceptable
              - value_2: 500 # light blue / moderate
              - value_3: 5 # green / great
              - value_4: 3000 # yellow / poor
              - value_5: 25000 # red / hazardous

          # PM2.5
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: PM2.5
              - entity: sensor.office_awair_pm2_5
              - icon: phu:pm2-5
              - value_1: 12 # blue / acceptable
              - value_2: 35 # light blue / moderate
              - value_3: 5 # green / great
              - value_4: 55 # yellow / poor
              - value_5: 150 # red / hazardous

  
  
  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml
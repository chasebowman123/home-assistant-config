type: vertical-stack
cards:
  - type: custom:button-card
    template: kohbo_page_title
    name: Main Floor
  
  # 
  # Overview Area for house mode and occupancy
  # 
  - type: custom:mod-card
    style: !include /config/dashboards/templates/includes/card_mod/chips/page_chip_layout.yaml
    card:
      type: horizontal-stack
      cards:
        # Office Occupancy
        - type: custom:button-card
          template: kohbo_chip_card_room_occupancy
          entity: binary_sensor.first_floor_occupied
        
        # Lights
        - type: custom:button-card
          template: kohbo_chip_card
          entity: light.main_floor_lights
          state_display: >
            [[[
              if (states['light.main_floor_lights'].state == "on")
                return `${states['sensor.main_floor_lights_on'].state} On`
              else
                return "Off"
            ]]]
          tap_action:
            action: more-info
        # Temperature
        - type: custom:button-card
          template: kohbo_chip_card
          entity: sensor.average_indoor_temperature
          icon: mdi:home-thermometer
          color: var(--light-grey-color)
        # Motion
        - type: custom:button-card
          template: kohbo_chip_card
          entity: binary_sensor.first_floor_motion
          show_state: false

  - type: custom:decluttering-card
    template: room_card
    variables:
      - mode: input_select.office
      - occupancy: input_boolean.office_occupied
      - room: "office"
      - room_name: Office
      - navigation_path: '/dashboard-kohbo/office'    
      - icon: kohbo:kohbo-laptop
      - temperature: "[[[ return states['sensor.office_awair_temperature'].state ]]]"
      - humidity: "[[[ return states['sensor.office_awair_humidity'].state ]]]"
      - aqi: "[[[ return states['sensor.office_air_quality'].state ]]]"
      - room_devices:
        # Lights
        - type: custom:button-card
          entity: light.office_lights
          name: Lights
          template: kohbo_room_card_device                
          icon: kohbo:kohbo-device-lights
        # Music
        - type: custom:button-card
          entity: media_player.sonos_office
          name: Music
          template: kohbo_room_card_device
          icon: kohbo:kohbo-device-speaker
          tap_action:
            action: navigate
            navigation_path: '#office_media_player'
        # Doors
        - type: custom:button-card
          entity: binary_sensor.office_doors
          name: Doors
          template: kohbo_room_card_device
          icon: >
            [[[
              if (entity.state == "on")
                return "kohbo:kohbo-door-open"
              else
                return "kohbo:kohbo-door-closed"
            ]]]
        # Air Purifier
        - type: custom:button-card
          entity: fan.office_air_purifier
          name: Air Purifier
          template: kohbo_room_card_device
          icon: mdi:air-purifier

  # 
  # Family Room
  # 
  - type: custom:decluttering-card
    template: room_card
    variables:
      - mode: input_select.family_room
      - occupancy: input_boolean.family_room_occupied
      - room: "family_room"
      - room_name: Family Room
      - navigation_path: '/dashboard-kohbo/family-room'
      - temperature: "[[[ return states['sensor.kitchen_awair_temperature'].state ]]]"
      - humidity: "[[[ return states['sensor.kitchen_awair_humidity'].state ]]]"
      - aqi: "[[[ return states['sensor.kitchen_air_quality'].state ]]]"
      - icon: kohbo:kohbo-chair
      - room_devices:
        - type: custom:button-card
          entity: light.family_room_main_lights
          name: Lights
          template: kohbo_room_card_device                
          icon: kohbo:kohbo-device-lights

        - type: custom:button-card
          entity: media_player.sony_bravia_tv
          name: TV
          template: kohbo_room_card_device
          icon: kohbo:kohbo-device-tv

        - type: custom:button-card
          entity: media_player.sonos_family_room
          name: Music
          template: kohbo_room_card_device
          icon: kohbo:kohbo-device-speaker
          tap_action:
            action: navigate
            navigation_path: '#family_room_media_player'

        # Doors
        - type: custom:button-card
          entity: binary_sensor.family_room_doors
          name: Doors
          template: kohbo_room_card_device
          icon: >
            [[[
              if (entity.state == "on")
                return "kohbo:kohbo-door-open"
              else
                return "kohbo:kohbo-door-closed"
            ]]]
        
        
  # 
  # Kitchen
  # 
  - type: custom:decluttering-card
    template: room_card
    variables:
      - mode: input_select.kitchen
      - occupancy: input_boolean.kitchen_occupied
      - room: "kitchen"
      - room_name: Kitchen
      - navigation_path: '/dashboard-kohbo/kitchen'
      - temperature: "[[[ return states['sensor.kitchen_awair_temperature'].state ]]]"
      - humidity: "[[[ return states['sensor.kitchen_awair_humidity'].state ]]]"
      - aqi: "[[[ return states['sensor.kitchen_air_quality'].state ]]]"
      - icon: kohbo:kohbo-fridge
      - room_devices:
        # Lights
        - type: custom:button-card
          entity: light.kitchen_lights
          name: Lights
          template: kohbo_room_card_device                
          icon: kohbo:kohbo-device-lights
        # Music
        - type: custom:button-card
          entity: media_player.sonos_kitchen
          name: Music
          template: kohbo_room_card_device
          icon: kohbo:kohbo-device-speaker
          tap_action:
            action: navigate
            navigation_path: '#kitchen_media_player'
        # Doors
        - type: custom:button-card
          entity: binary_sensor.kitchen_doors
          name: Doors
          template: kohbo_room_card_device
          icon: >
            [[[
              if (entity.state == "on")
                return "kohbo:kohbo-door-open"
              else
                return "kohbo:kohbo-door-closed"
            ]]]
        # Air Purifier
        - type: custom:button-card
          entity: fan.kitchen_air_purifier
          name: Air Purifier
          template: kohbo_room_card_device
          icon: mdi:air-purifier


  # 
  # Playroom
  # 
  - type: custom:decluttering-card
    template: room_card
    variables:
      - mode: input_select.playroom
      - occupancy: input_boolean.playroom_occupied
      - room: "playroom"
      - room_name: Playroom
      - navigation_path: '/dashboard-kohbo/playroom'
      - temperature: "[[[ return states['sensor.playroom_temperature'].state ]]]"
      - humidity: "[[[ return states['sensor.playroom_humidity'].state ]]]"
      - aqi: null
      - icon: kohbo:kohbo-lego
      - room_devices:
        # Lights
        - type: custom:button-card
          entity: light.playroom_lights
          name: Lights
          template: kohbo_room_card_device                
          icon: kohbo:kohbo-device-lights
        # Party Lights
        - type: custom:button-card
          entity: switch.christmas_playroom_lights
          name: Party Lights
          template: kohbo_room_card_device                
          icon: kohbo:kohbo-device-string-light
        # Music
        - type: custom:button-card
          entity: media_player.sonos_playroom
          name: Music
          template: kohbo_room_card_device
          icon: kohbo:kohbo-device-speaker
          tap_action:
            action: navigate
            navigation_path: '#playroom_media_player'
        # Windows
        - type: custom:button-card
          entity: binary_sensor.playroom_window_west_left_opening
          name: Windows
          template: kohbo_room_card_device
          icon: >
            [[[
              if (entity.state == "on")
                return "kohbo:kohbo-window-open"
              else
                return "kohbo:kohbo-window-closed"
            ]]]


  #
  # Dining Room
  # 
  - type: custom:decluttering-card
    template: room_card
    variables:
      - mode: input_select.dining_room
      - occupancy: input_boolean.playroom_occupied
      - room: "dining_room"
      - room_name: Dining Room
      - navigation_path: '/dashboard-kohbo/dining-room'
      - temperature: null
      - humidity: null
      - aqi: null
      - icon: kohbo:kohbo-dining
      - room_devices:
        # Lights
        - type: custom:button-card
          entity: light.dining_room_lights
          name: Lights
          template: kohbo_room_card_device                
          icon: kohbo:kohbo-device-lights
        # Music
        - type: custom:button-card
          entity: media_player.sonos_living_room
          tap_action:
            action: navigate
            navigation_path: '#dining_room_media_player'
          name: Music
          template: kohbo_room_card_device
          icon: kohbo:kohbo-device-speaker


  #
  # Jr. Suite
  # 
  - type: custom:decluttering-card
    template: room_card
    variables:
      - mode: input_select.jr_suite
      - occupancy: input_boolean.jr_suite_occupied
      - room: "jr_suite"
      - room_name: Jr. Suite
      - navigation_path: '/dashboard-kohbo/jr-suite'
      - temperature: "[[[ return states['sensor.jr_suite_awair_temperature'].state ]]]"
      - humidity: "[[[ return states['sensor.jr_suite_awair_humidity'].state ]]]"
      - aqi: "[[[ return states['sensor.jr_suite_air_quality'].state ]]]"
      - icon: kohbo:kohbo-bed
      - room_devices:
        # Lights
        - type: custom:button-card
          entity: light.jr_suite_bedroom_main_lights
          name: Lights
          template: kohbo_room_card_device                
          icon: kohbo:kohbo-device-lights
        # Door
        - type: custom:button-card
          entity: binary_sensor.jr_suite_door_status
          name: Door
          template: kohbo_room_card_device
          icon: >
            [[[
              if (entity.state == "on")
                return "kohbo:kohbo-door-open"
              else
                return "kohbo:kohbo-door-closed"
            ]]]
        # Desk Power
        - type: custom:button-card
          entity: switch.smart_plug_22_switch
          name: Desk Power
          template: kohbo_room_card_device
          icon: mdi:power-plug

  #
  # Foyer
  # 
  - type: custom:decluttering-card
    template: room_card
    variables:
      - mode: input_select.foyer
      - occupancy: input_boolean.foyer_occupied
      - room: "foyer"
      - room_name: Foyer
      - navigation_path: '/dashboard-kohbo/foyer'
      - temperature: null
      - humidity: null
      - aqi: null
      - icon: kohbo:kohbo-double-door
      - room_devices:
        # Lights
        - type: custom:button-card
          entity: light.foyer_lights
          name: Lights
          template: kohbo_room_card_device                
          icon: kohbo:kohbo-device-lights

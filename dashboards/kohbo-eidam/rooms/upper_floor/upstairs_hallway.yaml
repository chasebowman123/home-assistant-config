type: custom:vertical-layout
title: Upstairs Hallway
path: rooms-upstairs-hallway
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Upstairs Hallway
      - navigation_path: /dashboard-kohbo/rooms-upper-floor
      - settings_path: '#upstairs_hallway_settings_popup'

            
  # 
  # Room Overview
  # 
  - type: custom:decluttering-card
    template: room_overview
    variables:
      - occupancy: input_boolean.upstairs_hallway_occupied
      - mode: input_select.upstairs_hallway
      - ble_presence: sensor.upstairs_hallway_people_list

  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  # Ceiling Lights
  - type: tile
    entity: light.upstairs_hallway
    name: Ceiling Lights
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false
  
  # Stairs
  - type: tile
    entity: light.stairs_light
    name: Stairs
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  - type: tile
    entity: light.upstairs_hallway_nightlight_light
    name: Nightlight
    icon: hue:scene-nightlight
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false


  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      # Upper floor HVAC
      - type: custom:button-card
        entity: climate.nest_2nd_floor
        name: Thermostat
        template: kohbo_device_entity
        icon: >
          [[[
            if (entity.state == "heat_cool")
              return "mdi:sun-snowflake-variant"
            else if (entity.state == "heat")
              return "mdi:heat-wave"
            else if (entity.state == "cool")
              return "mdi:snowflake"
          ]]]
        tap_action:
          action: navigate
          navigation_path: '#upper_floor_thermostat'

      # Smart Plug
      - type: custom:button-card
        entity: switch.smart_plug_3_switch
        name: Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_3_power
      


  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # Lighting Automations Toggle
      - entity: input_boolean.upstairs_hallway_lighting_automations
        name: Lighting Automations
        icon: kohbo:kohbo-light-2
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_upstairs_hallway
        name: Adaptive Lighting
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_sleep_mode_upstairs_hallway
        name: Adaptive Lighting Sleep Mode
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
  

  # 
  # Upper Floor Thermostat Popup
  # 
  - type: custom:decluttering-card
    template: thermostat_popup
    variables:
      - hash: "#upper_floor_thermostat"
      - entity: climate.nest_2nd_floor
      - eco_mode: binary_sensor.second_floor_nest_in_eco
      - name: Upper Floor
      - temperature_sensor: sensor.second_floor_temperature
      - outside_temperature_sensor: sensor.tempest_temperature


  # 
  # Upstairs Hallway Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#upstairs_hallway_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 650px)
        margin_top_desktop: calc(100vh - 650px)
        
      # 
      # Title
      # 
      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Settings

      # 
      # Sensors
      # 
      - type: custom:button-card
        template: section_title
        name: Sensors
      - type: entities
        entities:
          # Motion Sensor
          - entity: binary_sensor.upstairs_hallway_nightlight_motion
            icon: mdi:motion-sensor
            name: Motion Sensor
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          # Illuminance
          - entity: sensor.upstairs_hallway_nightlight_illuminance
            icon: mdi:brightness-5
            name: Illuminance
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml

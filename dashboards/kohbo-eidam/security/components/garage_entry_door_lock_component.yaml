# 
# Garage Entry Door Lock
# 
type: custom:decluttering-card
template: horizontal_action_card
variables:
  - entity: lock.garage_entry_door
  - name: Garage Entry Door
  - template: kohbo_horizontal_action_card_lock_entity
  - tap_action: navigate
  - navigation_path: "#garage_entry_lock_popup"
  #  Action Cards
  - action_cards:
    # Toggle Lock Switch
    - type: custom:decluttering-card
      template: card_boolean_component
      variables:
        - entity: switch.garage_entry_door_lock_switch
        - name: Garage Entry Door Lock
  
    # Lock details
    - type: custom:button-card
      template: kohbo_chip_icon_action_card
      icon: mdi:chevron-right
      tap_action:
        action: navigate
        navigation_path: "#garage_entry_lock_popup"
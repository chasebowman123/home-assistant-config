# 
# Front Door Lock Popup
# 
type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#garage_entry_lock_popup'
    close_by_clicking_outside: true
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml

  - type: custom:button-card
    template: kohbo_popup_page_title
    name: Garage Entry Lock

  # 
  # Front Door Lock Status
  # 
  - type: custom:more-info-card
    entity: lock.garage_entry_door
    title: Garage Entry Lock
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_more_info_card_mod.yaml

  # 
  # Autolock Settings
  #         
  - type: custom:stack-in-card
    mode: vertical
    card_mod:
      style: |
        :host {
          --stack-card-gap: 0;
          --vertical-stack-card-gap: 0 !important;
        }
    cards:
      - type: entities
        entities:
          # Auto lock
          - entity: automation.garage_entry_door_lock_auto_lock
            name: Auto Lock
            icon: kohbo:kohbo-lock-locked
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-triggered
            state_color: true

  - type: custom:button-card
    name: If enabled, the garage entry door will automatically lock at bedtime, when the house is empty, or at the lock time.
    template: kohbo_card_section_description

  # 
  # Lock the door in the evening
  # 
  - type: custom:stack-in-card
    mode: vertical
    card_mod:
      style: |
        :host {
          --stack-card-gap: 0;
          --vertical-stack-card-gap: 0 !important;
        }
        ha-card {
          margin-top: 20px !important;
        }
    cards:
      - type: entities
        entities:
          # Auto lock in evening
          - entity: automation.garage_entry_door_lock_auto_lock_in_evening
            name: Evening Auto Lock
            icon: kohbo:kohbo-lock-locked
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-triggered
            state_color: true
      
      - type: conditional
        conditions:
          - entity: automation.garage_entry_door_lock_auto_lock_in_evening
            state: 'on'
        card:
          type: custom:stack-in-card
          mode: vertical
          card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_vertical_stack_bg.yaml
          cards:
            - type: entities
              card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_entities_container.yaml
              entities:
                - entity: input_datetime.garage_entry_door_evening_lock_time
                  name: Evening Time
                  card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml

  - type: custom:button-card
    name: Automatically lock the door in the evening around kids bedtime. This will only lock if guest and entertainment mode are off.
    template: kohbo_card_section_description


  # 
  # Lock If Open Too Long Settings
  # 
  - type: custom:stack-in-card
    mode: vertical
    card_mod:
      style: |
        :host {
          --stack-card-gap: 0;
          --vertical-stack-card-gap: 0 !important;
        }
        ha-card {
          margin-top: 20px !important;
        }
    cards:
      - type: entities
        entities:
          # Lock If Open Too Long
          - entity: automation.garage_entry_door_lock_if_open_too_long
            name: Lock If Open Too Long
            icon: kohbo:kohbo-lock-locked
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-triggered
            state_color: true
      
      - type: conditional
        conditions:
          - entity: automation.garage_entry_door_lock_if_open_too_long
            state: 'on'
        card:
          type: custom:stack-in-card
          mode: vertical
          card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_vertical_stack_bg.yaml
          cards:
            - type: entities
              card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_entities_container.yaml
              entities:
                - entity: input_number.garage_entry_door_auto_lock_timeout
                  name: Lock Timeout
                  card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml


  - type: custom:button-card
    name: If enabled, the garage entry door will automatically lock if it's been unlocked longer than the timeout.
    template: kohbo_card_section_description
    styles:
      card:
        - margin-bottom: 20px


  # 
  # Auto Unlock Settings
  #         
  - type: custom:stack-in-card
    mode: vertical
    card_mod:
      style: |
        :host {
          --stack-card-gap: 0;
          --vertical-stack-card-gap: 0 !important;
        }
    cards:
      - type: entities
        entities:
          # Auto Unlock Upon Arrival
          - entity: automation.garage_entry_door_unlock_upon_arrival
            name: Auto Unlock Upon Arrival
            icon: kohbo:kohbo-lock-locked
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-triggered
            state_color: true

          # Auto Unlock in the morning
          - entity: automation.garage_entry_door_auto_unlock_in_morning
            name: Auto Unlock in the Morning
            icon: kohbo:kohbo-lock-locked
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-triggered
            state_color: true

  - type: custom:button-card
    name: If enabled, the garage entry door will automatically unlock when someone with unlock privilege arrives at the house or in the morning when the house goes from bedtime to auto mode.
    template: kohbo_card_section_description
    styles:
      card:
        - margin-bottom: 20px


  # 
  # Signal Strength
  # 
  - type: entities
    entities:
      - entity: sensor.garage_entry_door_battery_level
        name: Battery Level
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        icon: mdi:battery
      - entity: sensor.garage_entry_door_node_status
        name: Node Status
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        icon: mdi:heart-pulse
      - entity: sensor.garage_entry_door_signal_strength
        name: Signal Strength
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        icon: mdi:signal


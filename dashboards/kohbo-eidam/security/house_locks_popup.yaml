# 
# House Locks Popup
# 
type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#house_locks_popup'
    close_by_clicking_outside: true
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
    margin_top_mobile: calc(100vh - 900px)
    margin_top_desktop: calc(100vh - 900px)

  - type: custom:button-card
    template: kohbo_popup_page_title
    name: House Locks


  - type: custom:more-info-card
    entity: lock.house_locks
    title: House Locks
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_more_info_card_mod.yaml


  # 
  # Front Door Lock
  # 
  - !include /config/dashboards/kohbo/security/components/front_door_lock_component.yaml

  # 
  # Garage Entry Door Lock
  # 
  - !include /config/dashboards/kohbo/security/components/garage_entry_door_lock_component.yaml

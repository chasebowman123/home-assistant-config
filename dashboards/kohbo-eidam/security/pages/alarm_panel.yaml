type: custom:vertical-layout
title: Alarm Panel
path: security-alarm-panel
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Alarm Panel
      - navigation_path: /dashboard-kohbo/security
      - settings_path: '#alarm_panel_settings_popup'
  
  - type: custom:more-info-card
    entity: alarm_control_panel.alarmo
    title: Alarm Panel
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_more_info_card_mod.yaml


  - type: logbook
    target:
      entity_id:
        - alarm_control_panel.alarmo
    hours_to_show: 48
    card_mod: !include /config/dashboards/templates/includes/card_mod/logbook_card_mod.yaml


# 
# Garage Doors
# 
type: custom:vertical-layout
title: Garage Doors
path: security-garage-doors
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Garage Doors
      - navigation_path: /dashboard-kohbo/security
      - settings_path: '#garage_doors_settings_popup'
  
  - type: custom:more-info-card
    entity: cover.garage_doors
    title: Garage Doors
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_more_info_card_mod.yaml


  # 
  # Section Title
  # 

  - type: custom:button-card
    template: section_title
    name: Individual Garage Doors

  # 
  # Garage Door 1
  # 
  - type: custom:decluttering-card
    template: horizontal_garage_door_card
    variables:
      - entity: cover.garage_door_1
      - name: Door 1
      - tap_action: nothing
      - navigation_path: ""
        


  # 
  # Garage Door 1
  # 
  - type: custom:decluttering-card
    template: horizontal_garage_door_card
    variables:
      - entity: cover.garage_door_2
      - name: Door 2
      - tap_action: nothing
      - navigation_path: ""

  # 
  # Garage Door 3
  # 
  - type: custom:decluttering-card
    template: horizontal_garage_door_card
    variables:
      - entity: cover.garage_door_3
      - name: Door 3
      - tap_action: nothing
      - navigation_path: ""


  - type: logbook
    target:
      entity_id:
        - cover.garage_door_1
        - cover.garage_door_2
        - cover.garage_door_3
    hours_to_show: 48
    card_mod: !include /config/dashboards/templates/includes/card_mod/logbook_card_mod.yaml

  # 
  # Garage Doors Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#garage_doors_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 825px)
        margin_top_desktop: calc(100vh - 825px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Garage Doors Settings

      # 
      # Autoclose if house is empty
      #         
      - type: custom:stack-in-card
        mode: vertical
        card_mod:
          style: |
            :host {
              --stack-card-gap: 0;
              --vertical-stack-card-gap: 0 !important;
            }
        cards:
          - type: entities
            entities:
              # Autoclose if House is Empty
              - entity: automation.garage_doors_close_when_empty_house
                name: Autoclose if House is Empty
                icon: kohbo:kohbo-garage-open
                card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
                secondary_info: last-triggered
                state_color: true

      - type: custom:button-card
        name: If enabled, the garage doors will automatically close when the house is empty and the garage is in Away mode.
        template: kohbo_card_section_description

      # 
      # Lock If Open Too Long Settings
      # 
      - type: custom:stack-in-card
        mode: vertical
        card_mod:
          style: |
            :host {
              --stack-card-gap: 0;
              --vertical-stack-card-gap: 0 !important;
            }
            ha-card {
              margin-top: 20px !important;
            }
        cards:
          - type: entities
            entities:
              # Autoclose if Open Too Long
              - entity: automation.garage_doors_close_when_home
                name: Autoclose if Open Too Long
                icon: kohbo:kohbo-garage-open
                card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
                secondary_info: last-triggered
                state_color: true
          
          - type: conditional
            conditions:
              - entity: automation.garage_doors_close_when_home
                state: 'on'
            card:
              type: custom:stack-in-card
              mode: vertical
              card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_vertical_stack_bg.yaml
              cards:
                - type: entities
                  card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_entities_container.yaml
                  entities:
                    - entity: input_number.garage_doors_close_when_home_timeout
                      name: Autoclose Timeout
                      card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml


      - type: custom:button-card
        name: If any of the garage doors are open for longer than the timeout, they will automatically close if this automation is enabled.
        template: kohbo_card_section_description
        styles:
          card:
            - margin-bottom: 20px


      # 
      # Lock remotes at night
      #         
      - type: custom:stack-in-card
        mode: vertical
        card_mod:
          style: |
            :host {
              --stack-card-gap: 0;
              --vertical-stack-card-gap: 0 !important;
            }
        cards:
          - type: entities
            entities:
              # Lock remotes at night
              - entity: automation.garage_doors_lock_remotes
                name: Lock remotes at night
                icon: kohbo:kohbo-garage-open
                card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
                secondary_info: last-triggered
                state_color: true

      - type: custom:button-card
        name: If enabled, the garage door remotes will automatically lock at bedtime or when the house is empty. This prevents somebody from copying a code and opening the garage door from the outside. Remotes will automatically be enabled when somebody authorized arrives.
        template: kohbo_card_section_description




  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml
  
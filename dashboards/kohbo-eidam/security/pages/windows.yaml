# 
# Windows
# 
type: custom:vertical-layout
title: Windows
path: security-windows
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Windows
      - navigation_path: /dashboard-kohbo/security
      - settings_path: '#windows_settings_popup'
  

  # 
  # Windows
  # 

  - type: custom:button-card
    template: kohbo_device_window_entity_horizontal
    entity: binary_sensor.kitchen_window_sensor
    name: Kitchen Window

  - type: custom:button-card
    template: kohbo_device_window_entity_horizontal
    entity: binary_sensor.kitchen_window_west_middle_sensor
    name: Kitchen West Middle Window

  - type: custom:button-card
    template: kohbo_device_window_entity_horizontal
    entity: binary_sensor.playroom_window_sensor
    name: Playroom Window
    
  - type: custom:button-card
    template: kohbo_device_window_entity_horizontal
    entity: binary_sensor.playroom_window_west_left_opening
    name: Playroom West Left Opening
    
  - type: custom:button-card
    template: kohbo_device_window_entity_horizontal
    entity: binary_sensor.office_window_sensor
    name: Office Window

  
  # 
  # Windows Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#windows_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 425px)
        margin_top_desktop: calc(100vh - 425px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Windows Settings

      # 
      # Window Left Open Alert
      #         
      - type: custom:stack-in-card
        mode: vertical
        card_mod:
          style: |
            :host {
              --stack-card-gap: 0;
              --vertical-stack-card-gap: 0 !important;
            }
        cards:
          - type: entities
            entities:
              # Window Left Open Alert
              - entity: automation.window_left_open
                name: Window Left Open Alert
                icon: kohbo:kohbo-window-open
                card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
                secondary_info: last-triggered
                state_color: true

      - type: custom:button-card
        name: If enabled, a notification will be sent when a window is left open for too long.
        template: kohbo_card_section_description


  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml
# 
# Notifications Popup — Eidam Home
# 
type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#notifications'
    close_by_clicking_outside: true
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml

  - type: custom:button-card
    template: kohbo_popup_page_title
    name: Notifications

  # Air Purifier Filter
  - type: conditional
    conditions:
      - condition: numeric_state
        entity: sensor.core_400s_filter_lifetime
        below: 15
    card:
      type: custom:button-card
      template: kohbo_horizontal_info_card
      name: Air Purifier Filter Low
      icon: mdi:air-filter
      entity: sensor.core_400s_filter_lifetime
      state_display: |
        [[[ return entity.state + '% remaining'; ]]]

  # Ring Battery Low
  - type: conditional
    conditions:
      - condition: numeric_state
        entity: sensor.basement_stairs_battery
        below: 20
    card:
      type: custom:button-card
      template: kohbo_horizontal_info_card
      name: Basement Stairs Camera Battery
      icon: mdi:battery-alert
      entity: sensor.basement_stairs_battery
      state_display: |
        [[[ return entity.state + '%'; ]]]

  - type: conditional
    conditions:
      - condition: numeric_state
        entity: sensor.lobby_battery
        below: 30
    card:
      type: custom:button-card
      template: kohbo_horizontal_info_card
      name: Lobby Camera Battery
      icon: mdi:battery-alert
      entity: sensor.lobby_battery
      state_display: |
        [[[ return entity.state + '%'; ]]]

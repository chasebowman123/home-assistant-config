    entity: input_select.main_level_dryer_status
    state: "Clean"
card:
  type: custom:bubble-card
  name: Main Level Dryer Complete
  icon: mdi:tumble-dryer
  card_type: button
  button_type: switch
  entity: input_select.main_level_dryer_status
  show_state: true
  button_action:
    tap_action:
      action: none
  tap_action:
    action: none

# 
# Main Level Vacuum Jammed/Error
# 
type: conditional
conditions:
  - condition: state
    entity: vacuum.main_floor_vacuum
    state: "error"
card:
  type: custom:bubble-card
  card_type: button
  button_type: switch
  entity: vacuum.main_floor_vacuum
  icon: mdi:alert
  show_state: true
  button_action:
    tap_action:
      action: navigate
      navigation_path: '/dashboard-kohbo/main-floor-vacuum'
  tap_action:
    action: navigate
    navigation_path: '/dashboard-kohbo/main-floor-vacuum'
  styles: >
    .bubble-background {
      background-color: var(--error-color) !important;
    }
    .bubble-icon {
      color: var(--error-color) !important;
    }
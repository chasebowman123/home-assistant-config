# 
# Main Level Vacuum Maintenance - Sensor Dirty
# 
type: conditional
conditions:
  - condition: numeric_state
    entity: sensor.sensor.main_floor_vacuum_sensor_dirty_remaining
    below: 7200
card:
  type: custom:bubble-card
  card_type: button
  button_type: switch
  entity: sensor.sensor.main_floor_vacuum_sensor_dirty_remaining
  button_action:
    tap_action:
      action: none
  tap_action:
    action: none
  sub_button:
    - entity: button.main_floor_vacuum_reset_sensor_dirty
      tap_action:
        action: perform-action
        perform_action: button.press
        target:
          entity_id: button.main_floor_vacuum_reset_sensor_dirty

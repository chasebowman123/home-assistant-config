type: conditional
conditions:
  - condition: state
    entity: input_boolean.nino_daily_medication_taken
    state: "off"
card:
  type: custom:bubble-card
  card_type: button
  button_type: switch
  entity: input_boolean.nino_daily_medication_taken
  name: Nino's Daily Medication
  show_state: false
  show_last_changed: true
  show_last_updated: false
  sub_button:
    # Snooze
    - entity: timer.nino_daily_medication_timer
      icon: mdi:rewind-15
      show_background: false
      tap_action:
        action: perform-action
        perform_action: timer.start
        target:
          entity_id: timer.nino_daily_medication_timer
    # Mark taken
    - entity: script.nino_medication_taken
      icon: mdi:check-circle
      state_background: false
      show_background: false
      tap_action:
        action: perform-action
        perform_action: script.nino_medication_taken
        target: {}
  tap_action:
    action: none
  button_action:
    tap_action:
      action: none
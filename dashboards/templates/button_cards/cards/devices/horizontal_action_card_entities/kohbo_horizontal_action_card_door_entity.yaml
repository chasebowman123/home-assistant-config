kohbo_horizontal_action_card_door_entity:
  template: kohbo_horizontal_action_card_entity
  state:
    - value: 'on'
      icon: kohbo:kohbo-door-open
      color: var(--error-color)
    - value: 'off'
      icon: kohbo:kohbo-door-closed
      color: var(--success-color)
  state_display: |
    [[[
      const last = new Date(entity.last_changed);
      const now = new Date();
      const diff = Math.floor((now - last) / 1000);

      const state = entity.state == "off" ? "Closed" : entity.attributes.entity_id.filter(id => states[id]?.state === 'on').length + " Open";

      if (diff < 3600) {
        return `${state} - ${Math.floor(diff / 60) + "m"}`;
      } else if (diff < 86400) {
        return `${state} - ${Math.floor(diff / 3600) + "h"}`;
      } else {
        return `${state} - ${Math.floor(diff / 86400) + "d"}`;
      }
    ]]]

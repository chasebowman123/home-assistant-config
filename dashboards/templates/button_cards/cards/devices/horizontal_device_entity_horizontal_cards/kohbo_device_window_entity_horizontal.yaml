kohbo_device_window_entity_horizontal:
  template: kohbo_device_entity_horizontal
  state_display: '[[[ return entity.state == "on" ? "Open" : "Closed" ]]]'
  state:
    - value: 'on'
      icon: kohbo:kohbo-window-open
      color: var(--error-color)
    - value: 'off'
      icon: kohbo:kohbo-window-closed
      color: var(--success-color)
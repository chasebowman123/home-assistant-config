kohbo_device_air_purifier_entity:
  template: kohbo_device_entity
  icon: mdi:air-purifier
  state_display: >
    [[[
      if (entity.state == "on")
        if (entity.attributes.mode == "manual" && entity.attributes.percentage != null)
          return `Manual - ${entity.attributes.percentage}%`
        else
          if (entity.attributes.percentage != null)
            return `${entity.attributes.preset_mode} - ${entity.attributes.percentage}%`
          else
            return `${entity.attributes.preset_mode} - ${variables.last_changed}`
      else
        return `Off - ${variables.last_changed}`;
    ]]]
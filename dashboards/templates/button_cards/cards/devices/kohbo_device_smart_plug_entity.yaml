kohbo_device_smart_plug_entity:
  template: kohbo_device_entity
  icon: mdi:power-plug
  state_display: >
    [[[
      if (entity.state == "on")
        if (variables.power_sensor)
          return `On - ${states[variables.power_sensor].state} Watts`;
        else
          return `On - ${variables.last_changed}`;
      else
        return `Off - ${variables.last_changed}`;
    ]]]
  confirmation: >
    [[[
      if (variables.confirmation)
        return `Are you sure you want to toggle ${entity.attributes.friendly_name}?`;
      else
        return null;
    ]]]
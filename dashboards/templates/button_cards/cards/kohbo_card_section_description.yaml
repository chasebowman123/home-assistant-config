kohbo_card_section_description:
  styles:
    card:
      - padding: 0 4px
      - background: transparent
      - border: none
      - box-shadow: none
      - margin: 0
      - padding: 0
      - border-radius: 0
    name:
      - font-weight: normal
      - font-size: 14px
      - line-height: 18px
      - text-overflow: inherit;
      - text-wrap: auto;
      - text-align: left;
      - color: var(--semi-dark-grey-color)
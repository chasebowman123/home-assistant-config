      #     [[[
      #       return (entity.state === 'on'
      #       || entity.state === 'armed_home'
      #       || entity.state === 'armed'
      #       || entity.state === 'locked'
      #       || entity.state === 'closed'
      #       ) ? '#06D6A0' : '#ED4747';
      #     ]]]
      - height: 24px
      - margin-bottom: 15px
    name:
      - font-size: 11px
      - color: "#ADB5BD"

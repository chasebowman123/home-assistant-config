occupied_room_card:
  size: 40px
  # show_last_changed: true
  show_label: true
  # show_state: true
  icon: "[[[ return entity.attributes.icon || 'mdi:room-service'; ]]]"
  name: "[[[ return entity.attributes.friendly_name || entity.name || entity.entity_id.replace('sensor.', '').replace('_room', '').replace(/_/g, ' '); ]]]"
  state_display: >
    [[[
      const mode = entity.attributes.mode || 'Auto';
      const durationMinutes = entity.attributes.occupied_duration_minutes || 0;
      
      let duration = '';
      if (durationMinutes < 1) {
        duration = 'Just now';
      } else if (durationMinutes < 60) {
        duration = `${durationMinutes}m`;
      } else {
        duration = `${Math.floor(durationMinutes / 60)}h`;
      }
      
      return `${mode} • ${duration}`;
    ]]]
  label: >
    [[[
      const durationMinutes = entity.attributes.occupied_duration_minutes || 0;
      
      let duration = '';
      if (durationMinutes < 1) {
        duration = 'Just now';
      } else if (durationMinutes < 60) {
        duration = `${durationMinutes} mins`;
      } else {
        duration = `${Math.floor(durationMinutes / 60)} hrs`;
      }
      
      return `Occupied ${duration}`;
    ]]]

kohbo_chip_card:
  size: 22px
  show_state: true
  show_name: false
  layout: icon_state
  tap_action:
    action: more-info
  styles:
    grid:
      - grid-template-areas: '"i s"'
      - grid-template-columns: auto auto
    card:
      - padding: 0 14px
      - display: inline-flex
      - align-items: center
      - height: 45px
      - width: auto
      - box-sizing: border-box
      - min-width: 45px
      - border-radius: 23px
      - flex-direction: row
      - align-items: center
      - justify-content: center
    img_cell:
      - width: 22px
    state:
      - color: var(--primary-text-color)
      - font-size: 14px
      - font-weight: 600
      - justify-self: start
      - margin-left: 8px
      - line-height: 15px

type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#gianluca'
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
    
  # 
  # Profile Picture
  # 
  - type: custom:button-card
    entity: person.gianluca
    template: people_profile_picture
    variables:
      status: |
        [[[
          if (states['input_select.gianluca_sleep_state'].state == "Sleep") {
            return "sleeping";
          }
        ]]]



  # 
  # Heading
  # 
  - type: custom:button-card
    name: "Gianluca"
    template: kohbo_person_heading
    custom_fields:
      location: '[[[ return states["input_select.gianluca_sleep_state"].state ]]]'
        

  # 
  # Details
  # 
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      # 
      # Status
      # 
      - type: custom:template-entity-row
        icon: kohbo:kohbo-person-status
        name: Status
        entity: input_select.gianluca_sleep_state
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        color: >
          {% set status = states[config.entity].state %}
          {% if status == "Awake" or status == "Just Got Up" %}
            var(--success-color)
          {% else %}
            var(--orange-color)
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml

      # 
      # Bed Occupancy
      # 
      - type: custom:template-entity-row
        icon: kohbo:kohbo-bed
        name: Bed Occupancy
        entity: binary_sensor.gianluca_bed_occupied
        state: "{{ 'Detected' if states[config.entity].state == 'on' else 'Clear' }}"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        color: >
          {% if states[config.entity].state == "on" %}
            var(--orange-color)
          {% else %}
            var(--light-grey-color)
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml

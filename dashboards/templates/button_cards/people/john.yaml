type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#john'
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
    
  # 
  # Profile Picture
  # 
  - type: custom:button-card
    entity: person.john_koht
    template: people_profile_picture
    variables:
      status: |
        [[[
          if (states['input_select.john_sleep_state'].state == "Sleep") {
            return "sleeping";
          } else if (states['input_boolean.john_dnd'].state == "on") {
            return "dnd";
          }
        ]]]

  # 
  # Heading
  # 
  - type: custom:button-card
    name: "John"
    template: kohbo_person_heading
    custom_fields:
      location: >
        [[[
          if (states['person.john_koht'].state == "home") {
            if (states['input_select.john_sleep_state'].state == "Sleep") {
              return "Home - Sleeping"
            } else if (states['input_boolean.john_dnd'].state == "on") {
              return "Home - Do Not Disturb"
            } else {
              var location = states['sensor.john_room_presence'].state.replace('_', ' ');
              location = location.charAt(0).toUpperCase() + location.slice(1);
              return "Home - " + location;
            }
          } else {
            if (states['person.john_koht'].state == "not_home") {
              return "Away";
            } else {
              return "Away - " + states['person.john_koht'].state;
            }
          }
        ]]]

  # 
  # Location Details
  # 
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      - entity: person.john_koht
        icon: kohbo:kohbo-location
        name: Location
        secondary_info: last-changed
        state_color: true
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml
        
      - entity: sensor.john_room_presence
        icon: kohbo:kohbo-room-occupancy
        name: Room
        secondary_info: last-changed
        state_color: true
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml
        
      - entity: sensor.home_john_distance
        icon: kohbo:kohbo-proximity
        name: Proximity
        entity: sensor.home_john_distance
        secondary_info: last-changed
        state_color: true
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

      - entity: sensor.jk_iphone_14_steps
        icon: kohbo:kohbo-steps
        name: Steps
        secondary_info: last-changed
        state_color: true
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

      - entity: input_boolean.john_commuting
        icon: kohbo:kohbo-train
        name: Commuting
        secondary_info: last-changed
        state_color: true
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

  #
  # work Details
  # 
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      # Do Not Disturb
      - entity: input_boolean.john_dnd
        icon: kohbo:kohbo-dnd-on
        name: Do Not Disturb
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      # Focus Mode
      - entity: input_select.john_focus_mode
        icon: kohbo:kohbo-focus-mode
        name: Focus Mode
        secondary_info: last-changed
        state_color: true
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

  # 
  # Sleep Details
  # 
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      # 
      # Sleep Status
      # 
      - type: custom:template-entity-row
        icon: kohbo:kohbo-person-status
        name: Status
        entity: input_select.john_sleep_state
        # state: "{{ states('person.john_koht') | replace('_', ' ') | title }}"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        color: >
          {% set status = states[config.entity].state %}
          {% if status == "Awake" or status == "Just Got Up" %}
            var(--success-color)
          {% else %}
            var(--orange-color)
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      # 
      # Bed Occupancy
      # 
      - type: custom:template-entity-row
        icon: kohbo:kohbo-bed
        name: Bed Occupancy
        entity: binary_sensor.john_bed_occupied
        state: "{{ 'Detected' if states[config.entity].state == 'on' else 'Clear' }}"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        color: >
          {% if states[config.entity].state == "on" %}
            var(--orange-color)
          {% else %}
            var(--light-grey-color)
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      # 
      # Sleep Score
      # 
      - entity: sensor.withings_sleep_score
        icon: kohbo:kohbo-moon-2
        name: Sleep Score
        secondary_info: last-changed
        state_color: true
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

  # 
  # Device Details
  # 
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      # 
      # Phone Battery Level
      # 
      - entity: sensor.jk_iphone_14_battery_level
        name: Battery
        secondary_info: last-changed
        state_color: true
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml
      # 
      # Watch Battery Level
      # 
      - entity: sensor.jk_2_watch_battery
        icon: kohbo:kohbo-watch
        name: Watch Battery
        secondary_info: last-changed
        state_color: true
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml
      # 
      # Network Details
      # 
      - entity: sensor.jk_iphone_14_ssid
        icon: kohbo:kohbo-wifi
        name: Wifi Network
        secondary_info: last-changed
        state_color: true
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml


  # 
  # Automations
  # 
  - type: custom:button-card
    template: section_title
    name: Automations
  - type: entities
    entities:
      # John Announce Arrival
      - entity: automation.john_announce_arrival
        name: Announce Arrival
        icon: mdi:home-plus
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # John Announce Departure
      - entity: automation.john_announce_departure
        name: Announce Departure
        icon: mdi:home-remove
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # John Set Focus Mode
      - entity: automation.john_set_focus_mode
        name: Set Focus Mode
        icon: mdi:garage-open
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # John Daily Report
      - entity: automation.john_daily_report
        name: Daily Report
        icon: mdi:garage-open
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
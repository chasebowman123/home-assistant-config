people_profile_picture:
  show_state: false
  show_name: false
  show_entity_picture: true
  size: 90px
  styles:
    card:
      - padding: 0
      - background: transparent
      - border: none
      - border-radius: 0
      - box-shadow: none
      - padding-bottom: 5px
    img_cell:
      - height: 90px
      - width: 90px
      - border-radius: 50%
    custom_fields:
      occupancy_state:
        - background-color: >
            [[[
              if (variables.status) {
                if (variables.status == "sleeping") {
                  return "var(--orange-color)";
                } else if (variables.status == "dnd") {
                  return "var(--error-color)";
                }
              } else {
                if (entity.state == "home") {
                  return "var(--success-color)";
                } else {
                  return "var(--text-light-primary-color)";
                }
              }              
            ]]]
        - border-radius: 50%
        - position: absolute
        - bottom: 0
        - right: 0
        - left: 0
        - margin: auto
        - height: 10px
        - width: 10px
        - box-shadow: 0 0 4px 0 rgba(0, 0, 0, 0.5)
  custom_fields:
    occupancy_state: >
      [[[
        return "";
      ]]]
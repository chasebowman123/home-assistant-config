kohbo_room_temperature_card:
  default:
    - value_1: 14
    - value_2: 45
    - value_3: 67
    - value_4: 78
    - value_5: 90
  card:
    type: custom:mini-graph-card
    name: '[[name]]'
    decimals: 0
    icon: '[[icon]]'
    points_per_hour: 2
    line_width: 4
    decimals: 0
    smoothing: true
    color_thresholds_transition: smooth
    color_thresholds:
      # Blue
      - color: "#59A5D8"
        value: '[[value_1]]'
      # Light Blue
      - color: "#ADD2EB"
        value: '[[value_2]]'
      # Green
      - color: "#06D6A0"
        value: '[[value_3]]'
      # Yellow
      - color: "#FFD166"
        value: '[[value_4]]'
      # Red
      - color: "#ED4747"
        value: '[[value_5]]'
    entities:
      - entity: '[[entity]]'
    card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_graph_styles.yaml
    animate: true

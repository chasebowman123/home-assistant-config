thermostat_radiant_floor_popup:
  card:
    type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '[[hash]]'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml 
        margin_top_mobile: calc(100vh - 860px)
        margin_top_desktop: calc(100vh - 860px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: '[[name]]'

      - type: thermostat
        entity: '[[entity]]'
        name: '[[name]]'
        icon: mdi:thermometer
        card_mod:
          style: |
            ha-card {
              background: transparent !important;
            }

            ha-card .title {
              display: none !important;
            }

            .arc-colored {
              
            }

      - type: entities
        card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
        entities:
          - entity: '[[temperature_sensor]]'
            icon: mdi:home-thermometer
            name: '[[name]]'
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          - entity: '[[outside_temperature_sensor]]'
            icon: mdi:thermometer-lines
            name: 'Outside Temperature'
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          

      - type: custom:stack-in-card
        mode: horizontal
        card_mod:
          style: |
            :host {
              --stack-card-gap: 0;
              --vertical-stack-card-gap: 0 !important;
            }
            ha-card {
              background: var(--darker-primary-color);
              border-bottom-right-radius: 0;
              border-bottom-left-radius: 0;
              backdrop-filter: none;
              -webkit-backdrop-filter: none;
              box-shadow: none;
              border: none;
              box-shadow: inset 0 4px 8px 0 rgba(0, 0, 0, 0.05);

              position: absolute;
              bottom: 70px;
              height: 110px;
              width: 100%;
              left: 0;
            }

        cards:
          - type: custom:button-card
            entity: '[[entity]]'
            name: Heat
            template: kohbo_thermostat_action_item
            show_icon: true
            icon: mdi:heat-wave
            color_type: icon
            state:
              - color: var(--light-grey-color)
                value: "off"
              - color: var(--state-climate-heat-color)
                value: "heat"
            tap_action:
              action: perform-action
              perform_action: climate.set_hvac_mode
              target:
                entity_id: '[[entity]]'
              data:
                hvac_mode: heat

          - type: custom:button-card
            entity: '[[entity]]'
            name: "Off"
            template: kohbo_thermostat_action_item
            icon: mdi:power
            state:
              - color: var(--primary-color)
                value: "off"
              - color: var(--light-grey-color)
                value: "heat"
            tap_action:
              action: perform-action
              perform_action: climate.set_hvac_mode
              target:
                entity_id: '[[entity]]'
              data:
                hvac_mode: "off"

          
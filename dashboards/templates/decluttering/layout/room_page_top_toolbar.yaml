# 
# Room Page Top Toolbar
# 
# This decluttering card is a resusable card to create
# the top toolbar for a room page. This card wraps the
# top_toolbar to simplify the components for creating
# toolbars for a page.
# 
room_page_top_toolbar:
  card:
    type: custom:decluttering-card
    template: top_toolbar
    variables:
      - cards:
        # Back button
        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:arrow-left
          tap_action:
            action: navigate
            navigation_path: '[[navigation_path]]'
            haptic: light
        
        # Room Name
        - type: custom:button-card
          template: kohbo_header_page_title
          name: '[[name]]'
          
        # Settings button
        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:dots-horizontal
          icon_color: var(--secondary-text-color)
          tap_action:
            action: navigate
            navigation_path: '[[settings_path]]'
            haptic: light
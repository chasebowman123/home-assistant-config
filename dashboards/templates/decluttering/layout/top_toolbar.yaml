# 
# Top Toolbar
# 
# This decluttering card is a resusable card to create
# the top toolbar for any page. You just need to pass in
# the cards you want to display. 
# 
top_toolbar:
  card:
    type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards: '[[cards]]'
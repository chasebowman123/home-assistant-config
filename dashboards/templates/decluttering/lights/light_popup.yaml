light_popup:
  card:
    type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '[[popup_hash]]'
        close_by_clicking_outside: false
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml 

      # 
      # Light Popup Title
      # 
      - type: custom:button-card
        template: kohbo_popup_page_title
        name: '[[popup_title]]'

      # 
      # Light More Info Card
      # 
      - type: custom:more-info-card
        entity: '[[light_entity]]'
        title: '[[popup_title]]'
        card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_more_info_card_mod.yaml

      # 
      # Default Scene
      # 
      - type: custom:button-card
        template: section_title
        name: Default

      # 
      # Default Scene Swipe Card
      # 
      - type: custom:simple-swipe-card
        view_mode: carousel
        card_min_width: 400
        card_spacing: 14
        show_pagination: false
        auto_hide_pagination: 0
        loop_mode: none
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:decluttering-card
                template: scene_button
                name: Rest
                variables:
                  - scene_id: e03267e7-9914-4f47-97fe-63c0bd317fe7
                  - entity_id: '[[entity_id]]'

              - type: custom:decluttering-card

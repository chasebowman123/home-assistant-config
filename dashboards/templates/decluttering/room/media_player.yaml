media_player:
  card:
    type: "custom:mediocre-media-player-card"
    entity_id: '[[media_player]]'
    ma_entity_id: '[[media_player]]'
    # ma_favorite_button_entity_id: button.sonos_office_favorite
    # tap_opens_popup: true
    card_mod:
      style: |
        .mmpc-1pnwwh8 {
          align-items: end !important;
        }
    speaker_group:
      entities:
        - media_player.sonos_kitchen
        - media_player.sonos_family_room
        - media_player.sonos_living_room
        - media_player.sonos_main_bedroom
        - media_player.sonos_playroom
        - media_player.sonos_patio
        - media_player.sonos_pool
        - media_player.sonos_gazebo
        - media_player.sonos_office

    action:
      tap_action:
        action: navigate
        navigation_path: '[[navigation_path]]'

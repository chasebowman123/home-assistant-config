media_player_pop_up:
  card:
    type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '[[hash]]'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml 
        margin_top_mobile: calc(100vh - 850px)
        margin_top_desktop: calc(100vh - 850px)

      - type: "custom:mediocre-massive-media-player-card"
        entity_id: '[[media_player]]'
        ma_entity_id: '[[media_player]]'
        mode: in-card
        speaker_group:
          entities:
            - media_player.sonos_kitchen
            - media_player.sonos_family_room
            - media_player.sonos_playroom
            - media_player.sonos_office
            - media_player.sonos_living_room
            - media_player.sonos_patio
            - media_player.sonos_pool
            - media_player.sonos_gazebo
            - media_player.sonos_main_bedroom
            - media_player.ninos_room
            - media_player.sonos_basement
# 
# Room Card
# 
room_card:
  card:
    type: custom:stack-in-card
    card_mod:
      style: |
        ha-card {
          opacity: {{"1" if states['[[occupancy]]'].state == "on" else "0.5"}};
        }
    cards:
      # 
      # Room State & Occupancy
      # 
      - type: custom:decluttering-card
        template: room_card_occupancy
        variables:
          - mode: '[[mode]]'
          - occupancy: '[[occupancy]]'
          - room: '[[room]]'

      # 
      # Room Overview
      # 
      - type: custom:button-card
        entity: '[[occupancy]]'
        name: '[[room_name]]'
        template: kohbo_room_card_overview
        icon: '[[icon]]'
        variables:
          temperature: '[[temperature]]'
          humidity: '[[humidity]]'
          aqi: '[[aqi]]'
          mode: '[[mode]]'
        tap_action:
          action: navigate
          navigation_path: '[[navigation_path]]'
          haptic: light

      # 
      # Room Devices
      # 
      - type: custom:stack-in-card
        mode: horizontal
        card_mod: !include /config/dashboards/templates/button_cards/base/kohbo_horizontal_stack_room_devices.yaml
        cards: '[[room_devices]]'
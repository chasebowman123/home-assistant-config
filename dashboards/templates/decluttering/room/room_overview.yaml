# 
# Room Overview
# 
room_overview:
  card:
    type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_layout_card_mod.yaml
    card:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 60% 40%
        margin: 0px 0px 0px 0px
        padding: 0px
        card_margin: 0px
        gap: 5px
      cards:
        - type: custom:mod-card
          card_mod:
            style:
              hui-horizontal-stack-card$: |
                #root {
                  gap: 5px !important;
                }
          card:
            type: horizontal-stack
            cards:
              # Room Mode
              - type: custom:button-card
                template: kohbo_chip_card_room_mode
                entity: '[[mode]]'
                tap_action:
                  action: more-info
                  haptic: light

              # Room Occupancy
              - type: custom:button-card
                template: kohbo_chip_card_room_occupancy
                entity: '[[occupancy]]'
                tap_action:
                  action: more-info
                  haptic: light


        # 
        # People in the room
        # 
        - type: conditional
          conditions:
            - condition: not
              conditions:
                - condition: state
                  entity: '[[ble_presence]]'
                  state: 'unavailable'
          card:
            type: custom:mod-card
            card_mod:
              style:
                hui-horizontal-stack-card$: |
                  #root {
                    display: flex;
                    justify-content: flex-end;
                    align-items: start;
                  }
                .: |
                  ha-card {
                    height: 100% !important;
                    align-self: center !important;
                  }
            card:
              type: horizontal-stack
              cards:
                - type: custom:button-card
                  variables:
                    person: "[[[ return states['[[ble_presence]]'].attributes.people[0]; ]]]"
                    picture: "[[[ return states[variables.person].attributes.avatar; ]]]"
                    z_hash: >
                      [[[
                        const slug = variables.person.replace('sensor.', '').replace('_person', '');
                        return `#${slug}`;
                      ]]]
                  entity: "[[[ return variables.person ]]]"
                  template: kohbo_person_entity
                  entity_picture: "[[[ return variables.picture ]]]"
                  tap_action:
                    action: navigate
                    navigation_path: "[[[ return variables.z_hash; ]]]"
                  visibility:
                    - condition: numeric_state
                      entity: '[[ble_presence]]'
                      above: 0

                - type: custom:button-card
                  variables:
                    person: "[[[ return states['[[ble_presence]]'].attributes.people[1]; ]]]"
                    picture: "[[[ return states[variables.person].attributes.avatar; ]]]"
                    z_hash: >
                      [[[
                        const slug = variables.person.replace('sensor.', '').replace('_person', '');
                        return `#${slug}`;
                      ]]]
                  entity: "[[[ return variables.person ]]]"
                  template: kohbo_person_entity
                  entity_picture: "[[[ return variables.picture ]]]"
                  tap_action:
                    action: navigate
                    navigation_path: "[[[ return variables.z_hash; ]]]"
                  visibility:
                    - condition: numeric_state
                      entity: '[[ble_presence]]'
                      above: 1

                - type: custom:button-card
                  template: kohbo_chip_count_card
                  show_label: true
                  label: >
                    [[[
                      const extra = states['[[ble_presence]]'].state - 2;
                      return '+' + extra;
                    ]]]
                  tap_action:
                    action: navigate
                    navigation_path: "[[[ return variables.z_hash; ]]]"
                  visibility:
                    - condition: numeric_state
                      entity: '[[ble_presence]]'
                      above: 2



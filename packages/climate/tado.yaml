#   type: thermostat
#   entity: climate.lounge_ac
#   name: "AC — Edward's Device"
#
# Climate React switch can be displayed as:
#   type: entity
#   entity: switch.lounge_ac_climate_react
#   name: "Climate React"
# ============================================================

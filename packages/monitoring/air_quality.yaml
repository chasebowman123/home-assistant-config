##############################################################
# Monitoring — Air Quality Package
# Automation: #33
#
# Monitors:
#   Office AQ Monitor
#   Lucas's Room AQ Monitor
#   Loretta's Bedside AQ (bedroom)
#   Levoit Core 400S Air Purifier (PM2.5 only)
#
# Note: AQ index scale = 0-100 where HIGHER = BETTER.
#   Alert threshold: AQ index < 50 (poor air quality)
#
# Edward's bedside monitor is fully unavailable — excluded.
##############################################################

automation:

  ##############################################################
  # #33a · Office Air Quality Alerts
  ##############################################################
  - id: "air_quality_office"
    alias: "Office Air Quality Alert"
    description: "Alert when Office air quality sensors exceed thresholds"
    triggers:
      # AQI drops below 50 (poor quality — higher is better on this scale)
      - trigger: numeric_state
        entity_id: sensor.office_air_quality_monitor_air_quality_index
        below: 50
        id: "office_aqi"
        for:
          minutes: 5
      # PM2.5 above 25 µg/m³
      - trigger: numeric_state
        entity_id: sensor.office_air_quality_monitor_pm2_5
        above: 25
        id: "office_pm25"
        for:
          minutes: 5
      # VOC Index above 50
      - trigger: numeric_state
        entity_id: sensor.office_air_quality_monitor_volatile_organic_compounds_index
        above: 50
        id: "office_voc"
        for:
          minutes: 5
      # CO above 5 ppm — CRITICAL
      - trigger: numeric_state
        entity_id: sensor.office_air_quality_monitor_carbon_monoxide_2
        above: 5
        id: "office_co"
      # Humidity comfort alerts
      - trigger: numeric_state
        entity_id: sensor.office_air_quality_monitor_humidity
        below: 30
        id: "office_humidity_low"
        for:
          minutes: 10
      - trigger: numeric_state
        entity_id: sensor.office_air_quality_monitor_humidity
        above: 60
        id: "office_humidity_high"
        for:
          minutes: 10
    conditions: []
    actions:
      - choose:
          # CRITICAL: Carbon Monoxide
          - conditions:
              - condition: trigger
                id: "office_co"
            sequence:
              - action: notify.mobile_app_ee_iphone_16_pro_max
                data:
                  title: "CARBON MONOXIDE ALERT — Office"
                  message: >-
                    CO level: {{ states('sensor.office_air_quality_monitor_carbon_monoxide_2') }} ppm
                    — OPEN WINDOWS AND EVACUATE
                  data:
                    push:
                      sound:
                        name: default
                        critical: 1
                        volume: 1.0
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.loretta_notifications
                        state: "on"
                    sequence:
                      - action: notify.mobile_app_lorettas_phone
                        data:
                          title: "CARBON MONOXIDE ALERT — Office"
                          message: >-
                            CO level: {{ states('sensor.office_air_quality_monitor_carbon_monoxide_2') }} ppm
                            — OPEN WINDOWS AND EVACUATE
                          data:
                            push:
                              sound:
                                name: default
                                critical: 1
                                volume: 1.0
          # AQI Low
          - conditions:
              - condition: trigger
                id: "office_aqi"
            sequence:
              - action: notify.mobile_app_ee_iphone_16_pro_max
                data:
                  title: "Air Quality Alert — Office"
                  message: >-
                    Air Quality Index: {{ states('sensor.office_air_quality_monitor_air_quality_index') }}
                    (below 50 threshold). Check ventilation or air purifier.
                  data:
                    push:
                      sound: default
          # PM2.5 High
          - conditions:
              - condition: trigger
                id: "office_pm25"
            sequence:
              - action: notify.mobile_app_ee_iphone_16_pro_max
                data:
                  title: "Air Quality Alert — Office"
                  message: >-
                    PM2.5: {{ states('sensor.office_air_quality_monitor_pm2_5') }} µg/m³
                    (above 25 threshold). Check ventilation or air purifier.
                  data:
                    push:
                      sound: default
          # VOC High
          - conditions:
              - condition: trigger
                id: "office_voc"
            sequence:
              - action: notify.mobile_app_ee_iphone_16_pro_max
                data:
                  title: "Air Quality Alert — Office"
                  message: >-
                    VOC Index: {{ states('sensor.office_air_quality_monitor_volatile_organic_compounds_index') }}
                    (above 50 threshold). Check ventilation or air purifier.
                  data:
                    push:
                      sound: default
          # Humidity Low
          - conditions:
              - condition: trigger
                id: "office_humidity_low"
            sequence:
              - action: notify.mobile_app_ee_iphone_16_pro_max
                data:
                  title: "Air Quality Alert — Office"
                  message: >-
                    Humidity: {{ states('sensor.office_air_quality_monitor_humidity') }}%
                    (below 30% — dry air). Consider humidifier.
          # Humidity High
          - conditions:
              - condition: trigger
                id: "office_humidity_high"
            sequence:
              - action: notify.mobile_app_ee_iphone_16_pro_max
                data:
                  title: "Air Quality Alert — Office"
                  message: >-
                    Humidity: {{ states('sensor.office_air_quality_monitor_humidity') }}%
                    (above 60% — high humidity). Check ventilation.
    mode: queued
    max: 5


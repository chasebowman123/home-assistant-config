silent_doorbell_flash:
  alias: "Silent Doorbell Flash"
  description: "Flash Iris and Signe lights for visual doorbell alert."
  icon: mdi:bell-ring
  mode: single
  sequence:
    - service: light.turn_on
      target:
        entity_id: light.lounge_iris
      data:
        color_name: blue
        brightness_pct: 100
    - service: light.turn_on
      target:
        entity_id: light.hallway_signe_light
      data:
        color_name: blue
        brightness_pct: 100
    - delay:
        seconds: 2
    - service: light.turn_on
      target:
        entity_id:
          - light.lounge_iris
          - light.hallway_signe_light
      data:
        color_name: red
        brightness_pct: 100
    - delay:
        seconds: 2
    - service: light.turn_on
      target:
        entity_id:
          - light.lounge_iris
          - light.hallway_signe_light
      data:
        color_name: blue
        brightness_pct: 100
    - delay:
        seconds: 2
    - service: light.turn_off
      target:
        entity_id:
          - light.lounge_iris
          - light.hallway_signe_light

lucas_morning_routine:
  alias: "Lucas Morning Routine"
  description: "Lucas wakes up: lights on, cheerful greeting."
  icon: mdi:baby-face-outline
  mode: single
  sequence:
    - action: input_select.select_option
      target:
        entity_id: input_select.lucas_room
      data:
        option: "Standard"
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.lucas_sleeping
    - action: light.turn_on
      target:
        entity_id: light.lucass_room_spot_lights
      data:
        brightness_pct: 60
        color_temp_kelvin: 3500
        transition: 5
    - delay:
        seconds: 3
    - action: notify.alexa_media
      data:
        target:
          - media_player.lucass_room
        message: "Good morning Lucas!"
        data:
          type: announce

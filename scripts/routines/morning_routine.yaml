morning_routine:
  alias: "Morning Routine"
  description: "Household wake-up: lights, heating boost, weather announcement."
  icon: mdi:weather-sunset-up
  mode: single
  sequence:
    - action: input_select.select_option
      target:
        entity_id: input_select.house
      data:
        option: "Day Time"
    - action: light.turn_on
      target:
        entity_id:
          - light.hallway_lamp_post
          - light.hallway_signe_light
      data:
        brightness_pct: 80
        transition: 5
    - action: light.turn_on
      target:
        entity_id: light.kitchen_spotlights
      data:
        brightness_pct: 100
        transition: 3
    - action: scene.turn_on
      target:
        entity_id: scene.lounge_rolling_hills
    - action: scene.turn_on
      target:
        entity_id: scene.bedroom_rolling_hills
    - if:
        - condition: numeric_state
          entity_id: sensor.hallway_temp_temperature
          below: 22
      then:
        - action: climate.set_temperature
          target:
            entity_id:
              - climate.hallway
              - climate.lounge
              - climate.kitchen
          data:
            temperature: 24
    - delay:
        seconds: 3
    - action: notify.alexa_media
      data:
        target:
          - media_player.kitchen
        message: >
          Good morning! Today's weather:
          {{ state_attr('weather.home', 'temperature') }} degrees
          and {{ states('weather.home') }}.
        data:
          type: announce

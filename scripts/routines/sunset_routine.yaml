sunset_routine:
  alias: "Sunset Routine"
  description: "Transition to evening lighting."
  icon: mdi:weather-sunset-down
  mode: single
  sequence:
    - service: light.turn_on
      target:
        entity_id: light.hallway_spot_lights
      data:
        brightness_pct: 40
        color_temp_kelvin: 2500
        transition: 10
    - service: light.turn_on
      target:
        entity_id: light.lounge_piano_lamp
      data:
        brightness_pct: 40
        transition: 10

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eidam Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1e;--card:#252529;--card-hover:#2d2d32;--surface:#1e1e22;--text:#fff;--text-secondary:rgba(255,255,255,.6);--text-muted:rgba(255,255,255,.4);--green:#4ade80;--green-dim:rgba(74,222,128,.15);--amber:#fbbf24;--amber-dim:rgba(251,191,36,.15);--red:#f87171;--red-dim:rgba(248,113,113,.15);--blue:#60a5fa;--blue-dim:rgba(96,165,250,.15);--teal:#2dd4bf;--teal-dim:rgba(45,212,191,.15);--violet:#a78bfa;--violet-dim:rgba(167,139,250,.15);--orange:#fb923c;--radius:16px;--radius-sm:12px;--pad:16px;--gap:10px}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden}
.app{height:100%;display:flex;flex-direction:column}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:var(--pad);padding-bottom:80px}
.content::-webkit-scrollbar{display:none}
.view{display:none}.view.active{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--surface);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-around;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text-muted);font-size:10px;font-weight:500;cursor:pointer;padding:8px 12px;-webkit-tap-highlight-color:transparent}
.nav-item .mdi{font-size:22px}.nav-item.active{color:var(--text)}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin:16px 0 8px}
.card{background:var(--card);border-radius:var(--radius);padding:var(--pad);margin-bottom:var(--gap)}
.chips{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--card);border-radius:50px;font-size:13px;font-weight:500;cursor:pointer}
.chip .mdi{font-size:16px}
.grid{display:grid;gap:var(--gap)}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.mode-chip{background:var(--card);border-radius:var(--radius-sm);padding:12px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.mode-chip.active{background:var(--teal-dim);outline:1px solid var(--teal)}
.mode-chip .mdi{font-size:20px;display:block;margin-bottom:4px}
.toggle-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.toggle-row:last-child{border-bottom:none}
.toggle-info{flex:1}
.toggle-name{font-size:14px;font-weight:500}
.toggle-state{font-size:12px;color:var(--text-muted)}
.toggle{width:48px;height:26px;border-radius:13px;background:rgba(255,255,255,.15);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s}
.toggle.on::after{transform:translateX(22px)}
.climate-card{background:var(--card);border-radius:var(--radius);padding:var(--pad);margin-bottom:var(--gap)}
.climate-header{display:flex;justify-content:space-between;align-items:center}
.climate-name{font-size:14px;font-weight:500}
.climate-status{font-size:11px;padding:3px 8px;border-radius:50px;font-weight:500}
.climate-temps{display:flex;align-items:baseline;gap:8px;margin:8px 0}
.climate-current{font-size:32px;font-weight:700}
.climate-target{font-size:13px;color:var(--text-muted)}
.climate-controls{display:flex;gap:8px;align-items:center}
.climate-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.climate-setpoint{font-size:18px;font-weight:600;min-width:50px;text-align:center}
.room-card{background:var(--card);border-radius:var(--radius);padding:var(--pad);margin-bottom:var(--gap);cursor:pointer}
.room-card-header{display:flex;justify-content:space-between;align-items:center}
.room-card-name{font-size:16px;font-weight:600}
.room-card-temp{font-size:24px;font-weight:700}
.room-card-status{font-size:12px;color:var(--text-muted);margin-top:4px}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:14px;cursor:pointer;margin-bottom:12px}
.back-btn .mdi{font-size:20px}
.page-title{font-size:22px;font-weight:700;margin-bottom:16px}
.cam-feed{width:100%;border-radius:var(--radius);background:#000;aspect-ratio:16/9;margin-bottom:var(--gap);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px}
.cam-feed img{width:100%;height:100%;object-fit:cover}
.battery-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.battery-row:last-child{border-bottom:none}
.battery-name{font-size:14px}
.battery-level{font-size:14px;font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.connecting{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:1000;font-size:16px}
.connecting.hidden{display:none}
.light-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.light-row:last-child{border-bottom:none}
.light-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:10px;flex-shrink:0}
.light-info{flex:1}.light-name{font-size:14px;font-weight:500}.light-status{font-size:12px;color:var(--text-muted)}
.select-card{background:var(--card);border-radius:var(--radius);padding:12px var(--pad);margin-bottom:var(--gap)}
.select-label{font-size:12px;color:var(--text-muted);margin-bottom:6px}
.select-value{font-size:16px;font-weight:600;cursor:pointer}
.alarm-card{background:var(--card);border-radius:var(--radius);padding:var(--pad);margin-bottom:var(--gap)}
.alarm-status{font-size:18px;font-weight:600;margin-bottom:8px}
.alarm-btns{display:flex;gap:8px}
.alarm-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
</style>
</head>
<body>
<div class="connecting" id="connectScreen">
  <span class="mdi mdi-home-assistant" style="font-size:48px;color:var(--teal)"></span>
  <div>Connecting to Home Assistant...</div>
  <div style="font-size:12px;color:var(--text-muted)" id="connectStatus">Initialising</div>
  <div style="margin-top:20px;width:280px">
    <input id="tokenInput" type="password" placeholder="Long-lived access token" style="width:100%;padding:12px;font-size:14px;background:var(--card);color:white;border:1px solid rgba(255,255,255,.15);border-radius:8px;margin-bottom:8px">
    <button onclick="saveTokenAndConnect()" style="width:100%;padding:12px;background:var(--teal);color:#000;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Connect</button>
  </div>
</div>

<div class="app">
  <div class="content" id="content">

    <!-- HOME VIEW -->
    <div class="view active" id="view-home">
      <div class="chips" id="homeChips"></div>
      
      <div class="section-label">Quick Actions</div>
      <div class="grid grid-3" style="margin-bottom:12px">
        <div class="mode-chip" onclick="callScript('morning_routine')"><span class="mdi mdi-weather-sunny" style="color:var(--amber)"></span>Morning</div>
        <div class="mode-chip" onclick="callScript('goodnight_routine')"><span class="mdi mdi-moon-waning-crescent" style="color:var(--blue)"></span>Goodnight</div>
        <div class="mode-chip" onclick="callScript('all_lights_off')"><span class="mdi mdi-power-off" style="color:var(--red)"></span>All Off</div>
      </div>

      <div class="section-label">House Mode</div>
      <div class="grid grid-3" id="houseModes" style="margin-bottom:12px"></div>

      <div class="section-label">Climate</div>
      <div id="homeClimate"></div>

      <div class="section-label">Toggles</div>
      <div class="card" id="homeBooleans"></div>
    </div>

    <!-- ROOMS VIEW -->
    <div class="view" id="view-rooms">
      <div class="page-title">Rooms</div>
      <div id="roomCards"></div>
    </div>

    <!-- ROOM SUBVIEWS -->
    <div class="view" id="view-room-detail">
      <div class="back-btn" onclick="showView('rooms')"><span class="mdi mdi-arrow-left"></span>Back</div>
      <div class="page-title" id="roomDetailTitle"></div>
      <div id="roomDetailMode"></div>
      <div class="section-label">Lights</div>
      <div class="card" id="roomDetailLights"></div>
      <div class="section-label">Climate</div>
      <div id="roomDetailClimate"></div>
      <div id="roomDetailExtra"></div>
    </div>

    <!-- CLIMATE VIEW -->
    <div class="view" id="view-climate">
      <div class="page-title">Climate</div>
      <div id="weatherCard"></div>
      <div class="section-label">Heating Zones</div>
      <div id="climateZones"></div>
    </div>

    <!-- SECURITY VIEW -->
    <div class="view" id="view-security">
      <div class="page-title">Security</div>
      <div id="alarmCard"></div>
      <div class="section-label">People</div>
      <div class="card" id="securityPeople"></div>
      <div class="section-label">Ring Batteries</div>
      <div class="card" id="ringBatteries"></div>
    </div>

  </div>

  <div class="nav">
    <div class="nav-item active" onclick="showView('home')"><span class="mdi mdi-home"></span>Home</div>
    <div class="nav-item" onclick="showView('rooms')"><span class="mdi mdi-floor-plan"></span>Rooms</div>
    <div class="nav-item" onclick="showView('climate')"><span class="mdi mdi-thermometer"></span>Climate</div>
    <div class="nav-item" onclick="showView('security')"><span class="mdi mdi-shield-home"></span>Security</div>
  </div>
</div>

<script>
// ==================== STATE MANAGEMENT ====================
let states = {};
let socket = null;
let msgId = 10;
let connected = false;

function getState(eid) { return states[eid] || null; }
function getAttr(eid, attr) { const s = getState(eid); return s && s.attributes ? s.attributes[attr] : null; }
function fmt(v) { return v !== null && v !== undefined ? Math.round(parseFloat(v)*10)/10 : '--'; }

// ==================== CONNECTION ====================
function saveTokenAndConnect() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  try { localStorage.setItem('ha_token', token); } catch(e) {}
  connect(token);
}

function connect(token) {
  const host = location.hostname || 'homeassistant.local';
  const port = location.port || '8123';
  const url = 'ws://' + host + ':' + port + '/api/websocket';
  
  document.getElementById('connectStatus').textContent = 'Connecting to ' + host + '...';
  
  try { socket = new WebSocket(url); } catch(e) {
    document.getElementById('connectStatus').textContent = 'Connection failed: ' + e.message;
    return;
  }
  
  socket.onopen = () => { document.getElementById('connectStatus').textContent = 'Authenticating...'; };
  
  socket.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'auth_required') {
      socket.send(JSON.stringify({ type: 'auth', access_token: token }));
    }
    if (msg.type === 'auth_invalid') {
      document.getElementById('connectStatus').textContent = 'Invalid token. Please try again.';
    }
    if (msg.type === 'auth_ok') {
      connected = true;
      document.getElementById('connectScreen').classList.add('hidden');
      socket.send(JSON.stringify({ id: 1, type: 'subscribe_events', event_type: 'state_changed' }));
      socket.send(JSON.stringify({ id: 2, type: 'get_states' }));
    }
    if (msg.type === 'result' && msg.id === 2 && msg.success) {
      msg.result.forEach(s => { states[s.entity_id] = s; });
      renderAll();
    }
    if (msg.type === 'event' && msg.event && msg.event.event_type === 'state_changed') {
      const d = msg.event.data;
      if (d.new_state) { states[d.entity_id] = d.new_state; renderAll(); }
    }
  };
  
  socket.onclose = () => {
    if (connected) { setTimeout(() => connect(token), 3000); }
  };
}

// Auto-connect with saved token
let savedToken = '';
try { savedToken = localStorage.getItem('ha_token') || ''; } catch(e) {}
if (savedToken) {
  document.getElementById('tokenInput').value = savedToken;
  connect(savedToken);
} else {
  document.getElementById('connectStatus').textContent = 'Enter your token to connect';
}

// ==================== SERVICE CALLS ====================
function callService(domain, service, data, target) {
  if (!socket || !connected) return;
  const msg = { id: msgId++, type: 'call_service', domain, service };
  if (data) msg.service_data = data;
  if (target) msg.target = target;
  socket.send(JSON.stringify(msg));
}
function toggleEntity(eid) {
  const domain = eid.split('.')[0];
  const svc = (domain === 'input_boolean') ? 'toggle' : 'toggle';
  callService(domain, svc, {}, { entity_id: eid });
}
function setInputSelect(eid, option) {
  callService('input_select', 'select_option', { option }, { entity_id: eid });
}
function setClimateTemp(eid, temp) {
  callService('climate', 'set_temperature', { temperature: temp }, { entity_id: eid });
}
function callScript(name) {
  callService('script', 'turn_on', {}, { entity_id: 'script.' + name });
}
function setAlarm(service) {
  callService('alarm_control_panel', service, {}, { entity_id: 'alarm_control_panel.home_alarm' });
}

// ==================== NAVIGATION ====================
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navMap = { home: 0, rooms: 1, climate: 2, security: 3 };
  if (navMap[id] !== undefined) document.querySelectorAll('.nav-item')[navMap[id]].classList.add('active');
  document.getElementById('content').scrollTop = 0;
}

// ==================== ROOM CONFIG ====================
const ROOMS = {
  lounge: { name: 'Lounge', climate: 'climate.lounge', mode: 'input_select.lounge', icon: 'mdi-sofa', color: 'amber',
    lights: [['light.lounge','All'],['light.lounge_spotlights','Spots'],['light.lounge_wall_lights','Walls'],['light.lounge_strip_light','Strip'],['light.lounge_piano_lamp','Piano'],['light.lounge_io','Iris'],['light.lounge_signe_light','Signe']],
    extra: [['switch.bubble_light','Bubble'],['switch.banana_light','Banana'],['switch.disco_lights','Disco'],['switch.bar_light','Bar'],['switch.lounge_hue_sync_box','Sync Box']]
  },
  bedroom: { name: 'Bedroom', climate: 'climate.bedroom_2', mode: 'input_select.bedroom', icon: 'mdi-bed', color: 'violet',
    lights: [['light.bedroom','All'],['light.bedroom_spot_lights','Spots'],['light.bedroom_signe_light','Signe'],['light.bedroom_tv_strip_light','TV Strip']]
  },
  lucas: { name: "Lucas's Room", climate: 'climate.lucas_s_room', mode: 'input_select.lucas_room', icon: 'mdi-baby-face-outline', color: 'teal',
    lights: [['light.lucass_room','All'],['light.lucass_room_spot_lights','Spots'],['light.lucass_room_iris','Iris'],['switch.cloud_lamp','Cloud Lamp'],['light.hue_color_lamp_1','Nightlight']],
    sensors: [['sensor.lucas_room_temp_temperature','Room Temp','°C'],['sensor.lucass_room_air_quality_monitor_indoor_air_quality','Air Quality','']]
  },
  kitchen: { name: 'Kitchen', climate: 'climate.kitchen', icon: 'mdi-silverware-fork-knife', color: 'orange',
    lights: [['light.kitchen_spotlights','Spotlights']]
  },
  office: { name: 'Office', climate: 'climate.office', mode: 'input_select.office', icon: 'mdi-desk', color: 'blue',
    lights: [['light.office_spotlights','Spotlights']]
  },
  hallway: { name: 'Hallway', climate: 'climate.hallway', icon: 'mdi-door-open', color: 'green',
    lights: [['light.hallway','All'],['light.hallway_lamp_post','Lamp Post'],['light.hallway_signe_light','Signe'],['light.hallway_spot_lights','Spots'],['light.cloakroom','Cloakroom']]
  }
};

const HOUSE_MODES = [
  { name: 'Day Time', icon: 'mdi-white-balance-sunny', color: 'amber' },
  { name: 'Evening Time', icon: 'mdi-weather-night', color: 'violet' },
  { name: 'Night Time', icon: 'mdi-moon-waning-crescent', color: 'blue' },
  { name: 'Away', icon: 'mdi-airplane', color: 'red' },
  { name: 'All Out', icon: 'mdi-home-export-outline', color: 'orange' },
  { name: 'Dogs Alone', icon: 'mdi-dog', color: 'teal' }
];

const BOOLEANS = [
  ['input_boolean.lucas_sleeping', 'Lucas Sleeping', 'mdi-sleep'],
  ['input_boolean.important_meeting', 'Meeting', 'mdi-video'],
  ['input_boolean.evening_entertaining', 'Entertaining', 'mdi-glass-cocktail'],
  ['input_boolean.disco_disco', 'Disco Disco', 'mdi-party-popper'],
  ['input_boolean.bad_weather', 'Bad Weather', 'mdi-weather-pouring'],
  ['input_boolean.edward_alone', 'Edward Alone', 'mdi-account']
];

const BATTERIES = [
  ['sensor.basement_door_battery', 'Basement Door'],
  ['sensor.basement_stairs_battery', 'Basement Stairs'],
  ['sensor.garden_battery', 'Garden'],
  ['sensor.upstairs_battery', 'Upstairs']
];

// ==================== RENDER ====================
function renderAll() {
  renderHomeChips();
  renderHouseModes();
  renderHomeClimate();
  renderBooleans();
  renderRoomCards();
  renderClimateView();
  renderSecurityView();
}

function renderHomeChips() {
  const house = getState('input_select.house');
  const weather = getState('weather.home');
  const edward = getState('person.edward_eidam');
  const loretta = getState('person.loretta_eidam');
  const wTemp = weather ? getAttr('weather.home', 'temperature') : null;
  
  document.getElementById('homeChips').innerHTML = `
    <div class="chip"><span class="mdi mdi-home" style="color:var(--teal)"></span>${house ? house.state : '--'}</div>
    <div class="chip"><span class="mdi mdi-weather-partly-cloudy" style="color:var(--amber)"></span>${wTemp ? fmt(wTemp) + '°' : '--'}</div>
    <div class="chip"><span class="status-dot" style="background:${edward && edward.state==='home' ? 'var(--green)' : 'var(--text-muted)'}"></span>Edward</div>
    <div class="chip"><span class="status-dot" style="background:${loretta && loretta.state==='home' ? 'var(--green)' : 'var(--text-muted)'}"></span>Loretta</div>
  `;
}

function renderHouseModes() {
  const current = getState('input_select.house');
  const currentMode = current ? current.state : '';
  document.getElementById('houseModes').innerHTML = HOUSE_MODES.map(m => 
    `<div class="mode-chip ${m.name === currentMode ? 'active' : ''}" onclick="setInputSelect('input_select.house','${m.name}')">
      <span class="mdi ${m.icon}" style="color:var(--${m.color})"></span>${m.name.replace(' Time','')}
    </div>`
  ).join('');
}

function renderHomeClimate() {
  const zones = Object.entries(ROOMS).map(([k, r]) => {
    const s = getState(r.climate);
    const cur = s ? getAttr(r.climate, 'current_temperature') : null;
    const tgt = s ? getAttr(r.climate, 'temperature') : null;
    const action = s ? getAttr(r.climate, 'hvac_action') : null;
    const heating = action === 'heating';
    const unavail = !s || s.state === 'unavailable';
    return `<div class="climate-card">
      <div class="climate-header">
        <div class="climate-name">${r.name}</div>
        <div class="climate-status" style="background:${unavail?'var(--red-dim)':heating?'var(--blue-dim)':'var(--green-dim)'};color:${unavail?'var(--red)':heating?'var(--blue)':'var(--green)'}">${unavail?'Offline':heating?'Heating':'Idle'}</div>
      </div>
      <div class="climate-temps">
        <div class="climate-current">${cur!==null?fmt(cur):'--'}°</div>
        <div class="climate-target">Target ${tgt!==null?fmt(tgt):'--'}°C</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('homeClimate').innerHTML = zones;
}

function renderBooleans() {
  document.getElementById('homeBooleans').innerHTML = BOOLEANS.map(([eid, name, icon]) => {
    const s = getState(eid);
    const isOn = s && s.state === 'on';
    return `<div class="toggle-row">
      <span class="mdi ${icon}" style="font-size:20px;margin-right:12px;color:${isOn?'var(--teal)':'var(--text-muted)'}"></span>
      <div class="toggle-info"><div class="toggle-name">${name}</div><div class="toggle-state">${isOn?'On':'Off'}</div></div>
      <div class="toggle ${isOn?'on':''}" onclick="toggleEntity('${eid}')"></div>
    </div>`;
  }).join('');
}

function renderRoomCards() {
  document.getElementById('roomCards').innerHTML = Object.entries(ROOMS).map(([k, r]) => {
    const s = getState(r.climate);
    const cur = s ? getAttr(r.climate, 'current_temperature') : null;
    const action = s ? getAttr(r.climate, 'hvac_action') : null;
    return `<div class="room-card" onclick="showRoomDetail('${k}')">
      <div class="room-card-header">
        <div><div class="room-card-name"><span class="mdi ${r.icon}" style="color:var(--${r.color});margin-right:6px"></span>${r.name}</div>
        <div class="room-card-status">${action==='heating'?'Heating':'Idle'}</div></div>
        <div class="room-card-temp">${cur!==null?fmt(cur):'--'}°</div>
      </div>
    </div>`;
  }).join('');
}

function showRoomDetail(roomId) {
  const r = ROOMS[roomId];
  if (!r) return;
  document.getElementById('roomDetailTitle').textContent = r.name;
  
  // Mode selector
  if (r.mode) {
    const s = getState(r.mode);
    const opts = s ? (s.attributes.options || []) : [];
    const cur = s ? s.state : '';
    document.getElementById('roomDetailMode').innerHTML = `
      <div class="select-card"><div class="select-label">Mode</div>
      <div class="grid grid-3">${opts.map(o => 
        `<div class="mode-chip ${o===cur?'active':''}" onclick="setInputSelect('${r.mode}','${o}')" style="font-size:12px;padding:10px">${o}</div>`
      ).join('')}</div></div>`;
  } else {
    document.getElementById('roomDetailMode').innerHTML = '';
  }
  
  // Lights
  document.getElementById('roomDetailLights').innerHTML = (r.lights || []).map(([eid, name]) => {
    const s = getState(eid);
    const isOn = s && (s.state === 'on');
    const domain = eid.split('.')[0];
    return `<div class="light-row">
      <div class="light-icon" style="background:${isOn?'var(--amber-dim)':'rgba(255,255,255,.06)'};color:${isOn?'var(--amber)':'var(--text-muted)'}">
        <span class="mdi mdi-lightbulb"></span></div>
      <div class="light-info"><div class="light-name">${name}</div><div class="light-status">${isOn?'On':'Off'}</div></div>
      <div class="toggle ${isOn?'on':''}" onclick="toggleEntity('${eid}')"></div>
    </div>`;
  }).join('') + ((r.extra || []).map(([eid, name]) => {
    const s = getState(eid);
    const isOn = s && (s.state === 'on');
    return `<div class="light-row">
      <div class="light-icon" style="background:${isOn?'var(--violet-dim)':'rgba(255,255,255,.06)'};color:${isOn?'var(--violet)':'var(--text-muted)'}">
        <span class="mdi mdi-power-plug"></span></div>
      <div class="light-info"><div class="light-name">${name}</div><div class="light-status">${isOn?'On':'Off'}</div></div>
      <div class="toggle ${isOn?'on':''}" onclick="toggleEntity('${eid}')"></div>
    </div>`;
  }).join(''));
  
  // Climate
  const cs = getState(r.climate);
  const cur = cs ? getAttr(r.climate, 'current_temperature') : null;
  const tgt = cs ? getAttr(r.climate, 'temperature') : null;
  document.getElementById('roomDetailClimate').innerHTML = `<div class="climate-card">
    <div class="climate-header"><div class="climate-name">${r.name}</div></div>
    <div class="climate-temps"><div class="climate-current">${cur!==null?fmt(cur):'--'}°</div></div>
    <div class="climate-controls">
      <div class="climate-btn" onclick="setClimateTemp('${r.climate}',${(tgt||20)-0.5})">−</div>
      <div class="climate-setpoint">${tgt!==null?fmt(tgt):'--'}</div>
      <div class="climate-btn" onclick="setClimateTemp('${r.climate}',${(tgt||20)+0.5})">+</div>
    </div>
  </div>`;
  
  // Extra sensors
  let extra = '';
  if (r.sensors) {
    extra += '<div class="section-label">Sensors</div><div class="card">';
    r.sensors.forEach(([eid, name, unit]) => {
      const s = getState(eid);
      extra += `<div class="toggle-row"><div class="toggle-info"><div class="toggle-name">${name}</div></div><div style="font-size:16px;font-weight:600">${s?s.state:'--'}${unit}</div></div>`;
    });
    extra += '</div>';
  }
  document.getElementById('roomDetailExtra').innerHTML = extra;
  
  showView('room-detail');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item')[1].classList.add('active');
}

function renderClimateView() {
  const w = getState('weather.home');
  const wt = w ? getAttr('weather.home', 'temperature') : null;
  document.getElementById('weatherCard').innerHTML = `<div class="card" style="text-align:center">
    <span class="mdi mdi-weather-partly-cloudy" style="font-size:36px;color:var(--amber)"></span>
    <div style="font-size:36px;font-weight:700;margin:4px 0">${wt!==null?fmt(wt):'--'}°C</div>
    <div style="color:var(--text-muted)">${w?w.state.replace(/-/g,' '):'--'}</div>
  </div>`;
  
  document.getElementById('climateZones').innerHTML = Object.entries(ROOMS).map(([k, r]) => {
    const s = getState(r.climate);
    const cur = s ? getAttr(r.climate, 'current_temperature') : null;
    const tgt = s ? getAttr(r.climate, 'temperature') : null;
    const action = s ? getAttr(r.climate, 'hvac_action') : null;
    return `<div class="climate-card">
      <div class="climate-header"><div class="climate-name">${r.name}</div>
        <div class="climate-status" style="background:${action==='heating'?'var(--blue-dim)':'var(--green-dim)'};color:${action==='heating'?'var(--blue)':'var(--green)'}">${action==='heating'?'Heating':'Idle'}</div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <div><div class="climate-current">${cur!==null?fmt(cur):'--'}°</div></div>
        <div class="climate-controls">
          <div class="climate-btn" onclick="setClimateTemp('${r.climate}',${(tgt||20)-0.5})">−</div>
          <div class="climate-setpoint">${tgt!==null?fmt(tgt):'--'}</div>
          <div class="climate-btn" onclick="setClimateTemp('${r.climate}',${(tgt||20)+0.5})">+</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderSecurityView() {
  const alarm = getState('alarm_control_panel.home_alarm');
  const aState = alarm ? alarm.state : 'unknown';
  const aColor = aState === 'disarmed' ? 'red' : 'green';
  document.getElementById('alarmCard').innerHTML = `<div class="alarm-card">
    <div class="alarm-status"><span class="mdi mdi-shield-home" style="margin-right:8px;color:var(--${aColor})"></span>${aState.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</div>
    <div class="alarm-btns">
      <div class="alarm-btn" style="background:var(--green-dim);color:var(--green)" onclick="setAlarm('alarm_arm_home')">Home</div>
      <div class="alarm-btn" style="background:var(--blue-dim);color:var(--blue)" onclick="setAlarm('alarm_arm_away')">Away</div>
      <div class="alarm-btn" style="background:var(--red-dim);color:var(--red)" onclick="setAlarm('alarm_disarm')">Disarm</div>
    </div>
  </div>`;
  
  const edward = getState('person.edward_eidam');
  const loretta = getState('person.loretta_eidam');
  document.getElementById('securityPeople').innerHTML = [['Edward', edward],['Loretta', loretta]].map(([n,s]) => {
    const home = s && s.state === 'home';
    return `<div class="toggle-row"><div class="toggle-info"><div class="toggle-name">${n}</div><div class="toggle-state">${home?'Home':'Away'}</div></div>
    <span class="status-dot" style="background:${home?'var(--green)':'var(--red)'}"></span></div>`;
  }).join('');
  
  document.getElementById('ringBatteries').innerHTML = BATTERIES.map(([eid, name]) => {
    const s = getState(eid);
    const v = s ? parseInt(s.state) : null;
    const color = v !== null ? (v < 20 ? 'var(--red)' : v < 50 ? 'var(--amber)' : 'var(--green)') : 'var(--text-muted)';
    return `<div class="battery-row"><div class="battery-name">${name}</div><div class="battery-level" style="color:${color}">${v!==null?v+'%':'--'}</div></div>`;
  }).join('');
}
</script>
</body>
</html>
